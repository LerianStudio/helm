{{- $component := index .Values "br-sta" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "br-sta.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "br-sta.labels" (dict "context" .) | nindent 4 }}
  {{- with $component.service.annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  type: {{ $component.service.type }}
  ports:
    - port: {{ $component.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "br-sta.selectorLabels" (dict "context" .) | nindent 4 }}
