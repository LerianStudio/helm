{{- if not .Values.worker.useExistingSecret }}
{{- $_ := required "secrets.RABBITMQ_DEFAULT_PASS is required" .Values.secrets.RABBITMQ_DEFAULT_PASS }}
{{- $_ := required "secrets.DATASOURCE_ONBOARDING_PASSWORD is required" .Values.secrets.DATASOURCE_ONBOARDING_PASSWORD }}
{{- include "reporter.rabbitmqErlangCookieRequired" . }}
{{- include "reporter.rabbitmqExistingSecretConsistent" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-worker.fullname" . }}
  labels:
    {{- include "plugin-worker.labels" (dict "context" . "name" .Values.worker.name ) | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
type: Opaque
data:
  # MONGO_PASSWORD is single-sourced from the Bitnami mongodb subchart Secret; see the
  # manager Secret and docs/helm-chart-standard.md "Single-Source Infra Secrets".
  {{- include "reporter.mongoExternalSecretData" . | nindent 2 }}
  {{- range $key, $value := .Values.secrets }}
  {{- if ne $key "MONGO_PASSWORD" }}
  {{ $key }}: {{ $value | toString | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
