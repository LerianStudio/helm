kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "plugin-auth-backend.fullname" . }}
data:
  appname: plugin-auth-casdoor-backend
  runmode: dev
  httpport: "8000"
  driverName: "postgres"
  dbName: casdoor
  showSql: "false"
  authState: "casdoor"
  socks5Proxy: "127.0.0.1:10808"
  verificationCodeTimeout: "10"
  logPostOnly: "true"
  isUsernameLowered: "false"
  batchSize: "100"
  enableErrorMask: "false"
  enableGzip: "true"
  quota: '{"organization": -1, "user": -1, "application": -1, "provider": -1}'
  logConfig: '{"filename": "logs/casdoor.log", "maxdays": 99999, "perm": "0770"}'
  initDataFile: {{ .Values.auth.backend.initDataFile | default "./init_data.json" | quote }}
  # redisEndpoint (Casdoor beego redis session provider connection string) is intentionally
  # NOT set here. Exactly like the DB dataSourceName, it embeds a secret (REDIS_PASSWORD),
  # so it is assembled at runtime in the Deployment command from the REDIS_HOST/
  # REDIS_POOL_SIZE/REDIS_DB env vars (auth ConfigMap) and the REDIS_PASSWORD env var
  # (auth Secret via secretKeyRef), keeping the password out of any ConfigMap.
