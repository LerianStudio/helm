{{- $bankTransfer := .Values.bankTransfer | default dict }}
{{- $migrations := get $bankTransfer "migrations" | default dict }}
{{- $configmap := get $bankTransfer "configmap" | default dict }}
{{- $postgresql := .Values.postgresql | default dict }}
{{- $secrets := get $bankTransfer "secrets" | default dict }}
{{- $migrationsEnabled := and (eq (lower (toString (get $bankTransfer "enabled" | default false))) "true") (eq (lower (toString (get $migrations "enabled" | default false))) "true") }}
{{- $internalPg := and (eq (lower (toString (get $postgresql "enabled" | default false))) "true") (not (eq (lower (toString (get $postgresql "external" | default false))) "true")) }}
{{- $migUseExisting := eq (lower (toString (get $migrations "useExistingSecret" | default false))) "true" }}
{{- $appUseExisting := eq (lower (toString (get $bankTransfer "useExistingSecret" | default false))) "true" }}
{{- $multiTenant := eq (lower (toString (get $configmap "MULTI_TENANT_ENABLED" | default "false"))) "true" }}
{{- /* Minimal, migration-only Secret. Rendered ONLY for: migrations enabled, chart-managed
     credential (no existing Secret), EXTERNAL Postgres, single-tenant. In that case the
     migration runs as a pre-install/pre-upgrade hook BEFORE the normal application Secret
     (secrets.yaml) exists, so it needs its own credential available early. It carries ONLY
     POSTGRES_PASSWORD — the full application Secret stays a normal (non-hook) resource so
     sensitive runtime keys are never left behind as orphaned hooks on uninstall. */}}
{{- if and $migrationsEnabled (not $internalPg) (not $migUseExisting) (not $appUseExisting) (not $multiTenant) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-migrations" (include "bank-transfer.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "bank-transfer.labels" (dict "context" . "component" "migrations" "name" (get $bankTransfer "name")) | nindent 4 }}
  annotations:
    # Pre-install/pre-upgrade hook (weight -5) so it exists before the migration Job
    # (weight -1). Holds ONLY POSTGRES_PASSWORD; see the comment above for why the full
    # application Secret is intentionally NOT a hook.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/sync-wave": "-5"
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ include "bank-transfer.migrationPostgresPassword" . | quote }}
{{- end }}
