apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "plugin-auth-backend.fullname" . }}-migrations
  annotations:
    helm.sh/hook: pre-upgrade, post-install
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    spec:
    {{- with .Values.auth.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      initContainers:
      - name: wait-for-dependencies
        image: busybox
        envFrom:
        - configMapRef:
            name: {{ include "plugin-auth.fullname" . }}
        command:
          - /bin/sh
          - -c
          - >
            for svc in "$DB_HOST:$DB_PORT" "$REDIS_HOST:$REDIS_PORT";
            do
              echo "Checking $svc...";
              while ! nc -z $(echo $svc | cut -d: -f1) $(echo $svc | cut -d: -f2); do
                echo "$svc is not ready yet, waiting...";
                sleep 5;
              done;
              echo "$svc is ready!";
            done;
      containers:
        - name: migrate
          {{- $migrationImage := .Values.auth.backend.migrations.image -}}
          {{- if kindIs "string" $migrationImage }}
          image: {{ $migrationImage | quote }}
          imagePullPolicy: Always
          {{- else }}
          image: "{{ $migrationImage.repository | default "ghcr.io/lerianstudio/casdoor-migrations" }}:{{ $migrationImage.tag | default "latest" }}"
          imagePullPolicy: {{ $migrationImage.pullPolicy | default "Always" }}
          {{- end }}
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_USER
            {{- include "plugin-auth.dbPasswordEnv" (dict "context" $ "envName" "DB_PASS") | nindent 12 }}
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_SSLMODE
            # POSTGRES_* mirrors of the DB_* vars above, mapped from the same
            # ConfigMap/Secret keys. The caradhras migration runner
            # (cmd/postgres-migrations) reads POSTGRES_HOST/PORT/USER/PASSWORD/DB/SSLMODE
            # instead of Casdoor's DB_* contract; keeping both sets lets this single
            # Job template run either migrations image via auth.backend.migrations.image,
            # with no functional effect on casdoor-migrations (which ignores POSTGRES_*).
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_USER
            {{- include "plugin-auth.dbPasswordEnv" (dict "context" $ "envName" "POSTGRES_PASSWORD") | nindent 12 }}
            - name: POSTGRES_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "plugin-auth.fullname" . }}
                  key: DB_SSLMODE
      restartPolicy: OnFailure