{{- if .Values.crm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "midaz-crm.fullname" . }}
  labels:
    {{- include "midaz-crm.labels" (dict "context" . "name" .Values.crm.name ) | nindent 4 }}
data:
  # -- Default Environment variables for CRM
  ENV_NAME: {{ .Values.crm.configmap.ENV_NAME | default "development" | quote }}

  # APP
  SERVER_PORT: {{ .Values.crm.configmap.SERVER_PORT | default "4003" | quote }}
  SERVER_ADDRESS: {{ .Values.crm.configmap.SERVER_ADDRESS | default ":4003" | quote }}
  VERSION: {{ .Values.crm.image.tag | default .Chart.AppVersion | quote }}

  # Mongo DB
  MONGO_URI: {{ .Values.crm.configmap.MONGO_URI | default "mongodb" | quote }}
  MONGO_HOST: {{ .Values.crm.configmap.MONGO_HOST | default "midaz-mongodb" | quote }}
  MONGO_PORT: {{ .Values.crm.configmap.MONGO_PORT | default "27017" | quote }}
  MONGO_NAME: {{ .Values.crm.configmap.MONGO_NAME | default "crm" | quote }}
  MONGO_USER: {{ .Values.crm.configmap.MONGO_USER | default "midaz" | quote }}
  MONGO_MAX_POOL_SIZE: {{ .Values.crm.configmap.MONGO_MAX_POOL_SIZE | default "1000" | quote }}
  MONGO_PARAMETERS: {{ .Values.crm.configmap.MONGO_PARAMETERS | default "" | quote }}

  # SWAGGER
  SWAGGER_TITLE: {{ .Values.crm.configmap.SWAGGER_TITLE | default "CRM" | quote }}
  SWAGGER_DESCRIPTION: {{ .Values.crm.configmap.SWAGGER_DESCRIPTION | default "The CRM API provides a set of endpoints for managing holder data, including information related to their ledger accounts." | quote }}
  SWAGGER_VERSION: {{ .Values.crm.image.tag | default .Chart.AppVersion | quote }}
  SWAGGER_HOST: {{ .Values.crm.configmap.SWAGGER_HOST | default ":4003" | quote }}
  SWAGGER_BASE_PATH: {{ .Values.crm.configmap.SWAGGER_BASE_PATH | default "/" | quote }}
  SWAGGER_SCHEMES: {{ .Values.crm.configmap.SWAGGER_SCHEMES | default "http" | quote }}
  SWAGGER_LEFT_DELIMITER: {{ .Values.crm.configmap.SWAGGER_LEFT_DELIMITER | default "{{" | quote }}
  SWAGGER_RIGHT_DELIMITER: {{ .Values.crm.configmap.SWAGGER_RIGHT_DELIMITER | default "}}" | quote }}

  # LOG LEVEL
  LOG_LEVEL: {{ .Values.crm.configmap.LOG_LEVEL | default "debug" | quote }}

  # OPEN TELEMETRY
  OTEL_RESOURCE_SERVICE_NAME: {{ .Values.crm.configmap.OTEL_RESOURCE_SERVICE_NAME | default "midaz-crm" | quote }}
  OTEL_LIBRARY_NAME: {{ .Values.crm.configmap.OTEL_LIBRARY_NAME | default "github.com/LerianStudio/plugin-crm" | quote }}
  OTEL_RESOURCE_SERVICE_VERSION: {{ .Values.crm.image.tag | default .Chart.AppVersion | quote }}
  OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: {{ .Values.crm.configmap.ENV_NAME | default "development" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT_PORT: {{ .Values.crm.configmap.OTEL_EXPORTER_OTLP_ENDPOINT_PORT | default "4317" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.crm.configmap.OTEL_EXPORTER_OTLP_ENDPOINT | default "midaz-grafana:4317" | quote }}
  ENABLE_TELEMETRY: {{ .Values.crm.configmap.ENABLE_TELEMETRY | default "true" | quote }}

  # AUTH
  PLUGIN_AUTH_ADDRESS: {{ .Values.crm.configmap.PLUGIN_AUTH_ADDRESS | default "plugin-auth" | quote }}
  PLUGIN_AUTH_ENABLED: {{ .Values.crm.configmap.PLUGIN_AUTH_ENABLED | default "false" | quote }}

  # Rate Limiting - Three-tier system with Redis backend
  # Set RATE_LIMIT_ENABLED=false to disable (requires ALLOW_RATELIMIT_DISABLED in strict tier)
  # ALLOW_RATELIMIT_DISABLED: Set a detailed reason message explaining why rate limiting is disabled (e.g., "Service processes batch jobs only, no user-facing API endpoints")
  # ALLOW_RATELIMIT_FAIL_OPEN: Set a detailed reason message to allow fail-open mode in production
  RATE_LIMIT_ENABLED: {{ .Values.crm.configmap.RATE_LIMIT_ENABLED | default "true" | quote }}
  RATE_LIMIT_MAX: {{ .Values.crm.configmap.RATE_LIMIT_MAX | default "500" | quote }}
  RATE_LIMIT_WINDOW_SEC: {{ .Values.crm.configmap.RATE_LIMIT_WINDOW_SEC | default "60" | quote }}
  AGGRESSIVE_RATE_LIMIT_MAX: {{ .Values.crm.configmap.AGGRESSIVE_RATE_LIMIT_MAX | default "100" | quote }}
  AGGRESSIVE_RATE_LIMIT_WINDOW_SEC: {{ .Values.crm.configmap.AGGRESSIVE_RATE_LIMIT_WINDOW_SEC | default "60" | quote }}
  RELAXED_RATE_LIMIT_MAX: {{ .Values.crm.configmap.RELAXED_RATE_LIMIT_MAX | default "1000" | quote }}
  RELAXED_RATE_LIMIT_WINDOW_SEC: {{ .Values.crm.configmap.RELAXED_RATE_LIMIT_WINDOW_SEC | default "60" | quote }}
  RATE_LIMIT_REDIS_TIMEOUT_MS: {{ .Values.crm.configmap.RATE_LIMIT_REDIS_TIMEOUT_MS | default "500" | quote }}
  ALLOW_RATELIMIT_DISABLED: {{ .Values.crm.configmap.ALLOW_RATELIMIT_DISABLED | default "" | quote }}
  ALLOW_RATELIMIT_FAIL_OPEN: {{ .Values.crm.configmap.ALLOW_RATELIMIT_FAIL_OPEN | default "" | quote }}

  # Extra Env Vars
  {{- with .Values.crm.extraEnvVars }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
