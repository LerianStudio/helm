{{- if not .Values.schedule.useExistingSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schedule.fullname" . }}
  labels:
    {{- include "schedule.labels" (dict "context" . "name" .Values.schedule.name ) | nindent 4 }}
type: Opaque
data:
  # PIX BTG service credentials used by the worker's OAuth2 client.
  # Operator/Vault-provided; when PLUGIN_AUTH is disabled locally these stay empty
  # and the worker treats auth as optional.
  PLUGIN_PIX_BTG_CLIENT_ID: {{ .Values.schedule.secrets.PLUGIN_PIX_BTG_CLIENT_ID | default "" | b64enc | quote }}
  PLUGIN_PIX_BTG_CLIENT_SECRET: {{ .Values.schedule.secrets.PLUGIN_PIX_BTG_CLIENT_SECRET | default "" | b64enc | quote }}
{{- end }}
