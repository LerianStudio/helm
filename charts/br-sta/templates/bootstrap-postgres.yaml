{{- if .Values.global.externalPostgresDefinitions.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "br-sta.fullname" . }}-bootstrap-postgres
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "br-sta.labels" (dict "context" .) | nindent 4 }}
    app.kubernetes.io/component: bootstrap-postgres
spec:
  ttlSecondsAfterFinished: 300
  completions: 1
  parallelism: 1
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37
          env:
            - name: DB_HOST
              value: {{ .Values.global.externalPostgresDefinitions.connection.host | quote }}
            - name: DB_PORT
              value: {{ .Values.global.externalPostgresDefinitions.connection.port | quote }}
          command:
            - /bin/sh
            - -c
            - >
              TIMEOUT=300;
              ELAPSED=0;
              echo "Checking $DB_HOST:$DB_PORT...";
              while ! nc -z "$DB_HOST" "$DB_PORT"; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "Timeout waiting for $DB_HOST:$DB_PORT after ${TIMEOUT}s";
                  exit 1;
                fi;
                echo "$DB_HOST:$DB_PORT not ready, waiting (${ELAPSED}s/${TIMEOUT}s)";
                sleep 5;
                ELAPSED=$((ELAPSED + 5));
              done;
              echo "$DB_HOST:$DB_PORT is ready!";
      containers:
        - name: psql
          image: postgres:17
          env:
            - name: DB_HOST
              value: {{ .Values.global.externalPostgresDefinitions.connection.host | quote }}
            - name: DB_PORT
              value: {{ .Values.global.externalPostgresDefinitions.connection.port | quote }}
            - name: DB_USER_ADMIN
              {{- if .Values.global.externalPostgresDefinitions.postgresAdminLogin.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalPostgresDefinitions.postgresAdminLogin.useExistingSecret.name | quote }}
                  key: DB_USER_ADMIN
              {{- else }}
              value: {{ .Values.global.externalPostgresDefinitions.postgresAdminLogin.username | quote }}
              {{- end }}
            - name: DB_ADMIN_PASSWORD
              {{- if .Values.global.externalPostgresDefinitions.postgresAdminLogin.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalPostgresDefinitions.postgresAdminLogin.useExistingSecret.name | quote }}
                  key: DB_ADMIN_PASSWORD
              {{- else }}
              value: {{ .Values.global.externalPostgresDefinitions.postgresAdminLogin.password | quote }}
              {{- end }}
            - name: DB_PASSWORD_BR_STA
              {{- if .Values.global.externalPostgresDefinitions.appCredentials.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalPostgresDefinitions.appCredentials.useExistingSecret.name | quote }}
                  key: DB_PASSWORD_BR_STA
              {{- else }}
              value: {{ .Values.global.externalPostgresDefinitions.appCredentials.password | quote }}
              {{- end }}
            - name: DB_DATABASE
              value: postgres
            - name: APP_DB
              value: br_sta
            - name: APP_ROLE
              value: br_sta
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              echo "=== br-sta PostgreSQL Bootstrap ==="
              echo "Host: $DB_HOST:$DB_PORT"
              echo ""

              echo "Checking existing PostgreSQL objects..."
              DB_EXISTS=0
              ROLE_EXISTS=0

              if PGPASSWORD="$DB_ADMIN_PASSWORD" psql -At -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d "$DB_DATABASE" -c "SELECT 1 FROM pg_database WHERE datname='$APP_DB'" | grep -q 1; then
                DB_EXISTS=1
              fi
              if PGPASSWORD="$DB_ADMIN_PASSWORD" psql -At -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d "$DB_DATABASE" -c "SELECT 1 FROM pg_roles WHERE rolname='$APP_ROLE'" | grep -q 1; then
                ROLE_EXISTS=1
              fi

              if [ "$DB_EXISTS" = "1" ] && [ "$ROLE_EXISTS" = "1" ]; then
                echo "Bootstrap already complete (database '$APP_DB' and role '$APP_ROLE' exist). Skipping creation."
              else
                if [ "$ROLE_EXISTS" = "1" ]; then
                  echo "Role '$APP_ROLE' already exists. Skipping creation."
                else
                  echo "Creating role '$APP_ROLE'..."
                  PGPASSWORD="$DB_ADMIN_PASSWORD" psql -v ON_ERROR_STOP=1 -v pw="$DB_PASSWORD_BR_STA" -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d "$DB_DATABASE" -c "CREATE ROLE br_sta LOGIN PASSWORD :'pw'"
                fi

                if [ "$DB_EXISTS" = "1" ]; then
                  echo "Database '$APP_DB' already exists. Skipping creation."
                else
                  echo "Creating database '$APP_DB'..."
                  PGPASSWORD="$DB_ADMIN_PASSWORD" psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d "$DB_DATABASE" -c "CREATE DATABASE br_sta OWNER br_sta"
                fi
              fi

              # Privileges (idempotent)
              echo "Ensuring privileges and schema permissions..."
              PGPASSWORD="$DB_ADMIN_PASSWORD" psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d "$DB_DATABASE" -c "GRANT ALL PRIVILEGES ON DATABASE br_sta TO br_sta"
              PGPASSWORD="$DB_ADMIN_PASSWORD" psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d br_sta -c "GRANT ALL ON SCHEMA public TO br_sta"
              PGPASSWORD="$DB_ADMIN_PASSWORD" psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d br_sta -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO br_sta"
              PGPASSWORD="$DB_ADMIN_PASSWORD" psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d br_sta -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO br_sta"
              PGPASSWORD="$DB_ADMIN_PASSWORD" psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d br_sta -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO br_sta"
              PGPASSWORD="$DB_ADMIN_PASSWORD" psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER_ADMIN" -d br_sta -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO br_sta"

              echo ""
              echo "=== br-sta PostgreSQL Bootstrap completed successfully ==="
{{- end }}
