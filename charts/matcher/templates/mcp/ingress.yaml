{{- if and .Values.mcp.enabled .Values.mcp.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "matcher-mcp.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "matcher-mcp.labels" . | nindent 4 }}
  {{- with .Values.mcp.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.mcp.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.mcp.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required "mcp.ingress.host is required when mcp.ingress.enabled=true" .Values.mcp.ingress.host | quote }}
      secretName: {{ .Values.mcp.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ required "mcp.ingress.host is required when mcp.ingress.enabled=true" .Values.mcp.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "matcher-mcp.fullname" . }}
                port:
                  number: {{ .Values.mcp.service.port }}
{{- end }}
