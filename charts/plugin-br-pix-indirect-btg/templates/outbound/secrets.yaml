{{- if not .Values.outbound.useExistingSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "outbound.fullname" . }}
  labels:
    {{- include "outbound.labels" (dict "context" . "name" .Values.outbound.name ) | nindent 4 }}
type: Opaque
data:
  # -- Default sensitive variables for the plugin-br-pix-indirect-btg

  # DB Configuration
  # DB_PASSWORD / DB_REPLICA_PASSWORD single-sourced from the postgresql subchart Secret on the
  # bundled path; emitted here only when postgresql is external/disabled.
  {{- include "plugin-br-pix-indirect-btg.dbSecretData" (dict "context" . "component" "outbound") | nindent 2 }}

  # MongoDB Configuration
  # MONGO_PASSWORD single-sourced from the mongodb subchart Secret on the bundled path.
  {{- include "plugin-br-pix-indirect-btg.mongoSecretData" (dict "context" . "component" "outbound") | nindent 2 }}

{{- end }}
