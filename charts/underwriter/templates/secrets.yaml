{{- if and .Values.underwriter.enabled (not .Values.underwriter.useExistingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "underwriter.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "underwriter.labels" (dict "context" . "component" .Values.underwriter.name "name" .Values.underwriter.name) | nindent 4 }}
type: Opaque
stringData:
  {{- /*
  Suppress infra credentials that are single-sourced from the Bitnami subchart Secret.
  When postgresql is internal (no existingSecret), POSTGRES_PASSWORD/POSTGRES_REPLICA_PASSWORD
  live ONLY in the postgresql subchart Secret; when valkey is internal with auth (no
  existingSecret), REDIS_PASSWORD lives ONLY in the valkey subchart Secret. Emitting them here
  too would double-define the env (forbidden by docs/helm-chart-standard.md). They are still
  emitted for external infra without an existingSecret (operator-provided password).
  */}}
  {{- $pg := .Values.postgresql | default dict }}
  {{- $pgAuth := $pg.auth | default dict }}
  {{- $pgInternal := and (ne (toString $pg.enabled) "false") (not $pg.external) }}
  {{- $suppressPg := or $pgInternal $pgAuth.existingSecret }}
  {{- $vk := .Values.valkey | default dict }}
  {{- $vkAuth := $vk.auth | default dict }}
  {{- $vkInternal := and (ne (toString $vk.enabled) "false") (not $vk.external) $vkAuth.enabled }}
  {{- $suppressVk := or $vkInternal $vkAuth.existingSecret }}
  {{- range $key, $value := .Values.underwriter.secrets }}
  {{- if $value }}
  {{- if and $suppressPg (or (eq $key "POSTGRES_PASSWORD") (eq $key "POSTGRES_REPLICA_PASSWORD")) }}
  {{- else if and $suppressVk (eq $key "REDIS_PASSWORD") }}
  {{- else }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
