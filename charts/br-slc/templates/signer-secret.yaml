{{- /*
Signer-scoped Secret (ADR-9 custody): signing-key material is injected only into
the signer container (via its own envFrom/secretKeyRef), so the app container
never receives it in its environment. NOTE: this is process-level scoping, not an
RBAC boundary — any principal with `get` on Secrets in this namespace can still
read it; add a dedicated Secret-read RBAC boundary if that isolation is required.
Only rendered when this chart owns it (signer.secrets.create=true). The BYOC default
(signer.secrets.create=false) references an externally managed Secret via
signer.secrets.existingSecretName instead — see br-slc.signerSecretName in
_helpers.tpl. Never bake real values into values.yaml; supply them via
--set-string/-f at install time when create=true.
*/ -}}
{{- if .Values.signer.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "br-slc.signerSecretName" . }}
  labels:
    {{- include "br-slc.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.signer.secrets.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
