# Default values for plugin-bc-correios components.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
nameOverride: "bc-correios"
fullnameOverride: ""
namespaceOverride: ""
global:
  # -- Bootstrap job for external PostgreSQL: creates databases, roles, and grants privileges
  externalPostgresDefinitions:
    # -- Enable or disable the PostgreSQL bootstrap job
    enabled: false
    # -- PostgreSQL connection settings
    connection:
      # -- PostgreSQL host
      host: "plugin-bc-correios-postgresql"
      # -- PostgreSQL port
      port: "5432"
    # -- Admin credentials for PostgreSQL
    postgresAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing DB_USER_ADMIN and DB_ADMIN_PASSWORD keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "postgres"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: "lerian"
    # -- Credentials for bc_correios role created by the job
    bcCorreiosCredentials:
      useExistingSecret:
        # -- Name of existing secret containing DB_PASSWORD_BC_CORREIOS key
        name: ""
      # -- Password for bc_correios role (ignored if useExistingSecret.name is set)
      password: "lerian"
  # -- Bootstrap job for external RabbitMQ: creates users, vhosts, and permissions
  externalRabbitmqDefinitions:
    # -- Enable or disable the RabbitMQ bootstrap job
    enabled: false
    # -- RabbitMQ connection settings
    connection:
      # -- RabbitMQ protocol (http or https)
      protocol: "http"
      # -- RabbitMQ host (management API endpoint)
      host: "plugin-bc-correios-rabbitmq"
      # -- RabbitMQ HTTP management port
      port: "15672"
      # -- RabbitMQ AMQP port (for connectivity check)
      portAmqp: "5672"
      # -- Skip TLS verification for self-signed certificates (not recommended for production)
      skipTlsVerify: false
    # -- Admin credentials for RabbitMQ management API
    rabbitmqAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing RABBITMQ_ADMIN_USER and RABBITMQ_ADMIN_PASS keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "admin"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: "lerian"
bc-correios:
  # -- Service name
  name: bc-correios
  # -- Enable or disable the bc-correios service
  enabled: true
  # -- Number of replicas for the bc-correios service
  replicaCount: 2
  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10
  image:
    # -- Repository for the bc-correios service container image
    repository: ghcr.io/lerianstudio/plugin-bc-correios
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag used for deployment
    tag: "1.0.0"
  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []
  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""
  # -- Pod annotations for additional metadata
  podAnnotations: {}
  podSecurityContext: {}
  # fsGroup: 2000

  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true
  # -- PodDisruptionBudget configuration
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Minimum number of available pods
    minAvailable: 1
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Annotations for the PodDisruptionBudget
    annotations: {}
  # -- Deployment update strategy
  deploymentUpdate:
    # -- Type of deployment strategy
    type: RollingUpdate
    # -- Maximum number of pods that can be created over the desired number of pods
    maxSurge: 100%
    # -- Maximum number of pods that can be unavailable during the update
    maxUnavailable: 0
  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Port for the HTTP API
    port: 9090
    annotations: {}
  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: "alb"
    # -- Additional ingress annotations
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
    hosts:
      - host: "bc-correios.dev.lerian.io"
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for ingress
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 500m
      memory: 512Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 2
    # -- Maximum number of replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}
  # -- Tolerations for scheduling on tainted nodes
  tolerations: []
  # -- Affinity rules for pod scheduling
  affinity: {}
  # -- Host aliases for custom DNS resolution inside the pod
  # Useful for resolving private/internal hostnames not available via cluster DNS
  # Example:
  # hostAliases:
  #   - ip: "0.0.0.0"
  #     hostnames:
  #       - "correios.com.br"
  hostAliases: []
  # -- ConfigMap for environment variables and configurations
  # @default -- templates/configmap.yaml
  configmap:
    # Application Settings
    APP_ENV: "development"
    APP_NAME: "plugin-bc-correios"
    APP_VERSION: "1.0.0"
    LOG_LEVEL: "info"
    SERVER_PORT: "9090"
    SERVER_READ_TIMEOUT_SEC: "30"
    SERVER_WRITE_TIMEOUT_SEC: "30"
    SERVER_SHUTDOWN_TIMEOUT_SEC: "30"
    # CORS / Proxy
    ALLOWED_ORIGINS: "*"
    TRUSTED_PROXIES: "127.0.0.1,::1"
    # PostgreSQL
    POSTGRES_HOST: "plugin-bc-correios-postgresql"
    POSTGRES_PORT: "5432"
    POSTGRES_USER: "plugin-bc-correios"
    POSTGRES_NAME: "plugin-bc-correios"
    POSTGRES_SSLMODE: "disable"
    POSTGRES_MAX_CONNS: "50"
    POSTGRES_MIN_CONNS: "5"
    # RabbitMQ
    RABBITMQ_USER: "plugin-bc-correios"
    RABBITMQ_HOST: "plugin-bc-correios-rabbitmq"
    # Cache (Valkey)
    CACHE_ADDR: "plugin-bc-correios-valkey-master:6379"
    CACHE_TTL_SEC: "60"
    # Object Storage (SeaweedFS S3)
    OBJECT_STORAGE_PROVIDER: "s3"
    OBJECT_STORAGE_ENDPOINT: "http://plugin-bc-correios-seaweedfs:8333"
    OBJECT_STORAGE_BUCKET: "bc-correios-attachments"
    OBJECT_STORAGE_PATH_STYLE: "true"
    # BC Correio integration
    BC_CORREIO_ENVIRONMENT: "homologation"
    BC_CORREIO_RATE_LIMIT_PER_MINUTE: "50"
    BC_CORREIO_RATE_LIMIT_PER_HOUR: "2700"
    BC_CORREIO_RETRY_MAX_RETRIES: "3"
    BC_CORREIO_TLS_MIN_VERSION: "TLSv1.2"
    # Plugin Auth
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_HOST: ""
    PLUGIN_AUTH_CLIENT_ID: "plugin-bc-correios"
    # License
    LICENSE_KEY: ""
    # AI Insights
    FEATURE_AI_INSIGHTS_ENABLED: "true"
    AI_TENANT_RATE_LIMIT_PER_MIN: "50"
    AI_TENANT_MAX_CONCURRENT: "3"
    AI_GLOBAL_MAX_CONCURRENT: "15"
    # Multi-tenancy
    MULTI_TENANT_ENABLED: "false"
    MULTI_TENANT_URL: ""
    DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"
    # Observability
    TRACING_ENABLED: "false"
    METRICS_ENABLED: "false"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  # -- Secrets for storing sensitive data
  # @default -- templates/secrets.yaml
  secrets:
    # PostgreSQL credentials
    POSTGRES_PASSWORD: "lerian"
    # RabbitMQ credentials
    RABBITMQ_PASS: "lerian"
    RABBITMQ_URL: "amqp://plugin-bc-correios:lerian@plugin-bc-correios-rabbitmq:5672/"
    # AES-256 encryption key (32 bytes — override with a real key in production)
    ENCRYPTION_KEY: "01234567890123456789012345678901"
    # Cache (Valkey) credentials
    CACHE_PASSWORD: ""
    # Object storage credentials
    OBJECT_STORAGE_ACCESS_KEY: ""
    OBJECT_STORAGE_SECRET_KEY: ""
    # Plugin Auth M2M client secret (optional)
    # PLUGIN_AUTH_CLIENT_SECRET: ""
  # -- Existing secrets name
  useExistingSecret: false
  existingSecretName: ""
  # -- Extra environment variables (map of key: value pairs)
  extraEnvVars: {}
  serviceAccount:
    # -- Specifies whether a ServiceAccount should be created
    create: true
    # -- Annotations for the ServiceAccount
    annotations: {}
    # -- Name of the service account
    # @default -- `bc-correios.fullname`
    name: ""
# Valkey (Redis-compatible) configuration
valkey:
  enabled: true
  global:
    security:
      allowInsecureImages: false
  image:
    repository: bitnami/valkey
    tag: "8.0.2"
  external: false
  architecture: standalone
  auth:
    enabled: true
    password: lerian
    username: bc_correios
  primary:
    kind: Deployment
    resourcesPreset: "medium"
    persistence:
      enabled: false
    extraFlags:
      - "--maxmemory 256mb"
      - "--maxmemory-policy allkeys-lru"
      - "--hz 100"
      - "--maxclients 1000"
# PostgreSQL configuration
postgresql:
  enabled: true
  global:
    security:
      allowInsecureImages: false
  image:
    repository: bitnami/postgresql
    tag: "17.4.0"
  external: false
  architecture: standalone
  auth:
    enabled: true
    enablePostgresUser: true
    postgresPassword: "lerian"
    username: "plugin-bc-correios"
    password: "lerian"
    database: "plugin-bc-correios"
  primary:
    persistence:
      size: 8Gi
    resourcesPreset: medium
    extraEnvVars:
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "200"
# RabbitMQ configuration
rabbitmq:
  enabled: true
  image:
    tag: "4.0.5"
  persistence:
    size: 4Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile: {type: RuntimeDefault}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities: {drop: ["ALL"]}
  authentication:
    user:
      value: "plugin-bc-correios"
    password:
      value: "lerian"
    erlangCookie:
      value: "BcCorreiosErlangCookiePlaceholderChangeMe=="
  extraSecrets:
    - name: "bc-correios-rabbitmq-load-definition"
      mountPath: /etc/rabbitmq/definitions
  customConfig: |
    management.load_definitions = /etc/rabbitmq/definitions/load_definition.json
# SeaweedFS (inline — no external subchart)
seaweedfs:
  enabled: true
  image:
    repository: chrislusf/seaweedfs
    tag: "3.80"
    pullPolicy: IfNotPresent
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
# CI/CD image tag — auto-updated by the build pipeline via helm_values_key_mappings.
# The pipeline sets .bc-correios.image.tag via gitops. The main bc-correios block above
# already contains image.tag; this comment documents the CI/CD mapping:
#   helm_values_key_mappings: '{"plugin-bc-correios": "bc-correios"}'
# No duplicate key needed — the pipeline targets the bc-correios block directly.

br-spb-bc-correios:
  image:
    tag: 1.0.0
