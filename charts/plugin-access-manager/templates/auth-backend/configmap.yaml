kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "plugin-auth-backend.fullname" . }}
data:
  appname: plugin-auth-casdoor-backend
  runmode: dev
  httpport: "8000"
  driverName: "postgres"
  dbName: casdoor
  showSql: "false"
  authState: "casdoor"
  socks5Proxy: "127.0.0.1:10808"
  verificationCodeTimeout: "10"
  logPostOnly: "true"
  isUsernameLowered: "false"
  batchSize: "100"
  enableErrorMask: "false"
  enableGzip: "true"
  quota: '{"organization": -1, "user": -1, "application": -1, "provider": -1}'
  logConfig: '{"filename": "logs/casdoor.log", "maxdays": 99999, "perm": "0770"}'
  initDataFile: {{ .Values.auth.backend.initDataFile | default "./init_data.json" | quote }}
  # redisEndpoint (Casdoor redis session provider connection string) is intentionally NOT
  # set here: it embeds REDIS_PASSWORD, so it is rendered into the
  # {{ include "plugin-auth-backend.fullname" . }}-casdoor-redis Secret and injected into the
  # Deployment as the `redisEndpoint` env var via secretKeyRef.
