{{- if .Values.ledger.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "midaz-ledger.fullname" . }}
  labels:
    {{- include "midaz.labels" (dict "context" . "component" .Values.ledger.name "name" .Values.ledger.name ) | nindent 4 }}
  annotations:
    # Deploy the app after the migration Job (wave 1) has completed.
    argocd.argoproj.io/sync-wave: "2"
spec:
  revisionHistoryLimit: {{ .Values.ledger.revisionHistoryLimit | default 10 }}
  strategy:
    type: {{ .Values.ledger.deploymentUpdate.type }}
    {{- if eq .Values.ledger.deploymentUpdate.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.ledger.deploymentUpdate.maxSurge }}
      maxUnavailable: {{ .Values.ledger.deploymentUpdate.maxUnavailable }}
    {{- end }}
  {{- if not .Values.ledger.autoscaling.enabled }}
  replicas: {{ .Values.ledger.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "midaz.selectorLabels" (dict "context" . "name" .Values.ledger.name ) | nindent 6 }}
  template:
    metadata:
      {{- with .Values.ledger.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "midaz.labels" (dict "context" . "component" .Values.ledger.name "name" .Values.ledger.name ) | nindent 8 }}
    spec:
      {{- with .Values.ledger.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "midaz-ledger.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.ledger.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37
          envFrom:
          - configMapRef:
              name: {{ include "midaz-ledger.fullname" . }}
          command:
            - /bin/sh
            - -c
            - >
              TIMEOUT={{ dig "initContainer" "timeoutSeconds" 300 .Values.ledger }};
              MONGO_ONBOARDING_PORT_CLEAN=$(echo "$MONGO_ONBOARDING_PORT" | sed 's/[^0-9].*//');
              MONGO_TRANSACTION_PORT_CLEAN=$(echo "$MONGO_TRANSACTION_PORT" | sed 's/[^0-9].*//');
              RABBITMQ_PORT_HOST_CLEAN=$(echo "$RABBITMQ_PORT_HOST" | sed 's/[^0-9].*//');
              for svc in "$DB_ONBOARDING_HOST:$DB_ONBOARDING_PORT" "$DB_ONBOARDING_REPLICA_HOST:$DB_ONBOARDING_REPLICA_PORT" "$DB_TRANSACTION_HOST:$DB_TRANSACTION_PORT" "$DB_TRANSACTION_REPLICA_HOST:$DB_TRANSACTION_REPLICA_PORT" "$RABBITMQ_HOST:$RABBITMQ_PORT_HOST_CLEAN" "$MONGO_ONBOARDING_HOST:$MONGO_ONBOARDING_PORT_CLEAN" "$MONGO_TRANSACTION_HOST:$MONGO_TRANSACTION_PORT_CLEAN";
              do
                echo "Checking $svc...";
                ELAPSED=0;
                while ! nc -z $(echo $svc | cut -d: -f1) $(echo $svc | cut -d: -f2); do
                  if [ $ELAPSED -ge $TIMEOUT ]; then
                    echo "Timeout waiting for $svc after ${TIMEOUT}s";
                    exit 1;
                  fi;
                  echo "$svc is not ready yet, waiting... (${ELAPSED}s/${TIMEOUT}s)";
                  sleep 5;
                  ELAPSED=$((ELAPSED + 5));
                done;
                echo "$svc is ready!";
              done;
      containers:
        - name: {{ include "midaz-ledger.fullname" . }}
          securityContext:
            {{- toYaml .Values.ledger.securityContext | nindent 12 }}
          image: "{{ .Values.ledger.image.repository }}:{{ .Values.ledger.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.ledger.image.pullPolicy }}
          envFrom:
          - secretRef:
              name: {{ if .Values.ledger.useExistingSecret }}{{ .Values.ledger.existingSecretName }}{{ else }}{{ include "midaz-ledger.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "midaz-ledger.fullname" . }}
          env:
            {{- $secretName := ternary .Values.ledger.existingSecretName (include "midaz-ledger.fullname" .) .Values.ledger.useExistingSecret }}
            {{/* PostgreSQL: single role `midaz` backs both onboarding and transaction; both
                 module passwords map to Bitnami key `password`, both replicas to `replication-password`. */}}
            {{- $pg := .Values.postgresql | default dict }}
            {{- $pgAuth := $pg.auth | default dict }}
            {{- if or (and (ne (toString $pg.enabled) "false") (not $pg.external)) $pgAuth.existingSecret }}
            {{- include "midaz.infraSecretRef" (dict "context" $ "subchart" "postgresql" "key" "password" "envName" "DB_ONBOARDING_PASSWORD") | nindent 12 }}
            {{- include "midaz.infraSecretRef" (dict "context" $ "subchart" "postgresql" "key" "password" "envName" "DB_TRANSACTION_PASSWORD") | nindent 12 }}
            {{- include "midaz.infraSecretRef" (dict "context" $ "subchart" "postgresql" "key" "replication-password" "envName" "DB_ONBOARDING_REPLICA_PASSWORD") | nindent 12 }}
            {{- include "midaz.infraSecretRef" (dict "context" $ "subchart" "postgresql" "key" "replication-password" "envName" "DB_TRANSACTION_REPLICA_PASSWORD") | nindent 12 }}
            {{- else }}
            {{- if .Values.ledger.secrets.DB_ONBOARDING_PASSWORD }}
            - name: DB_ONBOARDING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: DB_ONBOARDING_PASSWORD
            {{- end }}
            {{- if .Values.ledger.secrets.DB_TRANSACTION_PASSWORD }}
            - name: DB_TRANSACTION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: DB_TRANSACTION_PASSWORD
            {{- end }}
            {{- if .Values.ledger.secrets.DB_ONBOARDING_REPLICA_PASSWORD }}
            - name: DB_ONBOARDING_REPLICA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: DB_ONBOARDING_REPLICA_PASSWORD
            {{- end }}
            {{- if .Values.ledger.secrets.DB_TRANSACTION_REPLICA_PASSWORD }}
            - name: DB_TRANSACTION_REPLICA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: DB_TRANSACTION_REPLICA_PASSWORD
            {{- end }}
            {{- end }}
            {{/* MongoDB: app authenticates as root; both module passwords map to `mongodb-root-password`. */}}
            {{- include "midaz.mongodbAuthRequired" . }}
            {{- $mongo := .Values.mongodb | default dict }}
            {{- $mongoAuth := $mongo.auth | default dict }}
            {{- if or (and (ne (toString $mongo.enabled) "false") (not $mongo.external)) $mongoAuth.existingSecret }}
            {{- include "midaz.infraSecretRef" (dict "context" $ "subchart" "mongodb" "key" "mongodb-root-password" "envName" "MONGO_ONBOARDING_PASSWORD") | nindent 12 }}
            {{- include "midaz.infraSecretRef" (dict "context" $ "subchart" "mongodb" "key" "mongodb-root-password" "envName" "MONGO_TRANSACTION_PASSWORD") | nindent 12 }}
            {{- else }}
            {{- if .Values.ledger.secrets.MONGO_ONBOARDING_PASSWORD }}
            - name: MONGO_ONBOARDING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MONGO_ONBOARDING_PASSWORD
            {{- end }}
            {{- if .Values.ledger.secrets.MONGO_TRANSACTION_PASSWORD }}
            - name: MONGO_TRANSACTION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MONGO_TRANSACTION_PASSWORD
            {{- end }}
            {{- end }}
            {{/* Valkey: REDIS_PASSWORD maps to Bitnami key `valkey-password`. */}}
            {{- $vk := .Values.valkey | default dict }}
            {{- $vkAuth := $vk.auth | default dict }}
            {{- if or (and (ne (toString $vk.enabled) "false") (not $vk.external) $vkAuth.enabled) $vkAuth.existingSecret }}
            {{- include "midaz.infraSecretRef" (dict "context" $ "subchart" "valkey" "key" "valkey-password" "envName" "REDIS_PASSWORD") | nindent 12 }}
            {{- else if .Values.ledger.secrets.REDIS_PASSWORD }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: REDIS_PASSWORD
            {{- end }}
            {{- $otel := index .Values "otel-collector-lerian" }}
            {{- if $otel.enabled }}
            - name: "POD_IP"
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: "HOST_IP"
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
              value: "$(HOST_IP):4317"
            - name: "OTEL_RESOURCE_ATTRIBUTES"
              value: "k8s.pod.ip=$(POD_IP)"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ledger.service.port | default 3002 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.ledger.livenessProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.ledger.livenessProbe.initialDelaySeconds | default 0 }}
            periodSeconds: {{ .Values.ledger.livenessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.ledger.livenessProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.ledger.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.ledger.livenessProbe.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.ledger.readinessProbe.path | default "/readyz" }}
              port: http
            initialDelaySeconds: {{ .Values.ledger.readinessProbe.initialDelaySeconds | default 0 }}
            periodSeconds: {{ .Values.ledger.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.ledger.readinessProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.ledger.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.ledger.readinessProbe.failureThreshold | default 3 }}
          resources:
            {{- toYaml .Values.ledger.resources | nindent 12 }}
      {{- with .Values.ledger.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ledger.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ledger.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
