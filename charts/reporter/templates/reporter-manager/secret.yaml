apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reporter-helm.fullname" . }}-reporter-manager
  labels:
    {{- include "reporter-helm.labels" . | nindent 4 }}
    app.kubernetes.io/component: reporter-manager
type: Opaque
data:
  FETCHER_M2M_CLIENT_SECRET: {{ .Values.manager.secrets.FETCHER_M2M_CLIENT_SECRET | default "" | b64enc | quote }}
  # Extra Secret Vars
  {{- if .Values.manager.extraSecretVars }}
  {{- toYaml .Values.manager.extraSecretVars | nindent 2 }}
  {{- end }}
