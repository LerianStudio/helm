# =============================================================================
# Plugin BR Pix Switch — Multi-Component Helm Values
#
# This chart deploys all 10 components of the plugin-br-pix-switch app:
#
#   spi/api                  Single Person Interface (PIX SPI)
#   spi/systemplane/api      Runtime config plane for SPI
#   adapter-btg-mock/api     BTG provider mock (dev/staging only)
#   dict/hub/api             DICT hub (key directory operations)
#   dict/hub/vsync           DICT verification sync worker
#   dict/proxy/api           DICT proxy to BCB
#   dict/systemplane/api     Runtime config plane for DICT
#   cob/hub/api              COB hub (BR Code / charge operations)
#   cob/proxy/api            COB proxy to BCB
#   cob/systemplane/api      Runtime config plane for COB
#
# Each component is independently enabled/disabled and configured.
# All components share the same Docker image (parameterized by APP_NAME +
# COMPONENT_NAME build args), so image.tag is shared by default but can be
# overridden per component.
#
# Pattern adapted from helm/charts/plugin-access-manager and helm/charts/midaz.
# =============================================================================

# Override the chart name in resource names
nameOverride: ""
fullnameOverride: ""

# Override the namespace where resources are created. Defaults to
# .Release.Namespace (the -n flag passed to helm install).
namespaceOverride: ""

# =============================================================================
# GLOBAL DEFAULTS — applied to all components unless overridden in their block
# =============================================================================
global:
  # -- Image pull secrets propagated to every component when the component's
  # own `imagePullSecrets` list is empty.
  imagePullSecrets: []

  # ---------------------------------------------------------------------------
  # External PostgreSQL bootstrap
  # ---------------------------------------------------------------------------
  # When enabled, a Job runs for each database in `databases`, creating the
  # role + database + grants if they don't exist (idempotent).
  #
  # Use cases:
  #   - In-cluster Postgres subchart (postgresql.enabled=true) AND you want
  #     the chart to create the 3 pix-switch databases for you. Set
  #     connection.host to the in-cluster service name
  #     (plugin-br-pix-switch-postgresql).
  #   - External Postgres (RDS, Cloud SQL, etc.) where the operator wants the
  #     chart to provision the role+databases. The admin credentials below
  #     must have privilege to CREATE ROLE / CREATE DATABASE on the target
  #     server.
  #
  # CREDENTIALS:
  #   - postgresAdminLogin: admin user used by the Job to provision objects.
  #     For production, store admin password in an external Secret and set
  #     useExistingSecret.name (the Job reads DB_USER_ADMIN + DB_ADMIN_PASSWORD
  #     from that Secret). Never put real admin passwords in values.yaml.
  #   - pixswitchCredentials: app user the Job creates. Provide the password
  #     through explicit values or an existing Secret. Component DATABASE_URL
  #     values live under component `secrets`, not `configmap`.
  externalPostgresDefinitions:
    enabled: false
    # -- Databases to create (one Job per database). pix-switch needs 3.
    databases:
      - pix-spi
      - pix-dict
      - pix-cob
      - pix-adapter-lerian
    connection:
      host: ""
      port: "5432"
    # -- Postgres admin credentials (used to create role+databases)
    postgresAdminLogin:
      useExistingSecret:
        name: ""   # PRODUCTION: set this, leave password empty
      username: "postgres"
      password: ""   # required when useExistingSecret.name is empty
    # -- Application credentials for the role created by the bootstrap Job
    pixswitchCredentials:
      useExistingSecret:
        name: ""   # PRODUCTION: set this, leave password empty
      username: "pixswitch"
      password: ""

  # ---------------------------------------------------------------------------
  # External MongoDB bootstrap
  # ---------------------------------------------------------------------------
  # Creates the pixswitch user with readWrite roles on the listed databases.
  # Only dict-hub uses Mongo today (pix-dict). pix-cob is included as a
  # forward-compat slot in case cob-hub adopts Mongo later.
  #
  # CREDENTIALS:
  #   - mongoAdminLogin: root admin user used by the Job. For production,
  #     store admin password in an external Secret (useExistingSecret.name).
  #   - pixswitchCredentials: app user the Job creates. Provide the password
  #     through explicit values or an existing Secret. dictHub.MONGO_URL lives
  #     under `dictHub.secrets`, not `dictHub.configmap`.
  externalMongoDefinitions:
    enabled: false
    connection:
      host: ""
      port: "27017"
    mongoAdminLogin:
      useExistingSecret:
        name: ""   # PRODUCTION: set this, leave password empty
      username: "root"
      password: ""
    pixswitchCredentials:
      useExistingSecret:
        name: ""   # PRODUCTION: set this, leave password empty
      username: "pixswitch"
      password: ""
      # -- Roles granted to the pixswitch user
      roles:
        - role: readWrite
          db: pix-dict
        - role: readWrite
          db: pix-cob

# =============================================================================
# COMPONENTS
# Each component renders its own Deployment, Service, ConfigMap, Secret, HPA,
# PDB, and (when ingress.enabled=true) Ingress.
# =============================================================================

# -----------------------------------------------------------------------------
# spi/api — PIX SPI service
# -----------------------------------------------------------------------------
spi:
  enabled: true
  name: "spi"
  description: "PIX SPI (Single Person Interface)"
  replicaCount: 1
  revisionHistoryLimit: 10

  image:
    # Defaults to the per-component image published from
    # apps/<path>/Dockerfile by the plugin-br-pix-switch build pipeline.
    # Override only when pinning to a different registry or fork.
    repository: "ghcr.io/lerianstudio/plugin-br-pix-switch-spi-api"
    pullPolicy: ""
    tag: ""

  imagePullSecrets: []

  # -- Override container entrypoint (e.g., to dispatch to a specific binary
  # inside a multi-binary image). When empty, the image's ENTRYPOINT is used.
  command: []
  # -- Container args
  args: []

  podAnnotations: {}
  podSecurityContext: {}
  securityContext:
    runAsGroup: 1000
    runAsUser: 1000
    runAsNonRoot: true
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  pdb:
    enabled: true
    minAvailable: 0
    maxUnavailable: 1

  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  service:
    type: ClusterIP
    port: 4101

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  readinessProbe:
    path: "/spi/readyz"
  livenessProbe:
    path: "/spi/health"

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  configmap:
    APPLICATION_NAME: "pix-spi"
    SERVER_ADDRESS: ":4101"
    LOG_LEVEL: "info"
    ENV_NAME: "development"
    DEPLOYMENT_MODE: "byoc"
    REQUEST_TIMEOUT_SEC: "30"
    TELEMETRY_ENABLED: "true"
    OTEL_RESOURCE_SERVICE_NAME: "pix-spi"
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/plugin-br-pix-switch"
    OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: "development"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_URL: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"
    LICENSE_ORGANIZATION_IDS: "global"
    # Single-tenant identity
    ORGANIZATION_ID: ""
    ISPB: ""
    # Sibling services
    ADAPTER_BASE_URL: "http://plugin-br-pix-switch-adapter-btg-mock:4103"
    DICT_BASE_URL: "http://plugin-br-pix-switch-dict-hub:4104"
    COB_BASE_URL: "http://plugin-br-pix-switch-cob-hub:4108"
    # Upstream integrations
    CRM_BASE_URL: ""
    CRM_CLIENT_ID: ""
    CRM_ORGANIZATION_ID: ""
    DICT_CLIENT_ID: ""
    COB_CLIENT_ID: ""
    MIDAZ_BASE_URL: ""
    MIDAZ_CLIENT_ID: ""
    MIDAZ_LEDGER_ID: ""
    MIDAZ_ORGANIZATION_ID: ""
    # -- Multi-tenant (consumed when MULTI_TENANT_ENABLED=true). MULTI_TENANT_URL
    # and MULTI_TENANT_API_KEY are seeds for the spi-systemplane store; once
    # persisted there, env values become optional (a re-deploy without them is
    # a supported rollback path). Circuit breaker defaults match the binary
    # (pkg/config: DefaultMultiTenantCBThreshold=5, ...CBTimeoutSec=30).
    MULTI_TENANT_ENABLED: "false"
    MULTI_TENANT_URL: ""
    MULTI_TENANT_CIRCUIT_BREAKER_THRESHOLD: "5"
    MULTI_TENANT_CIRCUIT_BREAKER_TIMEOUT_SEC: "30"

  secrets:
    DATABASE_URL: ""
    SYSTEMPLANE_POSTGRES_DSN: ""
    VALKEY_URL: ""
    LICENSE_KEY: ""
    DICT_CLIENT_SECRET: ""
    COB_CLIENT_SECRET: ""
    CRM_CLIENT_SECRET: ""
    MIDAZ_CLIENT_SECRET: ""
    MULTI_TENANT_API_KEY: ""

  useExistingSecret: false
  existingSecretName: ""

  extraEnvVars: {}

# -----------------------------------------------------------------------------
# spi/systemplane/api — runtime config plane for SPI
# -----------------------------------------------------------------------------

  # -- golang-migrate Job that applies SQL migrations from the component's
  # /migrations directory against the database referenced by DATABASE_URL.
  # The migrate binary ships in the same image (plugin-br-pix-switch#143);
  # the chart renders a Job with command [/migrate] overriding the default
  # ENTRYPOINT (/app). Runs as a Helm hook on pre-upgrade + post-install.
  migrations:
    enabled: true
    # Image path holding the SQL files. Match the Dockerfile's COPY target.
    migrationsPath: /migrations
    ttlSecondsAfterFinished: 300
    backoffLimit: 3

spiSystemplane:
  enabled: true
  name: "spi-systemplane"
  description: "Runtime config plane for SPI"
  replicaCount: 1
  revisionHistoryLimit: 10

  image:
    repository: "ghcr.io/lerianstudio/plugin-br-pix-switch-spi-systemplane-api"
    pullPolicy: ""
    tag: ""

  imagePullSecrets: []

  # -- Override container entrypoint (e.g., to dispatch to a specific binary
  # inside a multi-binary image). When empty, the image's ENTRYPOINT is used.
  command: []
  # -- Container args
  args: []

  podAnnotations: {}
  podSecurityContext: {}
  securityContext:
    runAsGroup: 1000
    runAsUser: 1000
    runAsNonRoot: true
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  pdb:
    enabled: false
    minAvailable: 0
    maxUnavailable: 1

  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  service:
    type: ClusterIP
    port: 4102

  resources:
    limits: { cpu: 200m, memory: 256Mi }
    requests: { cpu: 50m, memory: 64Mi }

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1

  readinessProbe:
    path: "/spi/readyz"
  livenessProbe:
    path: "/spi/health"
  nodeSelector: {}
  tolerations: []
  affinity: {}

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  configmap:
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_URL: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"
    APPLICATION_NAME: "pix-spi-systemplane"
    SERVER_ADDRESS: ":4102"
    LOG_LEVEL: "info"
    ENV_NAME: "development"
    DEPLOYMENT_MODE: "byoc"
    REQUEST_TIMEOUT_SEC: "30"
    TELEMETRY_ENABLED: "true"
    OTEL_RESOURCE_SERVICE_NAME: "pix-spi-systemplane"
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/plugin-br-pix-switch"
    OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: "development"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    # -- Multi-tenant seeds. When MULTI_TENANT_ENABLED=true, MULTI_TENANT_URL
    # and MULTI_TENANT_API_KEY (masked) are seeded into the systemplane store
    # at tenant.manager_url / tenant.manager_api_key on first boot. After
    # the systemplane row exists, env values can be removed.
    MULTI_TENANT_ENABLED: "false"
    MULTI_TENANT_URL: ""

  secrets:
    DATABASE_URL: ""
    SYSTEMPLANE_POSTGRES_DSN: ""
    LICENSE_KEY: ""
    SYSTEMPLANE_SECRET_MASTER_KEY: ""
    # -- Tenant Manager API key (consumed when MULTI_TENANT_ENABLED=true on
    # spi-systemplane). Seeded into the systemplane store on first boot.
    MULTI_TENANT_API_KEY: ""

  useExistingSecret: false
  existingSecretName: ""

  extraEnvVars: {}

