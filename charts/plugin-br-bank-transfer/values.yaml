# Default values for plugin-br-bank-transfer components.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
nameOverride: "bank-transfer"
fullnameOverride: ""
namespaceOverride: ""
global:
  # -- Bootstrap job for external PostgreSQL: creates databases, roles, and grants privileges
  externalPostgresDefinitions:
    # -- Enable or disable the PostgreSQL bootstrap job
    enabled: false
    # -- PostgreSQL connection settings
    connection:
      # -- PostgreSQL host
      host: "plugin-br-bank-transfer-postgresql-primary"
      # -- PostgreSQL port
      port: "5432"
    # -- Admin credentials for PostgreSQL
    postgresAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing DB_USER_ADMIN and DB_ADMIN_PASSWORD keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "postgres"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: "lerian"
    # -- Credentials for bank_transfer role created by the job
    bankTransferCredentials:
      useExistingSecret:
        # -- Name of existing secret containing DB_PASSWORD_BANK_TRANSFER key
        name: ""
      # -- Password for bank_transfer role (ignored if useExistingSecret.name is set)
      password: "lerian"
  # -- Bootstrap job for external RabbitMQ: creates users, vhosts, and permissions
  externalRabbitmqDefinitions:
    # -- Enable or disable the RabbitMQ bootstrap job
    enabled: false
    # -- RabbitMQ connection settings
    connection:
      # -- RabbitMQ protocol (http or https)
      protocol: "http"
      # -- RabbitMQ host (management API endpoint)
      host: "plugin-br-bank-transfer-rabbitmq"
      # -- RabbitMQ HTTP management port
      port: "15672"
      # -- RabbitMQ AMQP port (for connectivity check)
      portAmqp: "5672"
      # -- Skip TLS verification for self-signed certificates (not recommended for production)
      skipTlsVerify: false
    # -- Admin credentials for RabbitMQ management API
    rabbitmqAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing RABBITMQ_ADMIN_USER and RABBITMQ_ADMIN_PASS keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "admin"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: "lerian"
    # -- Credentials for bank_transfer user created by the job
    bankTransferCredentials:
      useExistingSecret:
        # -- Name of existing secret containing RABBITMQ_BANK_TRANSFER_PASS key
        name: ""
      # -- Password for bank_transfer user (ignored if useExistingSecret.name is set)
      password: "lerian"
bankTransfer:
  # -- Service name
  name: bank-transfer
  # -- Enable or disable the bank-transfer service
  enabled: true
  # -- Number of replicas for the bank-transfer service
  replicaCount: 2
  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10
  image:
    # -- Repository for the bank-transfer service container image
    repository: ghcr.io/lerianstudio/plugin-br-bank-transfer
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag used for deployment
    tag: "1.0.0-beta.1"
  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []
  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""
  # -- Pod annotations for additional metadata
  podAnnotations: {}
  podSecurityContext: {}
  # fsGroup: 2000

  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true
  # -- PodDisruptionBudget configuration
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Minimum number of available pods
    minAvailable: 1
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Annotations for the PodDisruptionBudget
    annotations: {}
  # -- Deployment update strategy
  deploymentUpdate:
    # -- Type of deployment strategy
    type: RollingUpdate
    # -- Maximum number of pods that can be created over the desired number of pods
    maxSurge: 100%
    # -- Maximum number of pods that can be unavailable during the update
    maxUnavailable: 0
  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Port for the HTTP API
    port: 8080
    annotations: {}
  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Additional ingress annotations
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for ingress
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 1500m
      memory: 512Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 2
    # -- Maximum number of replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}
  # -- Tolerations for scheduling on tainted nodes
  tolerations: []
  # -- Affinity rules for pod scheduling
  affinity: {}
  # -- ConfigMap for environment variables and configurations
  # @default -- templates/configmap.yaml
  configmap:
    # Application Settings
    ENV_NAME: "production"
    LOG_LEVEL: "info"
    SERVER_ADDRESS: ":8080"
    HTTP_BODY_LIMIT_BYTES: "1048576"
    # CORS Configuration
    CORS_ALLOWED_ORIGINS: "*"
    CORS_ALLOWED_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    CORS_ALLOWED_HEADERS: "Origin,Content-Type,Accept,Authorization,X-Request-ID"
    # TLS Configuration
    TLS_TERMINATED_UPSTREAM: "true"
    # Multi-Tenancy
    DEFAULT_TENANT_ID: "11111111-1111-1111-1111-111111111111"
    DEFAULT_TENANT_SLUG: "default"
    MULTI_TENANT_INFRA_ENABLED: "false"
    # Pool Manager (SaaS multi-tenant mode)
    POOL_MANAGER_ENABLED: "false"
    # POOL_MANAGER_BASE_URL: "http://pool-manager:8080"
    POOL_MANAGER_TIMEOUT_MS: "2000"
    POOL_MANAGER_L1_TTL_SEC: "300"
    POOL_MANAGER_L2_TTL_SEC: "43200"
    # PostgreSQL Primary (host defaults to {{ .Release.Name }}-postgresql-primary.{{ .Release.Namespace }}.svc.cluster.local)
    # POSTGRES_HOST: ""  # Leave empty to use dynamic default based on release name
    POSTGRES_PORT: "5432"
    POSTGRES_USER: "bank_transfer"
    POSTGRES_DB: "bank_transfer"
    POSTGRES_SSLMODE: "require"
    POSTGRES_MAX_OPEN_CONNS: "25"
    POSTGRES_MAX_IDLE_CONNS: "5"
    POSTGRES_CONN_MAX_LIFETIME_MINS: "30"
    POSTGRES_CONN_MAX_IDLE_TIME_MINS: "5"
    POSTGRES_CONNECT_TIMEOUT_SEC: "10"
    MIGRATIONS_PATH: "migrations"
    # PostgreSQL Replica (optional - for CQRS read scaling)
    # POSTGRES_REPLICA_HOST: ""
    # POSTGRES_REPLICA_PORT: "5432"
    # POSTGRES_REPLICA_USER: ""
    # POSTGRES_REPLICA_DB: ""
    # POSTGRES_REPLICA_SSLMODE: "require"

    # Infrastructure Boot Timeout
    INFRA_CONNECT_TIMEOUT_SEC: "30"
    # Redis/Valkey Configuration (host defaults to {{ .Release.Name }}-valkey-primary.{{ .Release.Namespace }}.svc.cluster.local:6379)
    # REDIS_HOST: ""  # Leave empty to use dynamic default based on release name
    REDIS_DB: "0"
    REDIS_PROTOCOL: "3"
    REDIS_POOL_SIZE: "10"
    REDIS_MIN_IDLE_CONNS: "2"
    REDIS_READ_TIMEOUT_MS: "3000"
    REDIS_WRITE_TIMEOUT_MS: "3000"
    REDIS_DIAL_TIMEOUT_MS: "5000"
    REDIS_TLS: "false"
    # MongoDB Configuration (mandatory for audit/event persistence)
    MONGO_ENABLED: "true"
    # MONGO_URI is constructed from secrets if not explicitly set
    MONGO_DATABASE: "plugin_br_bank_transfer"
    MONGO_MAX_POOL_SIZE: "25"
    MONGO_SERVER_SELECTION_TIMEOUT_MS: "3000"
    MONGO_HEARTBEAT_INTERVAL_MS: "10000"
    # Authentication (plugin-auth)
    PLUGIN_AUTH_ENABLED: "true"
    PLUGIN_AUTH_ADDRESS: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"
    PLUGIN_AUTH_CLIENT_ID: "plugin-br-bank-transfer"
    AUTH_CACHE_TTL_SEC: "300"
    # License Validation
    # LICENSE_SERVICE_ADDRESS: ""
    # TENANT_IDS: ""

    # OpenTelemetry
    ENABLE_TELEMETRY: "false"
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/plugin-br-bank-transfer"
    OTEL_RESOURCE_SERVICE_NAME: "plugin-br-bank-transfer"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: "production"
    # Systemplane Runtime Configuration (optional)
    # SYSTEMPLANE_BACKEND: "postgres"
    # SYSTEMPLANE_POSTGRES_SCHEMA: "system"
    # Rate Limiting
    RATE_LIMIT_ENABLED: "true"
    RATE_LIMIT_MAX: "100"
    RATE_LIMIT_EXPIRY_SEC: "60"
    # Database Metrics & Observability
    DB_METRICS_INTERVAL_SEC: "15"
    RECONCILIATION_PENDING_ALERT_THRESHOLD: "20"
    # Idempotency
    IDEMPOTENCY_RETRY_WINDOW_SEC: "300"
    IDEMPOTENCY_REQUIRE_REDIS: "true"
    # Midaz Adapter (REQUIRED)
    MIDAZ_BASE_URL: "http://midaz.midaz.svc.cluster.local.:3001"
    MIDAZ_TRANSACTION_URL: "http://midaz.midaz.svc.cluster.local.:3001"
    MIDAZ_TIMEOUT_MS: "3000"
    MIDAZ_MAX_RETRIES: "3"
    MIDAZ_OTEL_ENABLED: "true"
    MIDAZ_DEBUG: "false"
    MIDAZ_AUTH_ENABLED: "false"
    # MIDAZ_AUTH_ADDRESS: ""
    MIDAZ_BREAKER_FAILURES: "3"
    MIDAZ_BREAKER_TIMEOUT_SECONDS: "30"
    # CRM Adapter (REQUIRED)
    CRM_BASE_URL: "http://plugin-crm.midaz-plugins.svc.cluster.local:4003"
    CRM_TIMEOUT_MS: "2000"
    CRM_MAX_RETRIES: "2"
    CRM_CACHE_TTL_MS: "300000"
    CRM_AUTH_ENABLED: "false"
    # CRM_CLIENT_ID: ""
    # Fees Adapter (REQUIRED)
    FEES_BASE_URL: "http://plugin-fees.midaz-plugins.svc.cluster.local:4004"
    FEES_TIMEOUT_MS: "2000"
    FEES_MAX_RETRIES: "2"
    FEES_FAIL_CLOSED_DEFAULT: "false"
    FEES_MAX_FEE_AMOUNT_CENTS: "99999999"
    FEES_AUTH_ENABLED: "false"
    # FEES_CLIENT_ID: ""
    # JD SPB Adapter (REQUIRED)
    JD_BASE_URL: "" # MUST BE SET - JD SOAP endpoint
    JD_SOAP_PATH: "/soap"
    JD_ORIGIN_ISPB: "" # MUST BE SET - Origin ISPB code
    # JD_LEGACY_CODE: ""
    JD_SIGNATURE_REQUIRED: "true"
    JD_TIMEOUT_MS: "8000"
    JD_MAX_RETRIES: "3"
    # JD Sandbox Mode (must be false in production)
    JD_SANDBOX_MODE: "false"
    # JD Polling (TED IN ingestion)
    JD_POLLING_ENABLED: "false"
    JD_POLL_INTERVAL_SECONDS: "30"
    JD_POLL_MAX_MESSAGES_PER_CYCLE: "50"
    JD_POLL_MAX_RETRIES: "3"
    JD_POLL_RECOVERY_BATCH_SIZE: "200"
    # RabbitMQ Event Bus (optional)
    RABBITMQ_ENABLED: "false"
    # RABBITMQ_URL: "amqp://bank_transfer:password@plugin-br-bank-transfer-jd-rabbitmq:5672/"
    RABBITMQ_EXCHANGE: "bank_transfer.lifecycle"
    RABBITMQ_ROUTING_KEY_PREFIX: "transfer"
    RABBITMQ_PUBLISH_TIMEOUT_MS: "5000"
    RABBITMQ_MAX_RETRIES: "3"
    RABBITMQ_RETRY_BACKOFF_MS: "200"
    # Webhook Delivery Worker (optional)
    WEBHOOK_ENABLED: "false"
    # WEBHOOK_ENDPOINT_URL: "https://example.com/webhooks/transfers"
    WEBHOOK_QUEUE_NAME: "transfer.webhook.delivery"
    WEBHOOK_DLQ_NAME: "transfer.webhook.dlq"
    WEBHOOK_CONSUMER_TAG: "plugin-br-bank-transfer-webhook"
    WEBHOOK_PREFETCH_COUNT: "20"
    WEBHOOK_TIMEOUT_MS: "5000"
    WEBHOOK_MAX_RETRIES: "3"
    WEBHOOK_RETRY_BACKOFF_MS: "500"
    WEBHOOK_ALLOW_UNSIGNED_BROKER_EVENTS: "false"
    WEBHOOK_UNSIGNED_BROKER_EVENTS_GRACE_SEC: "0"
    # Usage Limits
    USAGE_LIMITS_ENABLED: "false"
    USAGE_LIMIT_DAILY_CENTS: "0"
    USAGE_LIMIT_MONTHLY_CENTS: "0"
    # Operating Hours
    TRANSFER_OPERATING_OPEN: "06:30"
    TRANSFER_OPERATING_CLOSE: "17:00"
    TRANSFER_OPERATING_TIMEZONE: "America/Sao_Paulo"
  # -- Secrets for storing sensitive data
  # @default -- templates/secrets.yaml
  secrets:
    # PostgreSQL credentials
    POSTGRES_PASSWORD: "lerian"
    # POSTGRES_REPLICA_PASSWORD: ""

    # Redis/Valkey password
    REDIS_PASSWORD: "lerian"
    # MongoDB password (REQUIRED)
    MONGO_PASSWORD: "lerian"
    # Authentication (plugin-auth) - client secret for M2M auth
    # PLUGIN_AUTH_CLIENT_SECRET: ""

    # License Key (required in production)
    # LICENSE_KEY: ""

    # CRM Outbound M2M Credentials (optional - when CRM_AUTH_ENABLED=true)
    # CRM_CLIENT_SECRET: ""

    # Fees Outbound M2M Credentials (optional - when FEES_AUTH_ENABLED=true)
    # FEES_CLIENT_SECRET: ""

    # Systemplane Secrets (optional - for runtime config)
    # SYSTEMPLANE_SECRET_MASTER_KEY: ""
    # SYSTEMPLANE_POSTGRES_DSN: ""

    # JD SPB Credentials (REQUIRED for production)
    # JD_USER_CODE: ""
    # JD_PASSWORD: ""
    # JD_PRIVATE_KEY_PEM: ""

    # Encryption Keys (REQUIRED - 32-byte base64 encoded)
    JD_INCOMING_RAW_XML_ENCRYPTION_KEY_BASE64: ""
    RECIPIENT_DETAILS_ENCRYPTION_KEY_BASE64: ""
    # Midaz M2M Credentials (optional)
    # MIDAZ_CLIENT_ID: ""
    # MIDAZ_CLIENT_SECRET: ""

    # RabbitMQ credentials (when RABBITMQ_ENABLED=true)
    # RABBITMQ_PASSWORD: ""
    # RABBITMQ_EVENT_SIGNING_SECRET: ""

    # Webhook secrets (when WEBHOOK_ENABLED=true)
    # WEBHOOK_SIGNING_SECRET: ""
    # WEBHOOK_BROKER_EVENT_SIGNING_SECRET: ""
  # -- Existing secrets name
  useExistingSecret: false
  existingSecretName: ""
  # -- Extra environment variables (map of key: value pairs)
  extraEnvVars: {}
  serviceAccount:
    # -- Specifies whether a ServiceAccount should be created
    create: true
    # -- Annotations for the ServiceAccount
    annotations: {}
    # -- Name of the service account
    # @default -- `bank-transfer.fullname`
    name: ""
# Valkey (Redis-compatible) configuration
valkey:
  enabled: true
  global:
    security:
      allowInsecureImages: false
  image:
    repository: bitnami/valkey
    tag: "8.0.2"
  external: false
  architecture: standalone
  auth:
    enabled: true
    password: lerian
    username: bank_transfer
  primary:
    kind: Deployment
    resourcesPreset: "medium"
    persistence:
      enabled: false
    extraFlags:
      - "--maxmemory 640mb"
      - "--maxmemory-policy allkeys-lru"
      - "--hz 100"
      - "--maxclients 10000"
# PostgreSQL configuration
postgresql:
  enabled: true
  global:
    security:
      allowInsecureImages: false
  image:
    repository: bitnami/postgresql
    tag: "17.4.0"
  external: false
  architecture: replication
  replication:
    numSynchronousReplicas: 1
  auth:
    enabled: true
    enablePostgresUser: true
    postgresPassword: "lerian"
    username: "bank_transfer"
    password: "lerian"
    database: "bank_transfer"
    replicationUsername: "replicator"
    replicationPassword: "replicator_password"
  primary:
    persistence:
      size: 8Gi
    resourcesPreset: large
    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      wal_keep_size = 512MB
      max_replication_slots = 20
    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "30"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"
  readReplicas:
    name: replication
    replicaCount: 1
    persistence:
      size: 8Gi
    resourcesPreset: large
    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      max_replication_slots = 20
      wal_keep_size = 512MB
    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "40"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"
# MongoDB configuration (mandatory for audit/event persistence)
mongodb:
  enabled: true
  global:
    security:
      allowInsecureImages: false
  image:
    repository: bitnami/mongodb
    tag: "8.0.5"
  architecture: standalone
  auth:
    enabled: true
    rootUser: "admin"
    rootPassword: "lerian"
    usernames:
      - "bank_transfer"
    passwords:
      - "lerian"
    databases:
      - "plugin_br_bank_transfer_jd"
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
# RabbitMQ configuration (optional - disabled by default)
rabbitmq:
  enabled: false
  image:
    tag: "3.13.6"
  persistence:
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile: {type: RuntimeDefault}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities: {drop: ["ALL"]}
  authentication:
    user:
      value: "bank_transfer"
    password:
      value: "lerian"
    erlangCookie:
      value: "WCB00CfurKivfNH61hbxPaNg+xtyA/7RI6bEx5RMGvE="
  extraSecrets:
    - name: "bank-transfer-rabbitmq-load-definition"
      mountPath: /etc/rabbitmq/definitions
  customConfig: |
    management.load_definitions = /etc/rabbitmq/definitions/load_definition.json
br-bank-transfer:
  image:
    tag: 1.0.0
