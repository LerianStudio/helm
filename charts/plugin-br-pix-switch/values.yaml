    repository: "ghcr.io/lerianstudio/plugin-br-pix-switch-adapter-lerian-systemplane-api"
    pullPolicy: ""
    tag: ""

  imagePullSecrets: []

  # -- Override container entrypoint (e.g., to dispatch to a specific binary
  # inside a multi-binary image). When empty, the image's ENTRYPOINT is used.
  command: []
  # -- Container args
  args: []

  podAnnotations: {}
  podSecurityContext: {}
  securityContext:
    runAsGroup: 1000
    runAsUser: 1000
    runAsNonRoot: true
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  pdb:
    enabled: false
    minAvailable: 0
    maxUnavailable: 1

  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  service:
    type: ClusterIP
    port: 4115

  resources:
    limits: { cpu: 200m, memory: 256Mi }
    requests: { cpu: 50m, memory: 64Mi }

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1

  readinessProbe:
    path: "/lerian/readyz"
  livenessProbe:
    path: "/lerian/health"
  nodeSelector: {}
  tolerations: []
  affinity: {}

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  configmap:
    APPLICATION_NAME: "plugin-br-pix-switch"
    SERVER_ADDRESS: ":4115"
    LOG_LEVEL: "info"
    ENV_NAME: "development"
    DEPLOYMENT_MODE: "byoc"
    REQUEST_TIMEOUT_SEC: "30"
    TELEMETRY_ENABLED: "false"
    OTEL_RESOURCE_SERVICE_NAME: "pix-adapter-lerian-systemplane"
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/plugin-br-pix-switch"
    OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: "development"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_URL: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"
    # -- Multi-tenant. MULTI_TENANT_URL + MULTI_TENANT_API_KEY (secret) are
    # seeded into the store; the CB tunables size the tenant-manager client.
    MULTI_TENANT_ENABLED: "false"
    MULTI_TENANT_URL: ""
    MULTI_TENANT_CIRCUIT_BREAKER_THRESHOLD: "5"
    MULTI_TENANT_CIRCUIT_BREAKER_TIMEOUT_SEC: "30"
    # -- Address-book / instance routing seeds (first-boot only; operators
    # manage them via the systemplane admin API afterwards).
    SWITCH_BASE_URL: ""
    INTEGRATION_MODE: ""
    BRSFN_BASE_URL: ""
    BRSFN_TOKEN_URL: ""
    BRSFN_CLIENT_ID: ""

  secrets:
    DATABASE_URL: ""
    LICENSE_KEY: ""
    # -- 32-byte AES-256-GCM key; required in non-local deployment modes.
    SYSTEMPLANE_SECRET_MASTER_KEY: ""
    MULTI_TENANT_API_KEY: ""
    BRSFN_CLIENT_SECRET: ""

  useExistingSecret: false
  existingSecretName: ""

  extraEnvVars: {}

systemplaneIngress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts: []
  tls: []
  routes:
    - path: /spi
      pathType: Prefix
      component: spiSystemplane
      serviceName: spi-systemplane
    - path: /dict
      pathType: Prefix
      component: dictSystemplane
      serviceName: dict-systemplane
    - path: /cob
      pathType: Prefix
      component: cobSystemplane
      serviceName: cob-systemplane
    - path: /lerian
      pathType: Prefix
      component: adapterLerianSystemplane
      serviceName: adapter-lerian-systemplane

# -----------------------------------------------------------------------------
# Providers Ingress — outbound-provider adapters (BTG mock, BACEN, JD, ...).
#
# Single hostname routes provider traffic by path prefix. Each route names a
# component already defined in the chart (or one a future PR adds) and the
# kebab-case Service name suffix.
#
# Today only adapter-btg-mock is shipped; BACEN and JD providers will be
# added as components in future PRs and exposed here under their own paths.
# -----------------------------------------------------------------------------
providersIngress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts: []
  tls: []
  routes:
    # Path must match the source-side routePrefix:
    #   apps/adapter-btg-mock/components/api/bootstrap/server.go
    #     const routePrefix = "/btg-mock"
    - path: /btg-mock
      pathType: Prefix
      component: adapterBtgMock
      serviceName: adapter-btg-mock
    - path: /lerian
      pathType: Prefix
      component: adapterLerian
      serviceName: adapter-lerian
    # Reserved for future components — uncomment when the bacen/jd
    # adapter components ship in the chart:
    # - path: /bacen
    #   pathType: Prefix
    #   component: bacenAdapter
    #   serviceName: bacen-adapter
    # - path: /jd
    #   pathType: Prefix
    #   component: jdAdapter
    #   serviceName: jd-adapter

postgresql:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamisecure/postgresql
    tag: "latest"
  # Bitnami subchart credentials. Operator MUST override when enabled.
  # For external Postgres set `enabled: false` and configure DATABASE_URL
  # per component via component secrets or an existing Kubernetes Secret.
  auth:
    enablePostgresUser: true
    postgresPassword: ""
    username: "pixswitch"
    password: ""
    database: "postgres"

# Valkey (Bitnami chart, OCI registry)
# Used by spi, dict-hub, dict-hub-vsync for VALKEY_URL (optional — caching).
valkey:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamisecure/valkey
    tag: "latest"
  # Bitnami subchart credentials. Operator MUST override when enabled.
  # For external Valkey/ElastiCache set `enabled: false` and configure
  # VALKEY_URL per component via an existing Kubernetes Secret (see header).
  auth:
    enabled: true
    password: ""

# MongoDB (Bitnami chart)
# Used by dict-hub only for MONGO_URL.
mongodb:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamisecure/mongodb
    tag: "latest"
  architecture: standalone
  # Bitnami subchart credentials. Operator MUST override when enabled.
  # For external Mongo/DocumentDB/Atlas set `enabled: false` and configure
  # dictHub.secrets.MONGO_URL via component secrets or an existing Kubernetes Secret.
  auth:
    enabled: true
    rootUser: "admin"
    rootPassword: ""
    usernames:
      - "pixswitch"
    passwords:
      - ""
    databases:
      - "pix-dict"               # only dict-hub uses Mongo
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# RabbitMQ (groundhog2k chart — same as plugin-br-bank-transfer / matcher)
# Used only by dict-hub-vsync for RABBITMQ_URI.
# Chosen path: EXTERNAL broker with a CA-signed TLS cert (trusted by the system
# trust store) on amqps://:5671. The in-cluster subchart would present a
# self-signed cert that lib-commons rejects, so it stays disabled — the anacleto
# chaos/fuzzing overlays also migrate off the embedded broker to external.
rabbitmq:
  enabled: false
  image:
    tag: "3.13.6"
  persistence:
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile: {type: RuntimeDefault}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities: {drop: ["ALL"]}
  # groundhog2k subchart credentials. Operator MUST override when enabled.
  # For external RabbitMQ / AmazonMQ set `enabled: false` and configure
  # dictHubVsync.secrets.RABBITMQ_URI via component secrets or an existing Kubernetes Secret.
  authentication:
    user:
      value: "pixswitch"
    password:
      value: ""
    erlangCookie:
      value: ""                  # MUST be set when enabled=true
                                 # (groundhog2k chart requires it; generate
                                 #  with `openssl rand -base64 32`)

# OpenTelemetry Collector (Lerian)
# Optional in-cluster collector. Disabled by default — set per-component
# OTEL_EXPORTER_OTLP_ENDPOINT to an external collector for production.
otel-collector-lerian:
  enabled: false

