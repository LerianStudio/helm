{{- if and .Values.cobHub.enabled (not .Values.cobHub.useExistingSecret) }}
{{- $component := "cob-hub" }}
{{- $values := .Values.cobHub }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-br-pix-switch.componentFullname" (dict "context" $ "component" $component) }}
  labels:
    {{- include "plugin-br-pix-switch.labels" (dict "context" $ "component" $component) | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := $values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
