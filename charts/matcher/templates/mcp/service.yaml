{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "matcher-mcp.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "matcher-mcp.labels" . | nindent 4 }}
  {{- with .Values.mcp.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mcp.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "matcher-mcp.selectorLabels" . | nindent 4 }}
{{- end }}
