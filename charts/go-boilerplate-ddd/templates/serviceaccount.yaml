{{- if and .Values.boilerplate.enabled .Values.boilerplate.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "boilerplate.serviceAccountName" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "boilerplate.labels" (dict "context" . "component" .Values.boilerplate.name "name" .Values.boilerplate.name) | nindent 4 }}
  {{- with .Values.boilerplate.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
