{{- if .Values.global.externalMongoDefinitions.enabled }}
{{- /*
Plugin BR Pix Switch — MongoDB bootstrap.

Creates a single Mongo user (default: pixswitch) with readWrite roles on the
databases used by dict-hub and cob-hub (pix-dict, pix-cob by default).
Idempotent: updates the user's password + roles if it already exists.
*/}}
{{- $admin := .Values.global.externalMongoDefinitions.mongoAdminLogin -}}
{{- $creds := .Values.global.externalMongoDefinitions.pixswitchCredentials -}}
{{- $conn := .Values.global.externalMongoDefinitions.connection -}}
{{- $rolesJSON := toJson $creds.roles -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "plugin-br-pix-switch.name" . }}-bootstrap-mongodb
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "plugin-br-pix-switch.labels" (dict "context" . "component" "bootstrap-mongodb") | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  completions: 1
  parallelism: 1
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.37
          env:
            - name: DB_HOST
              value: {{ $conn.host | quote }}
            - name: DB_PORT
              value: {{ $conn.port | quote }}
          command:
            - /bin/sh
            - -c
            - >
              TIMEOUT=300; ELAPSED=0;
              echo "Checking $DB_HOST:$DB_PORT...";
              while ! nc -z "$DB_HOST" "$DB_PORT"; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "Timeout waiting for $DB_HOST:$DB_PORT after ${TIMEOUT}s"; exit 1;
                fi;
                echo "$DB_HOST:$DB_PORT is not ready yet, waiting... (${ELAPSED}s/${TIMEOUT}s)";
                sleep 5; ELAPSED=$((ELAPSED + 5));
              done;
              echo "$DB_HOST:$DB_PORT is ready!"
      containers:
        - name: mongosh
          image: mongo:8
          env:
            - name: DB_HOST
              value: {{ $conn.host | quote }}
            - name: DB_PORT
              value: {{ $conn.port | quote }}
            - name: MONGO_ROOT_USER
              {{- if $admin.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $admin.useExistingSecret.name | quote }}
                  key: MONGO_ROOT_USER
              {{- else }}
              value: {{ $admin.username | quote }}
              {{- end }}
            - name: MONGO_ROOT_PASSWORD
              {{- if $admin.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $admin.useExistingSecret.name | quote }}
                  key: MONGO_ROOT_PASSWORD
              {{- else }}
              value: {{ $admin.password | quote }}
              {{- end }}
            - name: MONGO_APP_USER
              {{- if $creds.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $creds.useExistingSecret.name | quote }}
                  key: MONGO_APP_USER
              {{- else }}
              value: {{ $creds.username | quote }}
              {{- end }}
            - name: MONGO_APP_PASSWORD
              {{- if $creds.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $creds.useExistingSecret.name | quote }}
                  key: MONGO_APP_PASSWORD
              {{- else }}
              value: {{ $creds.password | quote }}
              {{- end }}
            - name: ROLES_JSON
              value: {{ $rolesJSON | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "=== Pix Switch MongoDB Bootstrap ==="
              echo "Host: $DB_HOST:$DB_PORT"
              echo "App user: $MONGO_APP_USER"
              echo ""

              echo "Checking existing MongoDB user..."
              USER_EXISTS=0

              if mongosh --host "$DB_HOST" --port "$DB_PORT" -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin --quiet --eval 'if (db.getSiblingDB("admin").getUser(process.env.MONGO_APP_USER) !== null) { print("EXISTS"); }' | grep -q "EXISTS"; then
                USER_EXISTS=1
              fi

              if [ "$USER_EXISTS" = "1" ]; then
                echo "User '$MONGO_APP_USER' already exists. Updating password and roles..."
                mongosh --host "$DB_HOST" --port "$DB_PORT" -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin --quiet --eval 'db.getSiblingDB("admin").updateUser(process.env.MONGO_APP_USER, {pwd: process.env.MONGO_APP_PASSWORD, roles: JSON.parse(process.env.ROLES_JSON)})'
              else
                echo "Creating user '$MONGO_APP_USER'..."
                mongosh --host "$DB_HOST" --port "$DB_PORT" -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin --quiet --eval 'db.getSiblingDB("admin").createUser({user: process.env.MONGO_APP_USER, pwd: process.env.MONGO_APP_PASSWORD, roles: JSON.parse(process.env.ROLES_JSON)})'
              fi

              echo ""
              echo "=== Pix Switch MongoDB Bootstrap completed ==="
{{- end }}
