{{- if .Values.brCcs.enabled }}
{{- if not .Values.brCcs.useExistingSecret }}
{{- $s := .Values.brCcs.secrets | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "br-ccs.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "br-ccs.labels" (dict "context" . "component" .Values.brCcs.name "name" .Values.brCcs.name ) | nindent 4 }}
type: Opaque
stringData:
  # Infra passwords (PostgreSQL / Valkey) are single-sourced from the bundled
  # Bitnami subchart Secrets and read via secretKeyRef on the deployment. They
  # are written here ONLY for an EXTERNAL infra component without an
  # <subchart>.auth.existingSecret.
  {{- $pg := .Values.postgresql | default dict }}
  {{- $pgAuth := $pg.auth | default dict }}
  {{- if and (not (and (ne (toString $pg.enabled) "false") (not $pg.external))) (not $pgAuth.existingSecret) $s.POSTGRES_PASSWORD }}
  POSTGRES_PASSWORD: {{ $s.POSTGRES_PASSWORD | quote }}
  {{- if $s.POSTGRES_REPLICA_PASSWORD }}
  POSTGRES_REPLICA_PASSWORD: {{ $s.POSTGRES_REPLICA_PASSWORD | quote }}
  {{- end }}
  {{- end }}

  # Redis/Valkey password (external-only; bundled valkey is read from its subchart Secret)
  {{- $vk := .Values.valkey | default dict }}
  {{- $vkAuth := $vk.auth | default dict }}
  {{- if and (not (and (ne (toString $vk.enabled) "false") (not $vk.external) $vkAuth.enabled)) (not $vkAuth.existingSecret) $s.REDIS_PASSWORD }}
  REDIS_PASSWORD: {{ $s.REDIS_PASSWORD | quote }}
  {{- end }}
  {{- if $s.REDIS_CA_CERT }}
  REDIS_CA_CERT: {{ $s.REDIS_CA_CERT | quote }}
  {{- end }}

  # Multi-tenant (tenant-manager) secrets
  {{- if $s.MULTI_TENANT_SERVICE_API_KEY }}
  MULTI_TENANT_SERVICE_API_KEY: {{ $s.MULTI_TENANT_SERVICE_API_KEY | quote }}
  {{- end }}
  {{- if $s.MULTI_TENANT_REDIS_PASSWORD }}
  MULTI_TENANT_REDIS_PASSWORD: {{ $s.MULTI_TENANT_REDIS_PASSWORD | quote }}
  {{- end }}
  {{- if $s.MULTI_TENANT_REDIS_CA_CERT }}
  MULTI_TENANT_REDIS_CA_CERT: {{ $s.MULTI_TENANT_REDIS_CA_CERT | quote }}
  {{- end }}

  # RabbitMQ credentials (when RABBITMQ_ENABLED=true)
  {{- if $s.RABBITMQ_DEFAULT_PASS }}
  RABBITMQ_DEFAULT_PASS: {{ $s.RABBITMQ_DEFAULT_PASS | quote }}
  {{- end }}
  # Full amqp:// dial string. Embeds the password, so it is a Secret (never a
  # ConfigMap value). When set, the app dials via this instead of assembling the
  # URL from RABBITMQ_HOST/PORT/USER/PASS.
  {{- if $s.RABBITMQ_URL }}
  RABBITMQ_URL: {{ $s.RABBITMQ_URL | quote }}
  {{- end }}

  # Crypto keys (REQUIRED in production — empty CCS_CRYPTO_MASTER_KEY fails fast
  # at boot by design; supply via a secrets manager or an existing Secret).
  {{- if $s.CCS_CRYPTO_MASTER_KEY }}
  CCS_CRYPTO_MASTER_KEY: {{ $s.CCS_CRYPTO_MASTER_KEY | quote }}
  {{- end }}
  {{- if $s.FETCHER_CRYPTO_KEY }}
  FETCHER_CRYPTO_KEY: {{ $s.FETCHER_CRYPTO_KEY | quote }}
  {{- end }}

  # Object storage credentials (per bucket)
  {{- range $k := (list "OBJECT_STORAGE_STA_ACCESS_KEY" "OBJECT_STORAGE_STA_SECRET_KEY" "OBJECT_STORAGE_CCS_ACCESS_KEY" "OBJECT_STORAGE_CCS_SECRET_KEY" "OBJECT_STORAGE_FETCHER_ACCESS_KEY" "OBJECT_STORAGE_FETCHER_SECRET_KEY") }}
  {{- if index $s $k }}
  {{ $k }}: {{ index $s $k | quote }}
  {{- end }}
  {{- end }}

  # Per-upstream M2M API keys (on-prem / local fallback)
  {{- range $k := (list "FETCHER_API_KEY" "REPORTER_API_KEY" "STA_API_KEY") }}
  {{- if index $s $k }}
  {{ $k }}: {{ index $s $k | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
