{{- if .Values.flowker.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flowker.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "flowker.labels" (dict "context" . "component" .Values.flowker.name "name" .Values.flowker.name) | nindent 4 }}
data:
  # Server
  ALLOW_INSECURE_TLS: {{ .Values.flowker.configmap.ALLOW_INSECURE_TLS | default "true" | quote }}
  ENV_NAME: {{ .Values.flowker.configmap.ENV_NAME | default "development" | quote }}
  VERSION: {{ .Values.flowker.image.tag | default .Chart.AppVersion | quote }}
  SERVER_PORT: {{ .Values.flowker.configmap.SERVER_PORT | default "4021" | quote }}
  SERVER_ADDRESS: {{ .Values.flowker.configmap.SERVER_ADDRESS | default ":4021" | quote }}

  # Deployment mode (saas/byoc/local — controls TLS enforcement at startup)
  DEPLOYMENT_MODE: {{ .Values.flowker.configmap.DEPLOYMENT_MODE | default "local" | quote }}

  # Logging
  LOG_LEVEL: {{ .Values.flowker.configmap.LOG_LEVEL | default "info" | quote }}

  # Authentication (API key fallback when Access Manager is disabled)
  API_KEY_ENABLED: {{ .Values.flowker.configmap.API_KEY_ENABLED | default "false" | quote }}

  # Access Manager (plugin auth)
  PLUGIN_AUTH_ENABLED: {{ .Values.flowker.configmap.PLUGIN_AUTH_ENABLED | default "false" | quote }}
  PLUGIN_AUTH_ADDRESS: {{ .Values.flowker.configmap.PLUGIN_AUTH_ADDRESS | default "" | quote }}

  # CORS
  CORS_ALLOWED_ORIGINS: {{ .Values.flowker.configmap.CORS_ALLOWED_ORIGINS | default "*" | quote }}

  # Feature flags
  SKIP_LIB_COMMONS_TELEMETRY: {{ .Values.flowker.configmap.SKIP_LIB_COMMONS_TELEMETRY | default "false" | quote }}
  FAULT_INJECTION_ENABLED: {{ .Values.flowker.configmap.FAULT_INJECTION_ENABLED | default "false" | quote }}
  SSRF_ALLOW_PRIVATE: {{ .Values.flowker.configmap.SSRF_ALLOW_PRIVATE | default "false" | quote }}

  # MongoDB
  # MONGO_URI lives in the Secret (templates/secrets.yaml) because it
  # contains the application password.
  # MONGO_DB_NAME is non-sensitive and used by the app to scope database operations.
  MONGO_DB_NAME: {{ .Values.flowker.configmap.MONGO_DB_NAME | default "flowker" | quote }}
  # MongoDB driver pool size (read directly via getEnvAsIntOrDefault, not via struct tag).
  MONGO_MAX_POOL_SIZE: {{ .Values.flowker.configmap.MONGO_MAX_POOL_SIZE | default "20" | quote }}

  # Swagger
  SWAGGER_TITLE: {{ .Values.flowker.configmap.SWAGGER_TITLE | default "Flowker API" | quote }}
  SWAGGER_DESCRIPTION: {{ .Values.flowker.configmap.SWAGGER_DESCRIPTION | default "Workflow orchestration platform for financial validation" | quote }}
  SWAGGER_VERSION: {{ .Values.flowker.image.tag | default .Chart.AppVersion | quote }}
  SWAGGER_HOST: {{ .Values.flowker.configmap.SWAGGER_HOST | default ":4021" | quote }}
  SWAGGER_BASE_PATH: {{ .Values.flowker.configmap.SWAGGER_BASE_PATH | default "/" | quote }}
  SWAGGER_SCHEMES: {{ .Values.flowker.configmap.SWAGGER_SCHEMES | default "http" | quote }}
  SWAGGER_LEFT_DELIM: {{ .Values.flowker.configmap.SWAGGER_LEFT_DELIM | default "{{" | quote }}
  SWAGGER_RIGHT_DELIM: {{ .Values.flowker.configmap.SWAGGER_RIGHT_DELIM | default "}}" | quote }}

  # OpenTelemetry
  ENABLE_TELEMETRY: {{ .Values.flowker.configmap.ENABLE_TELEMETRY | default "false" | quote }}
  OTEL_RESOURCE_SERVICE_NAME: {{ .Values.flowker.configmap.OTEL_RESOURCE_SERVICE_NAME | default "flowker" | quote }}
  OTEL_LIBRARY_NAME: {{ .Values.flowker.configmap.OTEL_LIBRARY_NAME | default "github.com/LerianStudio/flowker" | quote }}
  OTEL_RESOURCE_SERVICE_VERSION: {{ .Values.flowker.image.tag | default .Chart.AppVersion | quote }}
  OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: {{ .Values.flowker.configmap.OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT | default "development" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT_PORT: {{ .Values.flowker.configmap.OTEL_EXPORTER_OTLP_ENDPOINT_PORT | default "4317" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.flowker.configmap.OTEL_EXPORTER_OTLP_ENDPOINT | default "" | quote }}

  # Audit Database (PostgreSQL — required when MULTI_TENANT_ENABLED=false)
  AUDIT_DB_HOST: {{ .Values.flowker.configmap.AUDIT_DB_HOST | default "" | quote }}
  AUDIT_DB_PORT: {{ .Values.flowker.configmap.AUDIT_DB_PORT | default "5432" | quote }}
  AUDIT_DB_USER: {{ .Values.flowker.configmap.AUDIT_DB_USER | default "flowker_audit" | quote }}
  AUDIT_DB_NAME: {{ .Values.flowker.configmap.AUDIT_DB_NAME | default "flowker_audit" | quote }}
  AUDIT_DB_SSL_MODE: {{ .Values.flowker.configmap.AUDIT_DB_SSL_MODE | default "disable" | quote }}
  AUDIT_MIGRATIONS_PATH: {{ .Values.flowker.configmap.AUDIT_MIGRATIONS_PATH | default "/migrations" | quote }}

  # Multi-tenant configuration
  MULTI_TENANT_ENABLED: {{ .Values.flowker.configmap.MULTI_TENANT_ENABLED | default "false" | quote }}
  {{- if eq (.Values.flowker.configmap.MULTI_TENANT_ENABLED | default "false" | toString) "true" }}
  MULTI_TENANT_URL: {{ required "flowker.configmap.MULTI_TENANT_URL is required when MULTI_TENANT_ENABLED=true" .Values.flowker.configmap.MULTI_TENANT_URL | quote }}
  MULTI_TENANT_ALLOW_INSECURE_HTTP: {{ .Values.flowker.configmap.MULTI_TENANT_ALLOW_INSECURE_HTTP | default "false" | quote }}
  MULTI_TENANT_REDIS_HOST: {{ .Values.flowker.configmap.MULTI_TENANT_REDIS_HOST | default "" | quote }}
  MULTI_TENANT_REDIS_PORT: {{ .Values.flowker.configmap.MULTI_TENANT_REDIS_PORT | default "6379" | quote }}
  MULTI_TENANT_REDIS_TLS: {{ .Values.flowker.configmap.MULTI_TENANT_REDIS_TLS | default "false" | quote }}
  MULTI_TENANT_MAX_TENANT_POOLS: {{ .Values.flowker.configmap.MULTI_TENANT_MAX_TENANT_POOLS | default "100" | quote }}
  MULTI_TENANT_IDLE_TIMEOUT_SEC: {{ .Values.flowker.configmap.MULTI_TENANT_IDLE_TIMEOUT_SEC | default "300" | quote }}
  MULTI_TENANT_CONNECTIONS_CHECK_INTERVAL_SEC: {{ .Values.flowker.configmap.MULTI_TENANT_CONNECTIONS_CHECK_INTERVAL_SEC | default "30" | quote }}
  MULTI_TENANT_TIMEOUT: {{ .Values.flowker.configmap.MULTI_TENANT_TIMEOUT | default "30" | quote }}
  MULTI_TENANT_CACHE_TTL_SEC: {{ .Values.flowker.configmap.MULTI_TENANT_CACHE_TTL_SEC | default "120" | quote }}
  MULTI_TENANT_CIRCUIT_BREAKER_THRESHOLD: {{ .Values.flowker.configmap.MULTI_TENANT_CIRCUIT_BREAKER_THRESHOLD | default "5" | quote }}
  MULTI_TENANT_CIRCUIT_BREAKER_TIMEOUT_SEC: {{ .Values.flowker.configmap.MULTI_TENANT_CIRCUIT_BREAKER_TIMEOUT_SEC | default "30" | quote }}
  {{- end }}

  # HTTP egress body cap (bytes). Caps request/response bodies on provider calls.
  HTTP_MAX_BODY_BYTES: {{ .Values.flowker.configmap.HTTP_MAX_BODY_BYTES | default "10485760" | quote }}

  # CORS wildcard (lib-commons parity). Secure-by-default false; local overrides to true.
  ALLOW_CORS_WILDCARD: {{ .Values.flowker.configmap.ALLOW_CORS_WILDCARD | default "false" | quote }}

  # Internal (Lerian-managed) provider base URLs. Empty = stored config doc value used.
  MIDAZ_BASE_URL: {{ .Values.flowker.configmap.MIDAZ_BASE_URL | default "" | quote }}
  TRACER_BASE_URL: {{ .Values.flowker.configmap.TRACER_BASE_URL | default "" | quote }}

  # Schema Registry auth gates (secure default: true)
  XSD_SCHEMAS_AUTH_ENABLED: {{ .Values.flowker.configmap.XSD_SCHEMAS_AUTH_ENABLED | default "true" | quote }}
  OPENAPI_SCHEMAS_AUTH_ENABLED: {{ .Values.flowker.configmap.OPENAPI_SCHEMAS_AUTH_ENABLED | default "true" | quote }}

  # Schema Registry blob storage (S3). Graceful-off: empty bucket disables the S3
  # backend (boot proceeds Mongo-only). AWS creds come from the credential chain
  # (IRSA / Roles Anywhere). Empty region resolves via the standard AWS SDK chain.
  SCHEMA_REGISTRY_S3_BUCKET: {{ .Values.flowker.configmap.SCHEMA_REGISTRY_S3_BUCKET | default "" | quote }}
  SCHEMA_REGISTRY_S3_REGION: {{ .Values.flowker.configmap.SCHEMA_REGISTRY_S3_REGION | default "" | quote }}

  # Shared OAuth2 token cache
  TOKEN_CACHE_MAX_TTL_SEC: {{ .Values.flowker.configmap.TOKEN_CACHE_MAX_TTL_SEC | default "3600" | quote }}
  TOKEN_CACHE_JANITOR_INTERVAL_SEC: {{ .Values.flowker.configmap.TOKEN_CACHE_JANITOR_INTERVAL_SEC | default "300" | quote }}
  TOKEN_CACHE_REFRESH_BUFFER_SEC: {{ .Values.flowker.configmap.TOKEN_CACHE_REFRESH_BUFFER_SEC | default "60" | quote }}
  TOKEN_CACHE_TENANT_SCOPED_DISABLED: {{ .Values.flowker.configmap.TOKEN_CACHE_TENANT_SCOPED_DISABLED | default "false" | quote }}

  # Secrets backend. unset = disabled (boots fine); tenant-manager = AWS Secrets
  # Manager reader. WORKOS_TM_SERVICE_NAME MUST match FLOWKER_SECRETS_APPLICATION_NAME.
  FLOWKER_SECRETS_BACKEND: {{ .Values.flowker.configmap.FLOWKER_SECRETS_BACKEND | default "" | quote }}
  FLOWKER_SECRETS_CACHE_TTL_SEC: {{ .Values.flowker.configmap.FLOWKER_SECRETS_CACHE_TTL_SEC | default "" | quote }}
  FLOWKER_SECRETS_APPLICATION_NAME: {{ .Values.flowker.configmap.FLOWKER_SECRETS_APPLICATION_NAME | default "" | quote }}

  # XSD validator (app-side knobs). The in-pod sidecar container and the loopback
  # URL are wired in a follow-up phase; empty URL keeps the feature unconfigured
  # (never a hard boot dependency). ALLOW_INSECURE_HTTP secure-by-default false.
  XSD_VALIDATOR_URL: {{ .Values.flowker.configmap.XSD_VALIDATOR_URL | default "" | quote }}
  XSD_VALIDATOR_ALLOW_INSECURE_HTTP: {{ .Values.flowker.configmap.XSD_VALIDATOR_ALLOW_INSECURE_HTTP | default "false" | quote }}

  # Scheduler (queue-backed `schedule` trigger). DEFAULT ON. SCHEDULER_REDIS_HOST
  # is derived from the valkey subchart in a follow-up phase; empty keeps the
  # scheduler queue a nil-safe no-op. This dedicated queue Redis MUST stay
  # isolated from the tenant Pub/Sub Redis (MULTI_TENANT_REDIS_*).
  SCHEDULER_ENABLED: {{ .Values.flowker.configmap.SCHEDULER_ENABLED | default "true" | quote }}
  SCHEDULER_REDIS_HOST: {{ .Values.flowker.configmap.SCHEDULER_REDIS_HOST | default "" | quote }}
  SCHEDULER_REDIS_PORT: {{ .Values.flowker.configmap.SCHEDULER_REDIS_PORT | default "6379" | quote }}
  SCHEDULER_REDIS_TLS: {{ .Values.flowker.configmap.SCHEDULER_REDIS_TLS | default "false" | quote }}
  SCHEDULER_REDIS_DB: {{ .Values.flowker.configmap.SCHEDULER_REDIS_DB | default "0" | quote }}
  SCHEDULER_CONCURRENCY: {{ .Values.flowker.configmap.SCHEDULER_CONCURRENCY | default "10" | quote }}

  # WorkOS Tenant Manager token mint (feature #300) — ALL-OR-NONE. When enabled,
  # URL + CLIENT_ID (here) + CLIENT_SECRET (Secret) are all required; a partial
  # config is rejected at template time (mirrors the app's fail-fast boot check).
  {{- if .Values.flowker.workosTmEnabled }}
  WORKOS_TM_TOKEN_URL: {{ required "flowker.configmap.WORKOS_TM_TOKEN_URL is required when flowker.workosTmEnabled=true" .Values.flowker.configmap.WORKOS_TM_TOKEN_URL | quote }}
  WORKOS_TM_CLIENT_ID: {{ required "flowker.configmap.WORKOS_TM_CLIENT_ID is required when flowker.workosTmEnabled=true" .Values.flowker.configmap.WORKOS_TM_CLIENT_ID | quote }}
  WORKOS_TM_SCOPE: {{ .Values.flowker.configmap.WORKOS_TM_SCOPE | default "" | quote }}
  WORKOS_TM_SERVICE_NAME: {{ .Values.flowker.configmap.WORKOS_TM_SERVICE_NAME | default "flowker" | quote }}
  {{- end }}

  # Extra Env Vars
  {{- with .Values.flowker.extraEnvVars }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
