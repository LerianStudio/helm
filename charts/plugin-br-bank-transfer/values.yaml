# Default values for plugin-br-bank-transfer components.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
nameOverride: "bank-transfer"
fullnameOverride: ""
namespaceOverride: ""
global:
  # -- Bootstrap job for external PostgreSQL: creates databases, roles, and grants privileges
  externalPostgresDefinitions:
    # -- Enable or disable the PostgreSQL bootstrap job
    enabled: false
    # -- PostgreSQL connection settings
    connection:
      # -- PostgreSQL host
      host: "plugin-br-bank-transfer-postgresql-primary"
      # -- PostgreSQL port
      port: "5432"
    # -- Admin credentials for PostgreSQL
    postgresAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing DB_USER_ADMIN and DB_ADMIN_PASSWORD keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "postgres"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: ""
    # -- Credentials for bank_transfer role created by the job
    bankTransferCredentials:
      useExistingSecret:
        # -- Name of existing secret containing DB_PASSWORD_BANK_TRANSFER key
        name: ""
      # -- Password for bank_transfer role (ignored if useExistingSecret.name is set)
      password: ""
  # -- Bootstrap job for external RabbitMQ: creates users, vhosts, and permissions
  externalRabbitmqDefinitions:
    # -- Enable or disable the RabbitMQ bootstrap job
    enabled: false
    # -- RabbitMQ connection settings
    connection:
      # -- RabbitMQ protocol (http or https)
      protocol: "http"
      # -- RabbitMQ host (management API endpoint)
      host: "plugin-br-bank-transfer-rabbitmq"
      # -- RabbitMQ HTTP management port
      port: "15672"
      # -- RabbitMQ AMQP port (for connectivity check)
      portAmqp: "5672"
      # -- Skip TLS verification for self-signed certificates (not recommended for production)
      skipTlsVerify: false
    # -- Admin credentials for RabbitMQ management API
    rabbitmqAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing RABBITMQ_ADMIN_USER and RABBITMQ_ADMIN_PASS keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "admin"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: ""
    # -- Credentials for bank_transfer user created by the job
    bankTransferCredentials:
      useExistingSecret:
        # -- Name of existing secret containing RABBITMQ_BANK_TRANSFER_PASS key
        name: ""
      # -- Password for bank_transfer user (ignored if useExistingSecret.name is set)
      password: ""
bankTransfer:
  # -- Readiness probe configuration. All fields override chart defaults.
  readinessProbe: {}
  # -- Liveness probe configuration. All fields override chart defaults.
  livenessProbe: {}
  # -- Service name
  name: bank-transfer
  # -- Enable or disable the bank-transfer service
  enabled: true
  # -- Number of replicas for the bank-transfer service
  replicaCount: 2
  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10
  image:
    # -- Repository for the bank-transfer service container image
    repository: ghcr.io/lerianstudio/plugin-br-bank-transfer
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag used for deployment
    tag: "1.1.9"
  # -- PostgreSQL migrations job (Helm hook pre-install,pre-upgrade; ArgoCD PreSync).
  # The chart-managed Secret is rendered as an earlier hook (weight -5 / sync-wave -5),
  # so it exists before this migration hook (weight -1) — migrations run against the
  # chart-managed Secret with NO pre-existing Secret required. Set useExistingSecret
  # only if you want migrations to read POSTGRES_PASSWORD from an operator-provisioned
  # Secret instead. Must stay disabled when MULTI_TENANT_ENABLED=true (tenant-manager
  # owns tenant database migrations — template enforces this).
  migrations:
    # -- Enable or disable the migrations job.
    enabled: true
    # -- Optional. When true, migrations read POSTGRES_PASSWORD from a pre-existing
    # Secret (existingSecretName) instead of the chart-managed Secret hook.
    useExistingSecret: false
    # -- Name of the pre-existing Secret containing POSTGRES_PASSWORD
    # (only used when useExistingSecret=true).
    existingSecretName: ""
    image:
      # -- Repository for the migrations init container image
      repository: ghcr.io/lerianstudio/plugin-br-bank-transfer-migrations
      # -- Tag for the migrations image. Defaults to the app image tag
      # (bankTransfer.image.tag, or the chart appVersion) when left empty.
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
    # -- Maximum number of retries before the Job is considered failed
    backoffLimit: 3
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi
  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []
  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""
  # -- Pod annotations for additional metadata
  podAnnotations: {}
  podSecurityContext: {}
  # fsGroup: 2000

  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    allowPrivilegeEscalation: false
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
  # -- PodDisruptionBudget configuration
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Minimum number of available pods
    minAvailable: 1
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Annotations for the PodDisruptionBudget
    annotations: {}
  # -- Deployment update strategy
  deploymentUpdate:
    # -- Type of deployment strategy
    type: RollingUpdate
    # -- Maximum number of pods that can be created over the desired number of pods
    maxSurge: 100%
    # -- Maximum number of pods that can be unavailable during the update
    maxUnavailable: 0
  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Port for the HTTP API
    port: 4027
    annotations: {}
  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Additional ingress annotations
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for ingress
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 1500m
      memory: 512Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 2
    # -- Maximum number of replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}
  # -- Tolerations for scheduling on tainted nodes
  tolerations: []
  # -- Affinity rules for pod scheduling
  affinity: {}
  # -- Host aliases for custom DNS resolution inside the pod
  # Useful for resolving private/internal hostnames not available via cluster DNS
  # Example:
  # hostAliases:
  #   - ip: "0.0.0.0"
  #     hostnames:
  #       - "jd.com.br"
  hostAliases: []
  # -- ConfigMap for environment variables and configurations
  # @default -- templates/configmap.yaml
  configmap:
    # =================================================================
    # Application identity
    # =================================================================
    ENV_NAME: "production"
    APPLICATION_NAME: "plugin-br-bank-transfer"
    SERVER_ADDRESS: ":4027"
    HTTP_BODY_LIMIT_BYTES: "1048576"

    # =================================================================
    # TLS / proxy
    # =================================================================
    TLS_TERMINATED_UPSTREAM: "true"

    # =================================================================
    # CORS policy
    # In production the plugin's validator rejects wildcard "*" and any
    # localhost / 127.0.0.1 / [::1] origin. Leave empty in single-tenant
    # dev defaults; production deployments MUST override CORS_ALLOWED_ORIGINS
    # with the API's public ingress hostname (e.g.
    # "https://bank-transfer.sa-east-1.lerian.io"). When unset, the app's
    # in-code safety net defaults to http://localhost:3000 — fine for dev,
    # fatal in production.
    # =================================================================
    CORS_ALLOWED_ORIGINS: ""
    CORS_ALLOWED_METHODS: ""
    CORS_ALLOWED_HEADERS: ""

    # =================================================================
    # Multi-tenancy
    # Only the toggle, the DEFAULT_TENANT_* identifiers, and the
    # infrastructure endpoints live in the chart. Operational tuning
    # (pool sizes, timeouts, circuit breaker) is hot-reloadable via
    # systemplane or covered by lib-commons compiled defaults.
    # =================================================================
    DEFAULT_TENANT_ID: "11111111-1111-1111-1111-111111111111"
    DEFAULT_TENANT_SLUG: "default"
    MULTI_TENANT_ENABLED: "false"
    # When MULTI_TENANT_ENABLED=true the chart also emits:
    #   MULTI_TENANT_URL, AWS_REGION, MULTI_TENANT_REDIS_HOST,
    #   MULTI_TENANT_REDIS_PORT, MULTI_TENANT_REDIS_TLS,
    #   MULTI_TENANT_ENVIRONMENT, MULTI_TENANT_ALLOW_INSECURE_HTTP,
    #   MULTI_TENANT_INTEGRATION_SECRET_NAME_TEMPLATE
    # Optional tuning (lib-commons defaults apply when unset):
    #   MULTI_TENANT_MAX_TENANT_POOLS, MULTI_TENANT_IDLE_TIMEOUT_SEC,
    #   MULTI_TENANT_TIMEOUT, MULTI_TENANT_CIRCUIT_BREAKER_THRESHOLD,
    #   MULTI_TENANT_CIRCUIT_BREAKER_TIMEOUT_SEC, MULTI_TENANT_CACHE_TTL_SEC
    # Set those under .configmap as needed.

    # =================================================================
    # PostgreSQL (primary)
    # POSTGRES_HOST defaults to "<release>-postgresql-primary.<ns>.svc.cluster.local"
    # =================================================================
    POSTGRES_PORT: "5432"
    POSTGRES_USER: "bank_transfer"
    POSTGRES_DB: "bank_transfer"
    POSTGRES_SSLMODE: "require"
    POSTGRES_MAX_OPEN_CONNS: "25"
    POSTGRES_MAX_IDLE_CONNS: "5"
    POSTGRES_CONN_MAX_LIFETIME_MINS: "30"
    POSTGRES_CONN_MAX_IDLE_TIME_MINS: "5"
    POSTGRES_CONNECT_TIMEOUT_SEC: "10"
    MIGRATIONS_PATH: "migrations"
    INFRA_CONNECT_TIMEOUT_SEC: "30"
    # PostgreSQL replica (optional — CQRS read scaling)
    # POSTGRES_REPLICA_HOST: ""
    # POSTGRES_REPLICA_PORT: "5432"
    # POSTGRES_REPLICA_USER: ""
    # POSTGRES_REPLICA_DB: ""
    # POSTGRES_REPLICA_SSLMODE: "require"

    # =================================================================
    # Valkey / Redis (app-level)
    # REDIS_HOST defaults to "<release>-valkey-primary.<ns>.svc.cluster.local:6379"
    # =================================================================
    REDIS_DB: "0"
    REDIS_PROTOCOL: "3"
    REDIS_POOL_SIZE: "10"
    REDIS_MIN_IDLE_CONNS: "2"
    REDIS_READ_TIMEOUT_MS: "3000"
    REDIS_WRITE_TIMEOUT_MS: "3000"
    REDIS_DIAL_TIMEOUT_MS: "5000"
    REDIS_TLS: "false"

    # =================================================================
    # MongoDB (audit/event persistence)
    # MONGO_URI is in templates/secrets.yaml.
    # =================================================================
    MONGO_ENABLED: "true"
    MONGO_DATABASE: "plugin_br_bank_transfer"
    MONGO_MAX_POOL_SIZE: "25"
    MONGO_SERVER_SELECTION_TIMEOUT_MS: "3000"
    MONGO_HEARTBEAT_INTERVAL_MS: "10000"

    # =================================================================
    # RabbitMQ (event bus, optional)
    # RABBITMQ_URL is rendered from chart defaults when empty.
    # Retries / timeouts / routing-key prefix are systemplane-managed.
    # =================================================================
    RABBITMQ_ENABLED: "false"
    RABBITMQ_EXCHANGE: "bank_transfer.lifecycle"

    # =================================================================
    # Authentication (inbound — plugin-access-manager)
    # =================================================================
    PLUGIN_AUTH_ENABLED: "true"
    PLUGIN_AUTH_ADDRESS: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"

    # =================================================================
    # License gateway override (optional — defaults to lib-license-go's
    # hard-coded endpoint when LICENSE_SERVICE_ADDRESS is unset)
    # =================================================================
    # LICENSE_SERVICE_ADDRESS: ""
    # TENANT_IDS: ""

    # =================================================================
    # OpenTelemetry
    # =================================================================
    ENABLE_TELEMETRY: "false"
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/plugin-br-bank-transfer"
    OTEL_RESOURCE_SERVICE_NAME: "plugin-br-bank-transfer"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: "production"

    # =================================================================
    # Outbound adapters — endpoints + auth toggles only.
    # Timeouts, retries, circuit breakers, cache TTLs, and lookup
    # path templates are systemplane-managed at runtime.
    # =================================================================

    # Midaz (REQUIRED)
    MIDAZ_BASE_URL: "http://midaz.midaz.svc.cluster.local.:3001"
    MIDAZ_TRANSACTION_URL: "http://midaz.midaz.svc.cluster.local.:3001"
    MIDAZ_AUTH_ENABLED: "false"
    # MIDAZ_AUTH_ADDRESS: ""
    # MIDAZ_TIMEOUT_MS: ""

    # CRM (REQUIRED)
    CRM_BASE_URL: "http://plugin-crm.midaz-plugins.svc.cluster.local:4003"
    CRM_AUTH_ENABLED: "false"
    # CRM_TIMEOUT_MS: ""

    # Fees (REQUIRED)
    FEES_BASE_URL: "http://plugin-fees.midaz-plugins.svc.cluster.local:4004"
    FEES_AUTH_ENABLED: "false"
    # FEES_TIMEOUT_MS: ""

    # JD-SPB
    # JD sandbox mode swaps the adapter; when false, JD_BASE_URL and
    # JD_ORIGIN_ISPB are required by the chart.
    JD_SANDBOX_MODE: "false"
    JD_BASE_URL: "" # MUST BE SET — JD SOAP endpoint
    JD_SOAP_PATH: "/soap"
    JD_ORIGIN_ISPB: "" # MUST BE SET — Origin ISPB code
    # JD_LEGACY_CODE: ""
    JD_SIGNING_MODE: "local_pem" # local_pem | external_provided | disabled
    JD_POLLING_ENABLED: "false"

    # =================================================================
    # Single-tenant defaults
    # =================================================================
    ORGANIZATION_ID: ""
    ORGANIZATION_IDS: ""
    IS_DEVELOPMENT: "false"

    # =================================================================
    # Feature flags
    # =================================================================
    WEBHOOK_ENABLED: "false"
    BTF_FEE_ENABLED: "false"
    RATE_LIMIT_ENABLED: "false"
    ALLOW_INSECURE_TLS: "true"
    OTEL_SDK_DISABLED: "false"

  # -- Secrets for storing sensitive data
  # @default -- templates/secrets.yaml
  secrets:
    # PostgreSQL credentials
    POSTGRES_PASSWORD: ""
    # POSTGRES_REPLICA_PASSWORD: ""

    # Redis/Valkey password
    REDIS_PASSWORD: ""
    # MongoDB password. With the bundled subchart it is read from the subchart Secret
    # (key mongodb-passwords); set here only for an external MongoDB without mongodb.auth.existingSecret.
    MONGO_PASSWORD: ""
    # Authentication (plugin-auth) - client secret for M2M auth
    # PLUGIN_AUTH_CLIENT_SECRET: ""

    # License Key (required in production)
    # LICENSE_KEY: ""

    # CRM Outbound M2M Credentials (optional - when CRM_AUTH_ENABLED=true)
    # CRM_CLIENT_SECRET: ""

    # Fees Outbound M2M Credentials (optional - when FEES_AUTH_ENABLED=true)
    # FEES_CLIENT_SECRET: ""

    # Systemplane Secrets (optional - for runtime config)
    # SYSTEMPLANE_SECRET_MASTER_KEY: ""
    # SYSTEMPLANE_POSTGRES_DSN: ""

    # JD SPB Credentials (REQUIRED for production)
    # JD_USER_CODE: ""
    # JD_PASSWORD: ""
    # JD_PRIVATE_KEY_PEM: ""
    # JD_PUBLIC_KEY_PEM: ""  # Required for external_provided mode with signature validation
    # JD_PRIVATE_KEY_KEYINFO: ""  # key metadata for external signing providers (credential-like → Secret)

    # Encryption Keys (REQUIRED - hex-encoded 32-byte AES-256 keys, 64 hex characters)
    JD_INCOMING_RAW_XML_ENCRYPTION_KEY: ""
    RECIPIENT_DETAILS_ENCRYPTION_KEY: ""
    # Midaz M2M Credentials (optional)
    # MIDAZ_CLIENT_ID: ""
    # MIDAZ_CLIENT_SECRET: ""
  # RabbitMQ credentials (when RABBITMQ_ENABLED=true)
  # RABBITMQ_PASSWORD: ""
  # RABBITMQ_EVENT_SIGNING_SECRET: ""

  # Webhook secrets (when WEBHOOK_ENABLED=true)
  # WEBHOOK_SIGNING_SECRET: ""
  # WEBHOOK_BROKER_EVENT_SIGNING_SECRET: ""

  # -- Existing secrets name
  useExistingSecret: false
  existingSecretName: ""
  # -- Extra environment variables (map of key: value pairs)
  extraEnvVars: {}
  serviceAccount:
    # -- Specifies whether a ServiceAccount should be created
    create: true
    # -- Annotations for the ServiceAccount
    annotations: {}
    # -- Name of the service account
    # @default -- `bank-transfer.fullname`
    name: ""
# Valkey (Redis-compatible) configuration
valkey:
  enabled: true
  global:
    security:
      allowInsecureImages: false
  image:
    repository: bitnami/valkey
    tag: "8.0.2"
  external: false
  architecture: standalone
  auth:
    enabled: true
    password: ""
    username: bank_transfer
  primary:
    kind: Deployment
    resourcesPreset: "medium"
    persistence:
      enabled: false
    extraFlags:
      - "--maxmemory 640mb"
      - "--maxmemory-policy allkeys-lru"
      - "--hz 100"
      - "--maxclients 10000"
# PostgreSQL configuration
postgresql:
  enabled: true
  global:
    security:
      allowInsecureImages: false
  image:
    repository: bitnami/postgresql
    tag: "17.4.0"
  external: false
  architecture: replication
  replication:
    numSynchronousReplicas: 1
  auth:
    enabled: true
    enablePostgresUser: true
    postgresPassword: ""
    username: "bank_transfer"
    password: ""
    database: "bank_transfer"
    replicationUsername: "replicator"
    replicationPassword: ""
  primary:
    persistence:
      size: 8Gi
    resourcesPreset: large
    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      wal_keep_size = 512MB
      max_replication_slots = 20
    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "30"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"
  readReplicas:
    name: replication
    replicaCount: 1
    persistence:
      size: 8Gi
    resourcesPreset: large
    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      max_replication_slots = 20
      wal_keep_size = 512MB
    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "40"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"
# MongoDB configuration (mandatory for audit/event persistence)
mongodb:
  enabled: true
  global:
    security:
      allowInsecureImages: false
  image:
    repository: bitnami/mongodb
    tag: "8.0.5"
  architecture: standalone
  auth:
    enabled: true
    rootUser: "admin"
    rootPassword: ""
    usernames:
      - "bank_transfer"
    passwords:
      - ""
    databases:
      - "plugin_br_bank_transfer_jd"
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
# RabbitMQ configuration (optional - disabled by default)
rabbitmq:
  enabled: false
  image:
    tag: "3.13.6"
  persistence:
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile: {type: RuntimeDefault}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities: {drop: ["ALL"]}
  authentication:
    user:
      value: "bank_transfer"
    password:
      value: ""
    erlangCookie:
      # Operators MUST supply a stable cookie (e.g. openssl rand -base64 32) when rabbitmq.enabled=true.
      value: ""
  extraSecrets:
    - name: "bank-transfer-rabbitmq-load-definition"
      mountPath: /etc/rabbitmq/definitions
  customConfig: |
    management.load_definitions = /etc/rabbitmq/definitions/load_definition.json
  