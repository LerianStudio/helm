# Production values template for plugin-br-payments-fakebtg.
# This is a dev/staging mock chart. It has no external dependencies and no
# required secrets.

namespaceOverride: ""

fakebtg:
  replicaCount: 1
  image:
    repository: ghcr.io/lerianstudio/plugin-br-payments-fakebtg
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8090
    targetPort: 8090
  ingress:
    enabled: false
    className: ""
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
  extraEnvVars: {}
