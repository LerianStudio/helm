apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fetcher-worker.fullname" . }}
  labels:
    {{- include "fetcher-worker.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.worker.revisionHistoryLimit | default 10 }}
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "fetcher-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/worker/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/worker/secrets.yaml") . | sha256sum }}
        checksum/common-config: {{ include (print $.Template.BasePath "/common/configmap.yaml") . | sha256sum }}
        {{- with .Values.worker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fetcher-worker.labels" . | nindent 8 }}
    spec:
      {{- with .Values.worker.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.worker.serviceAccount.create }}
      serviceAccountName: {{ include "fetcher-worker.serviceAccountName" . }}
      {{- end }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      securityContext:
        fsGroup: 65532
      {{- else }}
      securityContext:
        {{- toYaml .Values.worker.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "fetcher-worker.fullname" . }}
          securityContext:
            {{- toYaml .Values.worker.securityContext | nindent 12 }}
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "fetcher-worker.fullname" . }}
            - configMapRef:
                name: {{ include "fetcher.fullname" . }}-common
            - secretRef:
                name: {{ if .Values.worker.useExistingSecret }}{{ .Values.worker.existingSecretName }}{{ else }}{{ include "fetcher-worker.fullname" . }}{{ end }}
          {{- if or (eq (toString .Values.common.configmap.ENABLE_TELEMETRY) "true") (and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled) }}
          env:
          {{- if eq (toString .Values.common.configmap.ENABLE_TELEMETRY) "true" }}
            - name: "HOST_IP"
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
              value: "http://$(HOST_IP):4317"
          {{- end }}
          {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
            - name: AWS_EC2_METADATA_SERVICE_ENDPOINT
              value: "http://127.0.0.1:{{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
            - name: AWS_EC2_METADATA_SERVICE_ENDPOINT_MODE
              value: "IPv4"
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
        {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
        - name: aws-signing-helper
          image: "{{ .Values.aws.rolesAnywhere.sidecar.image.repository }}:{{ .Values.aws.rolesAnywhere.sidecar.image.tag }}"
          imagePullPolicy: {{ .Values.aws.rolesAnywhere.sidecar.image.pullPolicy | default "IfNotPresent" }}
          args:
            - serve
            - --certificate
            - /certs/tls.crt
            - --private-key
            - /certs/tls.key
            - --trust-anchor-arn
            - "{{ required "aws.rolesAnywhere.trustAnchorArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.trustAnchorArn }}"
            - --profile-arn
            - "{{ required "aws.rolesAnywhere.profileArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.profileArn }}"
            - --role-arn
            - "{{ required "aws.rolesAnywhere.roleArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.roleArn }}"
            - --region
            - "{{ .Values.aws.rolesAnywhere.region | default "us-east-2" }}"
            - --session-duration
            - "{{ .Values.aws.rolesAnywhere.sessionDuration | default 3600 }}"
            - --port
            - "{{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
          ports:
            - name: imds
              containerPort: {{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}
              protocol: TCP
          volumeMounts:
            - name: iam-certs
              mountPath: /certs
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.aws.rolesAnywhere.sidecar.resources | nindent 12 }}
        {{- end }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      volumes:
        - name: iam-certs
          secret:
            secretName: {{ .Values.aws.rolesAnywhere.certificateSecretName | default "fetcher-iam-tls" }}
            defaultMode: 0440
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
