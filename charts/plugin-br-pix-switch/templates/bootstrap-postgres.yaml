{{- if .Values.global.externalPostgresDefinitions.enabled }}
{{- /*
Plugin BR Pix Switch — PostgreSQL bootstrap.

Creates one Job per database listed in .Values.global.externalPostgresDefinitions.databases.
Pix-switch needs 3 separate Postgres databases: pix-spi, pix-dict, pix-cob.
A single shared role (default: pixswitch) owns all of them.

Each Job is idempotent — it checks for existing role and database before
creating, and grants are safe to re-apply.
*/}}
{{- $admin := .Values.global.externalPostgresDefinitions.postgresAdminLogin -}}
{{- $creds := .Values.global.externalPostgresDefinitions.pixswitchCredentials -}}
{{- $conn := .Values.global.externalPostgresDefinitions.connection -}}
{{- range $db := .Values.global.externalPostgresDefinitions.databases }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "plugin-br-pix-switch.name" $ }}-bootstrap-postgres-{{ $db }}
  namespace: {{ include "global.namespace" $ }}
  labels:
    {{- include "plugin-br-pix-switch.labels" (dict "context" $ "component" "bootstrap-postgres") | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  completions: 1
  parallelism: 1
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          env:
            - name: DB_HOST
              value: {{ $conn.host | quote }}
            - name: DB_PORT
              value: {{ $conn.port | quote }}
          command:
            - /bin/sh
            - -c
            - >
              TIMEOUT=300; ELAPSED=0;
              echo "Checking $DB_HOST:$DB_PORT...";
              while ! nc -z "$DB_HOST" "$DB_PORT"; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "Timeout waiting for $DB_HOST:$DB_PORT after ${TIMEOUT}s"; exit 1;
                fi;
                echo "$DB_HOST:$DB_PORT is not ready yet, waiting... (${ELAPSED}s/${TIMEOUT}s)";
                sleep 5; ELAPSED=$((ELAPSED + 5));
              done;
              echo "$DB_HOST:$DB_PORT is ready!"
      containers:
        - name: psql
          image: postgres:17
          env:
            - name: DB_HOST
              value: {{ $conn.host | quote }}
            - name: DB_PORT
              value: {{ $conn.port | quote }}
            - name: DB_USER_ADMIN
              {{- if $admin.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $admin.useExistingSecret.name | quote }}
                  key: DB_USER_ADMIN
              {{- else }}
              value: {{ $admin.username | quote }}
              {{- end }}
            - name: DB_ADMIN_PASSWORD
              {{- if $admin.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $admin.useExistingSecret.name | quote }}
                  key: DB_ADMIN_PASSWORD
              {{- else }}
              value: {{ $admin.password | quote }}
              {{- end }}
            - name: DB_PASSWORD_PIXSWITCH
              {{- if $creds.useExistingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $creds.useExistingSecret.name | quote }}
                  key: DB_PASSWORD_PIXSWITCH
              {{- else }}
              value: {{ $creds.password | quote }}
              {{- end }}
            - name: DB_ROLE
              value: {{ $creds.username | default "pixswitch" | quote }}
            - name: DB_NAME
              value: {{ $db | quote }}
            - name: DB_DATABASE
              value: postgres
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              echo "=== Pix Switch PostgreSQL Bootstrap (${DB_NAME}) ==="
              echo "Host: ${DB_HOST}:${DB_PORT}"
              echo "Role: ${DB_ROLE}"
              echo ""

              ROLE_EXISTS=0
              DB_EXISTS=0

              if PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -At -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_DATABASE}" -c "SELECT 1 FROM pg_roles WHERE rolname='${DB_ROLE}'" | grep -q 1; then
                ROLE_EXISTS=1
              fi
              if PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -At -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_DATABASE}" -c "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1; then
                DB_EXISTS=1
              fi

              # Role and database names come from chart values (validated upstream), so
              # interpolating them via shell is safe. The password is escaped (single
              # quotes doubled) before being interpolated into the SQL literal.
              if [ "${ROLE_EXISTS}" = "1" ]; then
                echo "Role '${DB_ROLE}' already exists. Skipping creation."
              else
                echo "Creating role '${DB_ROLE}'..."
                ESCAPED_PW=$(printf '%s' "${DB_PASSWORD_PIXSWITCH}" | sed "s/'/''/g")
                PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_DATABASE}" -c "CREATE ROLE \"${DB_ROLE}\" LOGIN PASSWORD '${ESCAPED_PW}'"
              fi

              if [ "${DB_EXISTS}" = "1" ]; then
                echo "Database '${DB_NAME}' already exists. Skipping creation."
              else
                echo "Creating database '${DB_NAME}'..."
                PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_DATABASE}" -c "CREATE DATABASE \"${DB_NAME}\" OWNER \"${DB_ROLE}\""
              fi

              echo "Ensuring privileges on '${DB_NAME}'..."
              PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_DATABASE}" -c "GRANT ALL PRIVILEGES ON DATABASE \"${DB_NAME}\" TO \"${DB_ROLE}\""
              PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_NAME}" -c "GRANT ALL ON SCHEMA public TO \"${DB_ROLE}\""
              PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_NAME}" -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO \"${DB_ROLE}\""
              PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_NAME}" -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO \"${DB_ROLE}\""
              PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_NAME}" -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO \"${DB_ROLE}\""
              PGPASSWORD="${DB_ADMIN_PASSWORD}" psql -v ON_ERROR_STOP=1 -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER_ADMIN}" -d "${DB_NAME}" -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO \"${DB_ROLE}\""

              echo ""
              echo "=== Pix Switch PostgreSQL Bootstrap (${DB_NAME}) completed ==="
{{- end }}
{{- end }}
