apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fetcher-worker.fullname" . }}
  labels:
    {{- include "fetcher-worker.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.worker.configmap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  # Rate Limiting - Three-tier system with Redis backend
  # Set RATE_LIMIT_ENABLED=false to disable (requires ALLOW_RATELIMIT_DISABLED in strict tier)
  # ALLOW_RATELIMIT_DISABLED: Set a detailed reason message explaining why rate limiting is disabled (e.g., "Service processes batch jobs only, no user-facing API endpoints")
  # ALLOW_RATELIMIT_FAIL_OPEN: Set a detailed reason message to allow fail-open mode in production
  # Always set VERSION and OTEL_RESOURCE_SERVICE_VERSION from image tag
  VERSION: {{ .Values.worker.image.tag | default .Chart.AppVersion | quote }}
  OTEL_RESOURCE_SERVICE_VERSION: {{ .Values.worker.image.tag | default .Chart.AppVersion | quote }}
  {{- with .Values.worker.extraEnvVars }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
