# Default values for tracer components.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
nameOverride: "tracer"
fullnameOverride: ""
namespaceOverride: "tracer"

global:
  # -- Bootstrap job for external PostgreSQL: creates databases, roles, and grants privileges
  externalPostgresDefinitions:
    # -- Enable or disable the PostgreSQL bootstrap job
    enabled: false
    # -- PostgreSQL connection settings
    connection:
      # -- PostgreSQL host
      host: "tracer-postgresql"
      # -- PostgreSQL port
      port: "5432"
    # -- Admin credentials for PostgreSQL
    postgresAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing DB_USER_ADMIN and DB_ADMIN_PASSWORD keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "postgres"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: "lerian"
    # -- Credentials for tracer role created by the job
    tracerCredentials:
      useExistingSecret:
        # -- Name of existing secret containing DB_PASSWORD_TRACER key
        name: ""
      # -- Password for tracer role (ignored if useExistingSecret.name is set)
      password: "lerian"

tracer:
  # -- Readiness probe configuration. All fields override chart defaults.
  readinessProbe: {}
  # -- Liveness probe configuration. All fields override chart defaults.
  livenessProbe: {}
  # -- Service name
  name: tracer

  # -- Service description
  description: "Real-time transaction validation and fraud prevention API"

  # -- Enable or disable the tracer service
  enabled: true

  # -- Number of replicas for the tracer service
  replicaCount: 1

  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10

  image:
    # -- Repository for the tracer service container image
    repository: lerianstudio/tracer
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag used for deployment
    tag: "1.0.0"

  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []

  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""

  # -- Pod annotations for additional metadata
  podAnnotations: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true

  # -- PodDisruptionBudget configuration
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Minimum number of available pods
    minAvailable: 1
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Annotations for the PodDisruptionBudget
    annotations: {}

  # -- Deployment update strategy
  deploymentUpdate:
    # -- Type of deployment strategy
    type: RollingUpdate
    # -- Maximum number of pods that can be created over the desired number of pods
    maxSurge: 1
    # -- Maximum number of pods that can be unavailable during the update
    maxUnavailable: 1

  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Port for the HTTP API. Matches the tracer source convention
    # (Dockerfile EXPOSE 4020 + .env.example + Dockerfile.dev SERVER_PORT=4020).
    # Override in environment values.yaml when an existing deployment expects
    # a different port (e.g. legacy 8080).
    port: 4020
    annotations: {}

  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Additional ingress annotations
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for ingress
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 500m
      memory: 512Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}

  # -- Tolerations for scheduling on tainted nodes
  tolerations: {}

  # -- Affinity rules for pod scheduling
  affinity: {}

  # -- ConfigMap for environment variables and configurations
  # @default -- templates/configmap.yaml
  configmap:
    # Application Settings
    # SERVER_PORT/SERVER_ADDRESS default to 4020 to match the tracer source
    # convention (Dockerfile EXPOSE 4020 + .env.example + Dockerfile.dev). The
    # app reads SERVER_ADDRESS first; if empty, falls back to SERVER_PORT.
    # Keep these in sync with service.port above (and containerPort) when
    # overriding in environment values.yaml.
    SERVER_PORT: "4020"
    SERVER_ADDRESS: ":4020"
    LOG_LEVEL: "info"

    # Authentication
    API_KEY_ENABLED: "false"

    # CORS Configuration
    CORS_ALLOWED_ORIGINS: "*"

    # Auth Plugin (Access Manager)
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_ADDRESS: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local.:4000"

    # PostgreSQL Database
    DB_HOST: "tracer-postgresql.tracer.svc.cluster.local."
    DB_PORT: "5432"
    DB_NAME: "tracer"
    DB_USER: "tracer"
    DB_SSL_MODE: "disable"
    MIGRATIONS_PATH: "./migrations"

    # Swagger Documentation
    SWAGGER_TITLE: "Tracer API"
    SWAGGER_DESCRIPTION: "Real-time transaction validation and fraud prevention API"
    SWAGGER_HOST: ":4020"
    SWAGGER_BASE_PATH: "/"
    SWAGGER_SCHEMES: "http"

    # CEL Expression Engine
    CEL_COST_LIMIT: "10000"

    # OpenTelemetry
    # -- Enable telemetry collection (when true, OTEL_EXPORTER_OTLP_ENDPOINT is overridden with HOST_IP:4317)
    ENABLE_TELEMETRY: "false"
    # -- OTEL library name for instrumentation
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/tracer"
    # -- OTEL resource service name for traces/metrics
    OTEL_RESOURCE_SERVICE_NAME: "tracer"
    # -- OTEL exporter endpoint (empty when disabled; overridden by HOST_IP:4317 when ENABLE_TELEMETRY=true)
    OTEL_EXPORTER_OTLP_ENDPOINT: ""

    # Cleanup Worker
    CLEANUP_WORKER_ENABLED: "false"
    CLEANUP_INTERVAL_HOURS: "24"

    # Multi-Tenant
    # -- Enable multi-tenant mode. When true, the following fields are required:
    #    MULTI_TENANT_URL, MULTI_TENANT_REDIS_HOST, secrets.MULTI_TENANT_SERVICE_API_KEY.
    #    Also requires PLUGIN_AUTH_ENABLED=true and API_KEY_ENABLED_ONLY_VALIDATION=false
    #    (enforced by the app at boot for security).
    MULTI_TENANT_ENABLED: "false"
    # -- Tenant Manager URL (required when MULTI_TENANT_ENABLED=true).
    #    Use http://tenant-manager.<ns>.svc.cluster.local:4026 for in-cluster traffic.
    MULTI_TENANT_URL: ""
    # -- Allow http:// MULTI_TENANT_URL. lib-commons rejects cleartext HTTP unless
    #    this is true. Never set true in production.
    MULTI_TENANT_ALLOW_INSECURE_HTTP: "false"
    # -- Redis host for tenant connection-pool registry (required when MT enabled).
    MULTI_TENANT_REDIS_HOST: ""
    # -- Redis port for tenant registry.
    MULTI_TENANT_REDIS_PORT: "6379"
    # -- Use TLS for tenant Redis connection. Default true (matches app's
    #    secure-by-default; app forces true when env var is unset).
    MULTI_TENANT_REDIS_TLS: "true"
    # -- Maximum number of tenant connection pools held in memory.
    MULTI_TENANT_MAX_TENANT_POOLS: "100"
    # -- Idle timeout (seconds) before evicting unused tenant pool.
    MULTI_TENANT_IDLE_TIMEOUT_SEC: "300"
    # -- Tenant manager request timeout (seconds).
    MULTI_TENANT_TIMEOUT: "30"
    # -- Circuit breaker failure threshold for tenant manager calls.
    MULTI_TENANT_CIRCUIT_BREAKER_THRESHOLD: "5"
    # -- Circuit breaker open timeout (seconds) before half-open retry.
    MULTI_TENANT_CIRCUIT_BREAKER_TIMEOUT_SEC: "30"
    # -- Cache TTL (seconds) for tenant manager responses.
    MULTI_TENANT_CACHE_TTL_SEC: "120"
    # -- Per-tenant connection liveness check interval (seconds).
    MULTI_TENANT_CONNECTIONS_CHECK_INTERVAL_SEC: "30"
    # -- Optional cap on per-tenant DB connections (only set in MT integration tests
    #    or environments with very low DB max_connections; leave unset in production).
    # MULTI_TENANT_MAX_OPEN_CONNS_PER_TENANT: ""
    # MULTI_TENANT_MAX_IDLE_CONNS_PER_TENANT: ""

  # -- Secrets for storing sensitive data
  # @default -- templates/secrets.yaml
  secrets:
    # -- PostgreSQL password
    DB_PASSWORD: "lerian"
    # -- API Key value (read by the app as $API_KEY when API_KEY_ENABLED=true).
    #    The chart previously named this API_KEY_SECRET, which the app never
    #    reads — silently disabling API-key auth even with API_KEY_ENABLED=true.
    API_KEY: ""
    # -- Tenant Manager service API key (required when MULTI_TENANT_ENABLED=true).
    #    Helm render fails fast if MT is enabled and this is empty.
    # MULTI_TENANT_SERVICE_API_KEY: ""
    # -- Optional Redis password for the tenant connection-pool registry.
    # MULTI_TENANT_REDIS_PASSWORD: ""

  # -- Existing secrets name
  useExistingSecret: false
  existingSecretName: ""

  # -- Extra environment variables
  extraEnvVars: []

  serviceAccount:
    # -- Specifies whether a ServiceAccount should be created
    create: true
    # -- Annotations for the ServiceAccount
    annotations: {}
    # -- Name of the service account
    # @default -- `tracer.fullname`
    name: ""
