{{- if or .Values.keda.enabled .Values.keda.external }}
{{- if .Values.worker.keda.scaledJob.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: {{ include "plugin-worker.fullname" . }}
  labels:
    {{- include "plugin-worker.labels" (dict "context" . "name" .Values.worker.name ) | nindent 4 }}
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: reporter
  annotations:
    {{- with .Values.worker.annotations }}
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
spec:
  jobTargetRef:
    backoffLimit: {{ .Values.worker.keda.scaledJob.backoffLimit }}
    ttlSecondsAfterFinished: {{ .Values.worker.keda.scaledJob.ttlSecondsAfterFinished }}
    activeDeadlineSeconds: {{ .Values.worker.keda.scaledJob.activeDeadlineSeconds | default 300 }}
    template:
      spec:
        {{- with .Values.worker.imagePullSecrets }}
        imagePullSecrets:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if and $.Values.aws $.Values.aws.rolesAnywhere $.Values.aws.rolesAnywhere.enabled }}
        securityContext:
          fsGroup: 65532
        {{- end }}
        containers:
        - name: {{ include "plugin-worker.fullname" . }}
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "plugin-worker.fullname" . }}
            - secretRef:
                name: {{ if .Values.worker.useExistingSecret }}{{ .Values.worker.existingSecretName }}{{ else }}{{ include "plugin-worker.fullname" . }}{{ end }}
          {{- if or (index .Values "otel-collector-lerian").enabled (and $.Values.aws $.Values.aws.rolesAnywhere $.Values.aws.rolesAnywhere.enabled) }}
          env:
          {{- if (index .Values "otel-collector-lerian").enabled }}
          - name: "HOST_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "$(HOST_IP):4317"
          {{- end }}
          {{- if and $.Values.aws $.Values.aws.rolesAnywhere $.Values.aws.rolesAnywhere.enabled }}
          - name: AWS_EC2_METADATA_SERVICE_ENDPOINT
            value: "http://127.0.0.1:{{ $.Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
          - name: AWS_EC2_METADATA_SERVICE_ENDPOINT_MODE
            value: "IPv4"
          {{- end }}
          {{- end }}
          resources:
            limits:
              cpu: {{ .Values.worker.resources.limits.cpu }}
              memory: {{ .Values.worker.resources.limits.memory }}
            requests:
              cpu: {{ .Values.worker.resources.requests.cpu }}
              memory: {{ .Values.worker.resources.requests.memory }}
        {{- if and $.Values.aws $.Values.aws.rolesAnywhere $.Values.aws.rolesAnywhere.enabled }}
        - name: aws-signing-helper
          image: "{{ $.Values.aws.rolesAnywhere.sidecar.image.repository }}:{{ $.Values.aws.rolesAnywhere.sidecar.image.tag }}"
          imagePullPolicy: {{ $.Values.aws.rolesAnywhere.sidecar.image.pullPolicy | default "IfNotPresent" }}
          args:
            - serve
            - --certificate
            - /certs/tls.crt
            - --private-key
            - /certs/tls.key
            - --trust-anchor-arn
            - "{{ $.Values.aws.rolesAnywhere.trustAnchorArn }}"
            - --profile-arn
            - "{{ $.Values.aws.rolesAnywhere.profileArn }}"
            - --role-arn
            - "{{ $.Values.aws.rolesAnywhere.roleArn }}"
            - --region
            - "{{ $.Values.aws.rolesAnywhere.region | default "us-east-2" }}"
            - --session-duration
            - "{{ $.Values.aws.rolesAnywhere.sessionDuration | default 3600 }}"
            - --port
            - "{{ $.Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
          ports:
            - name: imds
              containerPort: {{ $.Values.aws.rolesAnywhere.sidecar.port | default 9911 }}
              protocol: TCP
          volumeMounts:
            - name: iam-certs
              mountPath: /certs
              readOnly: true
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml $.Values.aws.rolesAnywhere.sidecar.resources | nindent 12 }}
        {{- end }}
        {{- if and $.Values.aws $.Values.aws.rolesAnywhere $.Values.aws.rolesAnywhere.enabled }}
        volumes:
          - name: iam-certs
            secret:
              secretName: {{ $.Values.aws.rolesAnywhere.certificateSecretName | default "reporter-iam-tls" }}
              defaultMode: 0440
              items:
                - key: tls.crt
                  path: tls.crt
                - key: tls.key
                  path: tls.key
        {{- end }}
        restartPolicy: Never
        {{- with .Values.worker.nodeSelector }}
        nodeSelector:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.worker.affinity }}
        affinity:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.worker.tolerations }}
        tolerations:
          {{- toYaml . | nindent 10 }}
        {{- end }}        
  pollingInterval: {{ .Values.worker.keda.scaledJob.pollingInterval }}
  successfulJobsHistoryLimit: {{ .Values.worker.keda.scaledJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.worker.keda.scaledJob.failedJobsHistoryLimit }}
  maxReplicaCount: {{ .Values.worker.keda.scaledJob.maxReplicaCount }}        
  triggers:
  {{- range .Values.worker.keda.scaledJob.triggers }}
  - type: {{ .type }}
    metadata:
      queueName: {{ $.Values.common.configmap.RABBITMQ_GENERATE_REPORT_QUEUE | quote }}
      host: "{{ $.Values.common.configmap.RABBITMQ_URI | default "amqp" }}://{{ $.Values.common.configmap.RABBITMQ_HOST }}:{{ $.Values.common.configmap.RABBITMQ_PORT_AMQP }}"
      queueLength: {{ .metadata.queueLength | quote }}
      protocol: {{ .metadata.protocol | quote }}
      vhost: {{ .metadata.vhost }}
    authenticationRef:
      name: keda-trigger-authentication
  {{- end }}
{{- end }}
{{- end }}
