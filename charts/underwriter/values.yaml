# Default values for underwriter components.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
nameOverride: "underwriter"
fullnameOverride: ""
namespaceOverride: "underwriter"

global:
  # -- Bootstrap job for external PostgreSQL: creates databases, roles, and grants privileges
  externalPostgresDefinitions:
    # -- Enable or disable the PostgreSQL bootstrap job
    enabled: false
    # -- PostgreSQL connection settings
    connection:
      # -- PostgreSQL host
      host: "underwriter-postgresql"
      # -- PostgreSQL port
      port: "5432"
    # -- Admin credentials for PostgreSQL
    postgresAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing DB_USER_ADMIN and DB_ADMIN_PASSWORD keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "postgres"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: "lerian"
    # -- Credentials for underwriter role created by the job
    underwriterCredentials:
      useExistingSecret:
        # -- Name of existing secret containing DB_PASSWORD_UNDERWRITER key
        name: ""
      # -- Password for underwriter role (ignored if useExistingSecret.name is set)
      password: "lerian"

underwriter:
  # -- Readiness probe configuration. All fields override chart defaults.
  readinessProbe: {}
  # -- Liveness probe configuration. All fields override chart defaults.
  livenessProbe: {}
  # -- Service name
  name: underwriter

  # -- Service description
  description: "Risk assessment and underwriting service"

  # -- Enable or disable the underwriter service
  enabled: true

  # -- Number of replicas for the underwriter service
  replicaCount: 1

  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10

  image:
    # -- Repository for the underwriter service container image
    repository: ghcr.io/lerianstudio/underwriter
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag used for deployment
    tag: "1.0.0"

  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []

  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""

  # -- Pod annotations for additional metadata
  podAnnotations: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 65532
    # -- Defines the user ID for the process running inside the container
    runAsUser: 65532
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true

  # -- PodDisruptionBudget configuration
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Minimum number of available pods
    minAvailable: 1
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Annotations for the PodDisruptionBudget
    annotations: {}

  # -- Deployment update strategy
  deploymentUpdate:
    # -- Type of deployment strategy
    type: RollingUpdate
    # -- Maximum number of pods that can be created over the desired number of pods
    maxSurge: 1
    # -- Maximum number of pods that can be unavailable during the update
    maxUnavailable: 1

  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Port for the HTTP API
    port: 4017
    annotations: {}

  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Additional ingress annotations
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for ingress
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 500m
      memory: 512Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}

  # -- Tolerations for scheduling on tainted nodes
  tolerations: {}

  # -- Affinity rules for pod scheduling
  affinity: {}

  # -- ConfigMap for environment variables and configurations.
  # All keys mirror the env vars consumed by the underwriter app
  # (see internal/bootstrap/config.go). Only the keys you want to override
  # need to appear here in consumer values.yaml; defaults are applied by
  # the chart template.
  # @default -- templates/configmap.yaml
  configmap:
    # Application Settings
    ENV_NAME: "production"
    LOG_LEVEL: "info"
    DEPLOYMENT_MODE: "local"
    # NOTE: VERSION and OTEL_RESOURCE_SERVICE_VERSION are auto-derived from
    #       .Values.underwriter.image.tag in templates/configmap.yaml; do not
    #       set them here.

    # HTTP server
    SERVER_ADDRESS: ":4017"
    HTTP_BODY_LIMIT_BYTES: "104857600"
    TLS_TERMINATED_UPSTREAM: "true"

    # CORS
    CORS_ALLOWED_ORIGINS: "*"
    CORS_ALLOWED_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    CORS_ALLOWED_HEADERS: "Origin,Content-Type,Accept,Authorization,X-Request-ID"
    CORS_EXPOSE_HEADERS: ""
    CORS_ALLOW_CREDENTIALS: "false"

    # Tenancy
    DEFAULT_TENANT_ID: "11111111-1111-1111-1111-111111111111"

    # Multi-tenant
    MULTI_TENANT_ENABLED: "false"
    MULTI_TENANT_URL: ""
    MULTI_TENANT_REDIS_HOST: ""
    MULTI_TENANT_REDIS_PORT: "6379"
    MULTI_TENANT_REDIS_TLS: "false"
    MULTI_TENANT_MAX_TENANT_POOLS: "100"
    MULTI_TENANT_IDLE_TIMEOUT_SEC: "300"
    MULTI_TENANT_TIMEOUT: "30"
    MULTI_TENANT_CIRCUIT_BREAKER_THRESHOLD: "5"
    MULTI_TENANT_CIRCUIT_BREAKER_TIMEOUT_SEC: "30"
    MULTI_TENANT_CACHE_TTL_SEC: "120"
    MULTI_TENANT_CONNECTIONS_CHECK_INTERVAL_SEC: "30"

    # PostgreSQL primary
    POSTGRES_HOST: "underwriter-postgresql-primary"
    POSTGRES_PORT: "5432"
    POSTGRES_NAME: "underwriter"
    POSTGRES_USER: "underwriter"
    POSTGRES_SSLMODE: "disable"
    MIGRATIONS_PATH: "migrations"

    # PostgreSQL replica (optional; falls back to primary if unset)
    POSTGRES_REPLICA_HOST: ""
    POSTGRES_REPLICA_PORT: ""
    POSTGRES_REPLICA_NAME: ""
    POSTGRES_REPLICA_USER: ""
    POSTGRES_REPLICA_SSLMODE: ""

    # PostgreSQL connection pool
    POSTGRES_MAX_OPEN_CONNS: "25"
    POSTGRES_MAX_IDLE_CONNS: "5"
    POSTGRES_CONN_MAX_LIFETIME_MINS: "30"
    POSTGRES_CONN_MAX_IDLE_TIME_MINS: "5"
    POSTGRES_CONNECT_TIMEOUT_SEC: "10"

    # Redis / Valkey
    REDIS_HOST: "underwriter-valkey-primary:6379"
    REDIS_DB: "0"
    REDIS_PROTOCOL: "3"
    REDIS_TLS: "false"
    REDIS_POOL_SIZE: "10"
    REDIS_MIN_IDLE_CONNS: "2"
    REDIS_READ_TIMEOUT: "3s"
    REDIS_WRITE_TIMEOUT: "3s"
    REDIS_DIAL_TIMEOUT: "5s"
    REDIS_POOL_TIMEOUT: "4s"
    REDIS_MAX_RETRIES: "3"
    REDIS_MIN_RETRY_BACKOFF: "8ms"
    REDIS_MAX_RETRY_BACKOFF: "512ms"
    REDIS_MASTER_NAME: ""

    # RabbitMQ
    RABBITMQ_ENABLED: "false"
    RABBITMQ_HOST: ""
    RABBITMQ_PORT_AMQP: "5672"
    RABBITMQ_PORT_HOST: "15672"
    RABBITMQ_VHOST: "/"
    RABBITMQ_DEFAULT_USER: ""
    RABBITMQ_EXCHANGE: "underwriter.events"
    RABBITMQ_QUEUE: "underwriter.events.queue"
    RABBITMQ_URL: ""
    RABBITMQ_HEALTH_CHECK_URL: ""
    RABBITMQ_HEALTH_CHECK_ALLOWED_HOSTS: ""
    RABBITMQ_REQUIRE_HEALTH_ALLOWED_HOSTS: "false"
    RABBITMQ_ALLOW_INSECURE_HEALTH_CHECK: "false"
    RABBITMQ_ALLOW_INSECURE_TLS: "false"
    RABBITMQ_PUBLISHER_CONFIRM_TIMEOUT_MS: "5000"
    RABBITMQ_PUBLISHER_MAX_RECOVERIES: "5"
    RABBITMQ_PUBLISHER_RECOVERY_INITIAL_MS: "100"
    RABBITMQ_PUBLISHER_RECOVERY_MAX_MS: "5000"

    # Outbox pattern (transactional event publishing)
    OUTBOX_ENABLED: "false"
    OUTBOX_TABLE_NAME: "outbox_events"
    OUTBOX_BATCH_SIZE: "100"
    OUTBOX_DISPATCH_INTERVAL_SEC: "5"
    OUTBOX_PROCESSING_TIMEOUT_SEC: "30"
    OUTBOX_MAX_DISPATCH_ATTEMPTS: "5"
    OUTBOX_MAX_FAILED_PER_BATCH: "10"
    OUTBOX_RETRY_WINDOW_SEC: "60"
    OUTBOX_PUBLISH_BACKOFF_MS: "100"
    OUTBOX_PUBLISH_MAX_ATTEMPTS: "3"
    OUTBOX_PRIORITY_EVENT_TYPES: ""
    OUTBOX_INCLUDE_TENANT_METRICS: "false"
    OUTBOX_ALLOW_EMPTY_TENANT: "false"

    # Plugin Auth (Access Manager integration)
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_HOST: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local.:4000"

    # Swagger
    SWAGGER_ENABLED: "false"
    SWAGGER_TITLE: "Underwriter API"
    SWAGGER_DESCRIPTION: "Underwriter service"
    SWAGGER_HOST: ""
    SWAGGER_BASE_PATH: "/"
    SWAGGER_SCHEMES: "https"
    SWAGGER_LEFT_DELIM: "{{"
    SWAGGER_RIGHT_DELIM: "}}"

    # Rate limiting
    RATE_LIMIT_ENABLED: "true"
    RATE_LIMIT_MAX: "100"
    RATE_LIMIT_WINDOW_SEC: "60"
    AGGRESSIVE_RATE_LIMIT_MAX: "10"
    AGGRESSIVE_RATE_LIMIT_WINDOW_SEC: "60"
    RELAXED_RATE_LIMIT_MAX: "1000"
    RELAXED_RATE_LIMIT_WINDOW_SEC: "60"
    CIRCUIT_BREAKER_ENABLED: "true"

    # Idempotency
    IDEMPOTENCY_RETRY_WINDOW_SEC: "300"

    # Pagination
    MAX_PAGINATION_LIMIT: "100"
    MAX_PAGINATION_MONTH_DATE_RANGE: "12"

    # Infrastructure boot
    INFRA_CONNECT_TIMEOUT_SEC: "30"
    DB_METRICS_INTERVAL_SEC: "15"

    # AWS
    AWS_REGION: ""

    # Examples / domain features
    EXAMPLE_STATUS_PROVIDER_MODE: "healthy"

    # OpenTelemetry
    # -- Enable telemetry collection (when true, OTEL_EXPORTER_OTLP_ENDPOINT is overridden with HOST_IP:4317)
    ENABLE_TELEMETRY: "false"
    # -- OTEL library name for instrumentation
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/underwriter"
    # -- OTEL resource service name for traces/metrics
    OTEL_RESOURCE_SERVICE_NAME: "underwriter"
    # -- OTEL exporter endpoint (empty when disabled; overridden by HOST_IP:4317 when ENABLE_TELEMETRY=true)
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    # -- OTEL deployment environment
    OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: "production"

  # -- Secrets for storing sensitive data
  # @default -- templates/secrets.yaml
  secrets:
    # -- PostgreSQL primary password
    POSTGRES_PASSWORD: "lerian"
    # -- PostgreSQL replica password (defaults to PostgreSQL primary password if unset)
    POSTGRES_REPLICA_PASSWORD: ""
    # -- Redis password (empty if auth disabled)
    REDIS_PASSWORD: ""
    # -- Redis CA certificate path / contents (when REDIS_TLS=true and a custom CA is required)
    REDIS_CA_CERT: ""
    # -- RabbitMQ password (when RABBITMQ_ENABLED=true)
    RABBITMQ_DEFAULT_PASS: ""
    # -- Multi-tenant Redis password (when MULTI_TENANT_ENABLED=true and the manager Redis requires auth)
    MULTI_TENANT_REDIS_PASSWORD: ""
    # -- Multi-tenant service API key (M2M auth against the tenant-manager)
    MULTI_TENANT_SERVICE_API_KEY: ""
    # -- TLS certificate file path (when running TLS at the app layer instead of TLS_TERMINATED_UPSTREAM=true)
    SERVER_TLS_CERT_FILE: ""
    # -- TLS key file path
    SERVER_TLS_KEY_FILE: ""

  # -- Existing secrets name
  useExistingSecret: false
  existingSecretName: ""

  # -- Extra environment variables
  extraEnvVars: []

  serviceAccount:
    # -- Specifies whether a ServiceAccount should be created
    create: true
    # -- Annotations for the ServiceAccount
    annotations: {}
    # -- Name of the service account
    # @default -- `underwriter.fullname`
    name: ""

valkey:
  # Valkey is used for caching, rate limiting, and idempotency key storage
  enabled: true

  global:
    security:
      allowInsecureImages: true

  image:
    repository: bitnamisecure/valkey
    tag: "latest"

  external: false
  architecture: standalone

  auth:
    enabled: true
    password: lerian
    username: underwriter

  primary:
    kind: Deployment
    resourcesPreset: "medium"

    persistence:
      enabled: false

    extraFlags:
      - "--maxmemory 640mb"
      - "--maxmemory-policy allkeys-lru"
      - "--hz 100"
      - "--maxclients 10000"

postgresql:
  # PostgreSQL is the primary database for underwriter structured data
  enabled: true

  global:
    security:
      allowInsecureImages: true

  image:
    repository: bitnamisecure/postgresql
    tag: "latest"

  external: false
  architecture: replication
  replication:
    numSynchronousReplicas: 1
  auth:
    enabled: true
    enablePostgresUser: true
    postgresPassword: "lerian"
    username: "underwriter"
    password: "lerian"
    database: "underwriter"
    replicationUsername: "replicator"
    replicationPassword: "replicator_password"

  primary:
    persistence:
      size: 8Gi

    resourcesPreset: large

    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      wal_keep_size = 512MB
      max_replication_slots = 20

    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "30"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"

  readReplicas:
    name: replication
    replicaCount: 1
    persistence:
      size: 8Gi

    resourcesPreset: large

    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      max_replication_slots = 20
      wal_keep_size = 512MB

    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "30"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"

