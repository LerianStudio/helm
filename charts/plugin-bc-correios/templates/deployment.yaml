{{- $component := index .Values "bc-correios" -}}
{{- if $component.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bc-correios.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "bc-correios.labels" (dict "context" . "component" $component.name "name" $component.name) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ $component.revisionHistoryLimit | default 10 }}
  strategy:
    type: {{ $component.deploymentUpdate.type }}
    {{- if eq $component.deploymentUpdate.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ $component.deploymentUpdate.maxSurge }}
      maxUnavailable: {{ $component.deploymentUpdate.maxUnavailable }}
    {{- end }}
  {{- if not $component.autoscaling.enabled }}
  replicas: {{ $component.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "bc-correios.selectorLabels" (dict "context" . "name" $component.name) | nindent 6 }}
  template:
    metadata:
      {{- with $component.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "bc-correios.labels" (dict "context" . "component" $component.name "name" $component.name) | nindent 8 }}
    spec:
      {{- with $component.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "bc-correios.serviceAccountName" . }}
      securityContext:
        {{- toYaml $component.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37
          envFrom:
          - configMapRef:
              name: {{ include "bc-correios.fullname" . }}
          command:
            - /bin/sh
            - -c
            - |
              MAX_ATTEMPTS=60
              SLEEP_SECONDS=5
              # Total timeout: 60 * 5 = 300 seconds (5 minutes)

              wait_for_service() {
                local HOST="$1"
                local PORT="$2"
                local ATTEMPTS=0
                echo "Checking $HOST:$PORT..."
                while ! nc -z "$HOST" "$PORT"; do
                  ATTEMPTS=$((ATTEMPTS + 1))
                  if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                    echo "Timeout waiting for $HOST:$PORT after $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds"
                    exit 1
                  fi
                  echo "$HOST:$PORT is not ready yet, waiting... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                  sleep $SLEEP_SECONDS
                done
                echo "$HOST:$PORT is ready!"
              }

              # Wait for PostgreSQL
              wait_for_service "$POSTGRES_HOST" "$POSTGRES_PORT"

              # Wait for RabbitMQ (AMQP port)
              # Uses RABBITMQ_HOST from configmap — no credentials required for TCP check
              wait_for_service "$RABBITMQ_HOST" "5672"

              # Wait for Valkey/Cache
              CACHE_HOST=$(echo "$CACHE_ADDR" | cut -d: -f1)
              CACHE_PORT=$(echo "$CACHE_ADDR" | cut -d: -f2)
              wait_for_service "$CACHE_HOST" "$CACHE_PORT"

              {{- if .Values.seaweedfs.enabled }}
              # Wait for SeaweedFS S3 API
              SEAWEEDFS_HOST=$(echo "$OBJECT_STORAGE_ENDPOINT" | sed 's|http://||' | cut -d: -f1)
              wait_for_service "$SEAWEEDFS_HOST" "8333"
              {{- end }}

              echo "All dependencies are ready!"
      containers:
        - name: {{ include "bc-correios.fullname" . }}
          securityContext:
            {{- toYaml $component.securityContext | nindent 12 }}
          image: "{{ $component.image.repository }}:{{ $component.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ $component.image.pullPolicy }}
          envFrom:
          - secretRef:
              name: {{ if $component.useExistingSecret }}{{ required "bc-correios.existingSecretName is required when bc-correios.useExistingSecret is true" $component.existingSecretName }}{{ else }}{{ include "bc-correios.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "bc-correios.fullname" . }}
          {{- if eq (toString $component.configmap.TRACING_ENABLED) "true" }}
          env:
          - name: "HOST_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "$(HOST_IP):4317"
          {{- end }}
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml $component.resources | nindent 12 }}
      {{- with $component.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $component.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $component.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $component.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
