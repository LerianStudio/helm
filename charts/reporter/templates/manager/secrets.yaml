{{- if not .Values.manager.useExistingSecret }}
{{- $_ := required "secrets.RABBITMQ_DEFAULT_PASS is required" .Values.secrets.RABBITMQ_DEFAULT_PASS }}
{{- $_ := required "secrets.DATASOURCE_ONBOARDING_PASSWORD is required" .Values.secrets.DATASOURCE_ONBOARDING_PASSWORD }}
{{- include "reporter.rabbitmqErlangCookieRequired" . }}
{{- include "reporter.rabbitmqExistingSecretConsistent" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-manager.fullname" . }}
  labels:
    {{- include "plugin-manager.labels" (dict "context" . "name" .Values.manager.name ) | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
type: Opaque
data:
  # MONGO_PASSWORD is single-sourced from the Bitnami mongodb subchart Secret
  # (<release>-mongodb, key mongodb-root-password) and read via secretKeyRef on each
  # workload; it is NOT ranged in here. It is only written for an EXTERNAL MongoDB
  # (mongodb.external=true) without mongodb.auth.existingSecret. The RabbitMQ password
  # stays here as the single source: the broker is pointed at this Secret via
  # rabbitmq.authentication.existingSecret. See docs/helm-chart-standard.md.
  {{- include "reporter.mongoExternalSecretData" . | nindent 2 }}
  {{- range $key, $value := .Values.secrets }}
  {{- if ne $key "MONGO_PASSWORD" }}
  {{ $key }}: {{ $value | toString | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
