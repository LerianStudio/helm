{{- include "plugin-br-pix-indirect-btg.validateRequired" . }}
{{- include "plugin-br-pix-indirect-btg.validatePostgreSQL" . }}
{{- include "plugin-br-pix-indirect-btg.validateMongoDB" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plugin-br-pix-indirect-btg.fullname" . }}
  labels:
    {{- include "plugin-br-pix-indirect-btg.labels" (dict "context" . "name" .Values.pix.name ) | nindent 4 }} 
spec:
  revisionHistoryLimit: {{ .Values.pix.revisionHistoryLimit | default 10 }}
  strategy:
    {{- toYaml .Values.pix.deploymentStrategy | nindent 4 }}
  replicas: {{ .Values.pix.replicaCount }}
  selector:
    matchLabels:
      {{- include "plugin-br-pix-indirect-btg.selectorLabels" (dict "context" . "name" .Values.pix.name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plugin-br-pix-indirect-btg.labels" (dict "context" . "name" .Values.pix.name ) | nindent 8 }}
    spec:
    {{- with .Values.pix.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      securityContext:
        {{- toYaml .Values.pix.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "plugin-br-pix-indirect-btg.fullname" . }}
          image: {{ .Values.pix.image.repository }}:{{ .Values.pix.image.tag | default (include "plugin.version" .) }}
          imagePullPolicy: {{ .Values.pix.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.pix.service.port }}
              protocol: TCP
          envFrom:
          - secretRef:
              name: {{ if .Values.pix.useExistingSecrets }}{{ .Values.pix.existingSecretName }}{{ else }}{{ include "plugin-br-pix-indirect-btg.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "plugin-br-pix-indirect-btg.fullname" . }}
          {{ if (index .Values "otel-collector-lerian").enabled }}
          env:
          - name: "HOST_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "$(HOST_IP):4317"
          {{ end }}  
          resources:
            {{- toYaml .Values.pix.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.pix.readinessProbe.path | default "/readyz" }}
              port: {{ .Values.pix.service.port }}
            initialDelaySeconds: {{ .Values.pix.readinessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.pix.readinessProbe.periodSeconds | default 5 }}
            {{- if and .Values.pix.readinessProbe (hasKey (.Values.pix.readinessProbe | default dict) "timeoutSeconds") }}
            timeoutSeconds: {{ .Values.pix.readinessProbe.timeoutSeconds }}
            {{- end }}
            {{- if and .Values.pix.readinessProbe (hasKey (.Values.pix.readinessProbe | default dict) "successThreshold") }}
            successThreshold: {{ .Values.pix.readinessProbe.successThreshold }}
            {{- end }}
            {{- if and .Values.pix.readinessProbe (hasKey (.Values.pix.readinessProbe | default dict) "failureThreshold") }}
            failureThreshold: {{ .Values.pix.readinessProbe.failureThreshold }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.pix.livenessProbe.path | default "/health" }}
              port: {{ .Values.pix.service.port }}
            initialDelaySeconds: {{ .Values.pix.livenessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.pix.livenessProbe.periodSeconds | default 5 }}
            {{- if and .Values.pix.livenessProbe (hasKey (.Values.pix.livenessProbe | default dict) "timeoutSeconds") }}
            timeoutSeconds: {{ .Values.pix.livenessProbe.timeoutSeconds }}
            {{- end }}
            {{- if and .Values.pix.livenessProbe (hasKey (.Values.pix.livenessProbe | default dict) "successThreshold") }}
            successThreshold: {{ .Values.pix.livenessProbe.successThreshold }}
            {{- end }}
            {{- if and .Values.pix.livenessProbe (hasKey (.Values.pix.livenessProbe | default dict) "failureThreshold") }}
            failureThreshold: {{ .Values.pix.livenessProbe.failureThreshold }}
            {{- end }}
      {{- with .Values.pix.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pix.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pix.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}