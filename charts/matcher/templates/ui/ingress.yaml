{{- if and .Values.ui.enabled .Values.ui.ingress.enabled -}}
{{- $apiSvc := include "matcher.fullname" . -}}
{{- $apiPort := .Values.matcher.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "matcher-ui.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "matcher-ui.labels" . | nindent 4 }}
  {{- with .Values.ui.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ui.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ui.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required "ui.ingress.host is required when ui.ingress.enabled=true" .Values.ui.ingress.host | quote }}
      secretName: {{ .Values.ui.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ required "ui.ingress.host is required when ui.ingress.enabled=true" .Values.ui.ingress.host | quote }}
      http:
        paths:
          # SAME-ORIGIN PROXY (decision Fred 2026-06-27): the UI image hardcodes a
          # CSP with connect-src 'self', so the API MUST be served from the SAME
          # host as the UI (no cross-origin). These prefixes route to the matcher
          # API Service; "/" routes to the UI Service. nginx uses longest-prefix
          # matching, so /v1 and /system win over /.
          {{- range .Values.ui.ingress.apiPaths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $apiSvc }}
                port:
                  number: {{ $apiPort }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "matcher-ui.fullname" . }}
                port:
                  number: {{ .Values.ui.service.port }}
{{- end }}
