{{- if .Values.crm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "midaz-crm.fullname" . }}
  labels:
    {{- include "midaz-crm.labels" (dict "context" . "name" .Values.crm.name ) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.crm.revisionHistoryLimit | default 10 }}
  strategy:
    type: {{ .Values.crm.deploymentUpdate.type }}
    {{- if eq .Values.crm.deploymentUpdate.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.crm.deploymentUpdate.maxSurge }}
      maxUnavailable: {{ .Values.crm.deploymentUpdate.maxUnavailable }}
    {{- end }}
  {{- if not .Values.crm.autoscaling.enabled }}
  replicas: {{ .Values.crm.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "midaz-crm.selectorLabels" (dict "context" . "name" .Values.crm.name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "midaz-crm.labels" (dict "context" . "name" .Values.crm.name ) | nindent 8 }}
      {{- with .Values.crm.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
    {{- with .Values.crm.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      {{- with .Values.crm.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "midaz-crm.fullname" . }}
          image: {{ .Values.crm.image.repository }}:{{ .Values.crm.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.crm.image.pullPolicy }}
          {{- with .Values.crm.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.crm.service.port }}
              protocol: TCP
          envFrom:
          {{- if not .Values.crm.useExistingSecret }}
          - secretRef:
              name: {{ include "midaz-crm.fullname" . }}
          {{- else }}
          - secretRef:
              name: {{ .Values.crm.existingSecretName }}
          {{- end }}
          - configMapRef:
              name: {{ include "midaz-crm.fullname" . }}
          env:
            {{- $secretName := ternary .Values.crm.existingSecretName (include "midaz-crm.fullname" .) .Values.crm.useExistingSecret }}
            {{/* MongoDB: CRM authenticates as root; MONGO_PASSWORD maps to `mongodb-root-password`. */}}
            {{- include "midaz.mongodbAuthRequired" . }}
            {{- $mongo := .Values.mongodb | default dict }}
            {{- $mongoAuth := $mongo.auth | default dict }}
            {{- if or (and (ne (toString $mongo.enabled) "false") (not $mongo.external)) $mongoAuth.existingSecret }}
            {{- include "midaz.infraSecretRef" (dict "context" $ "subchart" "mongodb" "key" "mongodb-root-password" "envName" "MONGO_PASSWORD") | nindent 12 }}
            {{- else if .Values.crm.secrets.MONGO_PASSWORD }}
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MONGO_PASSWORD
            {{- end }}
            {{- $otel := index .Values "otel-collector-lerian" }}
            {{- if $otel.enabled }}
            - name: "POD_IP"
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: "HOST_IP"
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
              value: "$(HOST_IP):4317"
            - name: "OTEL_RESOURCE_ATTRIBUTES"
              value: "k8s.pod.ip=$(POD_IP)"
            {{- end }}
          resources:
            {{- toYaml .Values.crm.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.crm.readinessProbe.path | default "/readyz" }}
              port: {{ .Values.crm.service.port }}
            initialDelaySeconds: {{ .Values.crm.readinessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.crm.readinessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.crm.readinessProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.crm.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.crm.readinessProbe.failureThreshold | default 3 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.crm.livenessProbe.path | default "/health" }}
              port: {{ .Values.crm.service.port }}
            initialDelaySeconds: {{ .Values.crm.livenessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.crm.livenessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.crm.livenessProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.crm.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.crm.livenessProbe.failureThreshold | default 3 }}
      {{- with .Values.crm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.crm.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.crm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
