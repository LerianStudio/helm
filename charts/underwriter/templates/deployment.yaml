{{- if .Values.underwriter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "underwriter.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "underwriter.labels" (dict "context" . "component" .Values.underwriter.name "name" .Values.underwriter.name) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.underwriter.revisionHistoryLimit | default 10 }}
  strategy:
    type: {{ .Values.underwriter.deploymentUpdate.type }}
    {{- if eq .Values.underwriter.deploymentUpdate.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.underwriter.deploymentUpdate.maxSurge }}
      maxUnavailable: {{ .Values.underwriter.deploymentUpdate.maxUnavailable }}
    {{- end }}
  {{- if not .Values.underwriter.autoscaling.enabled }}
  replicas: {{ .Values.underwriter.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "underwriter.selectorLabels" (dict "context" . "name" .Values.underwriter.name) | nindent 6 }}
  template:
    metadata:
      {{- with .Values.underwriter.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "underwriter.labels" (dict "context" . "component" .Values.underwriter.name "name" .Values.underwriter.name) | nindent 8 }}
    spec:
      {{- with .Values.underwriter.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "underwriter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.underwriter.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "underwriter.fullname" . }}
          securityContext:
            {{- toYaml .Values.underwriter.securityContext | nindent 12 }}
          image: "{{ .Values.underwriter.image.repository }}:{{ .Values.underwriter.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.underwriter.image.pullPolicy }}
          envFrom:
          - secretRef:
              name: {{ if .Values.underwriter.useExistingSecret }}{{ .Values.underwriter.existingSecretName }}{{ else }}{{ include "underwriter.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "underwriter.fullname" . }}
          env:
            {{- $pg := .Values.postgresql | default dict }}
            {{- $pgAuth := $pg.auth | default dict }}
            {{- if or (and (ne (toString $pg.enabled) "false") (not $pg.external)) $pgAuth.existingSecret }}
            {{- include "underwriter.infraSecretRef" (dict "context" $ "subchart" "postgresql" "key" "password" "envName" "POSTGRES_PASSWORD") | nindent 12 }}
            {{- include "underwriter.infraSecretRef" (dict "context" $ "subchart" "postgresql" "key" "replication-password" "envName" "POSTGRES_REPLICA_PASSWORD") | nindent 12 }}
            {{- else }}
            {{- if .Values.underwriter.secrets.POSTGRES_PASSWORD }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.underwriter.useExistingSecret }}{{ .Values.underwriter.existingSecretName }}{{ else }}{{ include "underwriter.fullname" . }}{{ end }}
                  key: POSTGRES_PASSWORD
            {{- end }}
            {{- if .Values.underwriter.secrets.POSTGRES_REPLICA_PASSWORD }}
            - name: POSTGRES_REPLICA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.underwriter.useExistingSecret }}{{ .Values.underwriter.existingSecretName }}{{ else }}{{ include "underwriter.fullname" . }}{{ end }}
                  key: POSTGRES_REPLICA_PASSWORD
            {{- end }}
            {{- end }}
            {{- $vk := .Values.valkey | default dict }}
            {{- $vkAuth := $vk.auth | default dict }}
            {{- if or (and (ne (toString $vk.enabled) "false") (not $vk.external) $vkAuth.enabled) $vkAuth.existingSecret }}
            {{- include "underwriter.infraSecretRef" (dict "context" $ "subchart" "valkey" "key" "valkey-password" "envName" "REDIS_PASSWORD") | nindent 12 }}
            {{- else if .Values.underwriter.secrets.REDIS_PASSWORD }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.underwriter.useExistingSecret }}{{ .Values.underwriter.existingSecretName }}{{ else }}{{ include "underwriter.fullname" . }}{{ end }}
                  key: REDIS_PASSWORD
            {{- end }}
            {{- if eq (toString .Values.underwriter.configmap.ENABLE_TELEMETRY) "true" }}
            - name: "HOST_IP"
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
              value: "$(HOST_IP):4317"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.underwriter.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.underwriter.livenessProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.underwriter.livenessProbe.initialDelaySeconds | default 15 }}
            periodSeconds: {{ .Values.underwriter.livenessProbe.periodSeconds | default 20 }}
            timeoutSeconds: {{ .Values.underwriter.livenessProbe.timeoutSeconds | default 5 }}
            successThreshold: {{ .Values.underwriter.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.underwriter.livenessProbe.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.underwriter.readinessProbe.path | default "/readyz" }}
              port: http
            initialDelaySeconds: {{ .Values.underwriter.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.underwriter.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.underwriter.readinessProbe.timeoutSeconds | default 5 }}
            successThreshold: {{ .Values.underwriter.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.underwriter.readinessProbe.failureThreshold | default 3 }}
          resources:
            {{- toYaml .Values.underwriter.resources | nindent 12 }}
      {{- with .Values.underwriter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.underwriter.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.underwriter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
