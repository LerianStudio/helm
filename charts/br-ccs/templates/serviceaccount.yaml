{{- if and .Values.brCcs.enabled .Values.brCcs.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "br-ccs.serviceAccountName" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "br-ccs.labels" (dict "context" . "component" .Values.brCcs.name "name" .Values.brCcs.name ) | nindent 4 }}
  {{- with .Values.brCcs.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
