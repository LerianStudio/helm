{{- $brCcs := .Values.brCcs | default dict }}
{{- $migrations := get $brCcs "migrations" | default dict }}
{{- $postgresql := .Values.postgresql | default dict }}
{{- $migrationsEnabled := and (eq (lower (toString (get $brCcs "enabled" | default false))) "true") (eq (lower (toString (get $migrations "enabled" | default false))) "true") }}
{{- $internalPg := and (eq (lower (toString (get $postgresql "enabled" | default false))) "true") (not (eq (lower (toString (get $postgresql "external" | default false))) "true")) }}
{{- $migUseExisting := eq (lower (toString (get $migrations "useExistingSecret" | default false))) "true" }}
{{- $appUseExisting := eq (lower (toString (get $brCcs "useExistingSecret" | default false))) "true" }}
{{- /* Minimal, migration-only Secret. Rendered ONLY for: migrations enabled, chart-managed
     credential (no existing Secret), EXTERNAL Postgres. In that case the migration runs as a
     pre-install/pre-upgrade hook BEFORE the normal application Secret exists, so it needs its
     own credential available early. It carries ONLY POSTGRES_PASSWORD — the full application
     Secret stays a normal (non-hook) resource so sensitive runtime keys are never orphaned. */}}
{{- if and $migrationsEnabled (not $internalPg) (not $migUseExisting) (not $appUseExisting) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-migrations" (include "br-ccs.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "br-ccs.labels" (dict "context" . "component" "migrations" "name" (get $brCcs "name")) | nindent 4 }}
  annotations:
    # Pre-install/pre-upgrade hook (weight -5) so it exists before the migration Job
    # (weight -1). Holds ONLY POSTGRES_PASSWORD.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/sync-wave": "-5"
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ include "br-ccs.migrationPostgresPassword" . | quote }}
{{- end }}
