apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plugin-fees.fullname" . }}
  labels:
    {{- include "plugin-fees.labels" (dict "context" . "name" .Values.fees.name ) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.fees.revisionHistoryLimit | default 10 }}
  strategy:
    {{- toYaml .Values.fees.deploymentStrategy | nindent 4 }}
  replicas: {{ .Values.fees.replicaCount }}
  selector:
    matchLabels:
      {{- include "plugin-fees.selectorLabels" (dict "context" . "name" .Values.fees.name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plugin-fees.labels" (dict "context" . "name" .Values.fees.name ) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/fees/configmap.yaml") . | sha256sum }}
        {{- if not .Values.fees.useExistingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/fees/secrets.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.fees.imagePullSecrets }}
      {{- include "lerian-common.imagePullSecrets" . | nindent 6 }}
      {{- end }}
      {{- if .Values.fees.serviceAccount.create }}
      serviceAccountName: {{ include "plugin-fees.serviceAccountName" . }}
      {{- end }}      
      {{- include "lerian-common.rolesAnywhere.podSecurityContext" (dict "aws" .Values.aws "podSecurityContext" .Values.fees.podSecurityContext) | nindent 6 }}
      containers:
        - name: {{ include "plugin-fees.fullname" . }}
          securityContext:
            {{- toYaml .Values.fees.securityContext | nindent 12 }}
          image: "{{ .Values.fees.image.repository }}:{{ .Values.fees.image.tag | default (include "plugin.version" .) }}"
          imagePullPolicy: {{ .Values.fees.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.fees.service.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ if .Values.fees.useExistingSecret }}{{ .Values.fees.existingSecretName }}{{ else }}{{ include "plugin-fees.fullname" . }}{{ end }}
            - configMapRef:
                name: {{ include "plugin-fees.fullname" . }}
          env:
          {{- include "plugin-fees.mongoHostRequired" . }}
          {{- $mongo := .Values.mongodb | default dict }}
          {{- $mongoAuth := $mongo.auth | default dict }}
          {{- if or (and (ne (toString $mongo.enabled) "false") (not $mongo.external)) $mongoAuth.existingSecret }}
          {{- include "plugin-fees.infraSecretRef" (dict "context" $ "subchart" "mongodb" "key" "mongodb-root-password" "envName" "MONGO_PASSWORD") | nindent 10 }}
          {{- else if .Values.fees.secrets.MONGO_PASSWORD }}
          - name: MONGO_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ if .Values.fees.useExistingSecret }}{{ .Values.fees.existingSecretName }}{{ else }}{{ include "plugin-fees.fullname" . }}{{ end }}
                key: MONGO_PASSWORD
          {{- end }}
          {{- if (index .Values "otel-collector-lerian").enabled }}
          {{- include "lerian-common.otel.podEnv" (dict "port" 4317) | nindent 10 }}
          {{- end }}
          {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
          {{- include "lerian-common.rolesAnywhere.imdsEnv" (dict "aws" .Values.aws) | nindent 10 }}
          {{- end }}
          resources:
            {{- toYaml .Values.fees.resources | nindent 12 }}
          {{- include "lerian-common.httpProbe" (dict
                "kind" "readinessProbe" "probe" .Values.fees.readinessProbe
                "port" .Values.fees.service.port
                "path" "/readyz" "initialDelay" 10 "period" 5 "timeout" 1 "success" 1 "failure" 3
              ) | nindent 10 }}
          {{- include "lerian-common.httpProbe" (dict
                "kind" "livenessProbe" "probe" .Values.fees.livenessProbe
                "port" .Values.fees.service.port
                "path" "/health" "initialDelay" 5 "period" 5 "timeout" 1 "success" 1 "failure" 3
              ) | nindent 10 }}
        {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
        {{- include "lerian-common.rolesAnywhere.sidecar" (dict "aws" .Values.aws) | nindent 8 }}
        {{- end }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      {{- include "lerian-common.rolesAnywhere.volume" (dict "aws" .Values.aws "iamTlsDefault" "plugin-fees-iam-tls") | nindent 6 }}
      {{- end }}
      {{- if or .Values.fees.nodeSelector .Values.fees.affinity .Values.fees.tolerations }}
      {{- include "lerian-common.scheduling" .Values.fees | nindent 6 }}
      {{- end }}
