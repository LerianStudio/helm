{{- $component := index .Values "bc-correios" -}}
{{- if $component.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bc-correios.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "bc-correios.labels" (dict "context" . "component" $component.name "name" $component.name) | nindent 4 }}
  {{- with $component.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $component.service.type }}
  ports:
    - port: {{ $component.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bc-correios.selectorLabels" (dict "context" . "name" $component.name) | nindent 4 }}
{{- end }}
