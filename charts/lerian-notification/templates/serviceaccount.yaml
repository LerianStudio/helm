{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lerian-notification.serviceAccountName" . }}
  namespace: {{ include "lerian-notification.namespace" . }}
  labels:
    {{- include "lerian-notification.labels" (dict "context" . "name" (include "lerian-notification.fullname" .)) | nindent 4 }}
  annotations:
    {{- /*
      Created as a pre-install / pre-upgrade hook so the migrations Job
      (hook-weight -5) can use this ServiceAccount. before-hook-creation
      keeps it tracked by the release for uninstall.
    */}}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
