apiVersion: v2
name: plugin-bc-correios-helm
description: Helm chart for BC Correios Plugin — Brazilian Central Bank mail
  system integration
type: application
home: https://github.com/LerianStudio/helm
sources:
  - https://github.com/LerianStudio/helm/tree/main/charts/plugin-bc-correios
  - https://github.com/LerianStudio/plugin-bc-correios
maintainers:
  - name: "Lerian Studio"
    email: "support@lerian.studio"

version: 1.0.0

appVersion: "1.0.0"
keywords:
  - bc-correios
  - correios
  - bcb
  - bacen
  - lerian
  - ledger
  - payments
  - brazil
icon: https://avatars.githubusercontent.com/u/148895005?s=200&v=4
dependencies:
  - name: postgresql
    version: "16.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: valkey
    version: "2.4.7"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: valkey.enabled
  - name: rabbitmq
    version: "2.1.11"
    repository: "https://groundhog2k.github.io/helm-charts"
    condition: rabbitmq.enabled
