{{- $bankTransfer := .Values.bankTransfer | default dict }}
{{- $migrations := get $bankTransfer "migrations" | default dict }}
{{- $configmap := get $bankTransfer "configmap" | default dict }}
{{- $postgresql := .Values.postgresql | default dict }}
{{- $migrationImage := get $migrations "image" | default dict }}
{{- $defaultMigrationResources := dict "requests" (dict "cpu" "50m" "memory" "64Mi") "limits" (dict "cpu" "250m" "memory" "256Mi") }}
{{- $migrationsEnabled := and (eq (lower (toString (get $bankTransfer "enabled" | default false))) "true") (eq (lower (toString (get $migrations "enabled" | default false))) "true") }}
{{- if $migrationsEnabled }}
{{- if eq (lower (toString (get $configmap "MULTI_TENANT_ENABLED" | default "false"))) "true" }}
{{- fail "bankTransfer.migrations.enabled cannot be true when bankTransfer.configmap.MULTI_TENANT_ENABLED=true; tenant-manager owns tenant database migrations" }}
{{- end }}
{{- /* Internal (chart-managed) Postgres support. When postgresql.enabled=true and not
     external, the database is provisioned during the Sync phase (bitnami StatefulSet), so
     the migration must run as a POST hook (after the DB exists) with a wait-for-Postgres
     initContainer. External/pre-existing Postgres keeps the PRE hook (DB already exists).
     Internal mode reuses the same chart-managed Secret as the app, so its POSTGRES_PASSWORD
     must equal postgresql.auth.password (the app already requires this). */}}
{{- $internalPg := and (eq (lower (toString (get $postgresql "enabled" | default false))) "true") (not (eq (lower (toString (get $postgresql "external" | default false))) "true")) }}
{{- /* Secret resolution — POSTGRES_PASSWORD source. The full application Secret
     (secrets.yaml) is a NORMAL resource (not a hook), so it is pruned correctly on
     uninstall and never lingers. Preference order:
       1. migration-specific existing Secret (bankTransfer.migrations.existingSecretName)
       2. app-level existing Secret          (bankTransfer.existingSecretName)
       3. chart-managed:
          - internal Postgres → migration is a POST hook, so the normal app Secret
            already exists; reference it directly (no extra hook Secret).
          - external Postgres → migration is a PRE hook that runs before the normal app
            Secret, so use a minimal migration-only hook Secret (migration-secret.yaml)
            that carries ONLY POSTGRES_PASSWORD. */}}
{{- $appUseExisting := eq (lower (toString (get $bankTransfer "useExistingSecret" | default false))) "true" }}
{{- $migUseExisting := eq (lower (toString (get $migrations "useExistingSecret" | default false))) "true" }}
{{- $existingSecretName := "" }}
{{- if $migUseExisting }}
{{- $existingSecretName = required "bankTransfer.migrations.existingSecretName is required when bankTransfer.migrations.useExistingSecret=true" (get $migrations "existingSecretName") }}
{{- else if $appUseExisting }}
{{- $existingSecretName = required "bankTransfer.existingSecretName is required when bankTransfer.useExistingSecret=true" (get $bankTransfer "existingSecretName") }}
{{- else if $internalPg }}
{{- $existingSecretName = include "bank-transfer.fullname" . }}
{{- else }}
{{- $existingSecretName = printf "%s-migrations" (include "bank-transfer.fullname" .) | trunc 63 | trimSuffix "-" }}
{{- end }}
{{- $namespace := include "global.namespace" . }}
{{- $migrationTag := "" }}
{{- $migrationDigest := "" }}
{{- if kindIs "string" $migrationImage }}
{{- if not (regexMatch "(@sha256:[A-Fa-f0-9]{64}|:[^/:@]+)$" $migrationImage) }}
{{- fail "bankTransfer.migrations.image string must include an explicit tag or sha256 digest when bankTransfer.migrations.enabled=true" }}
{{- end }}
{{- else }}
{{- $migrationTag = get $migrationImage "tag" | default "" }}
{{- $migrationDigest = get $migrationImage "digest" | default "" }}
{{- /* The migration image tag is coupled to the app image tag. When neither an explicit
     tag nor digest is set, fall back to the app tag (bankTransfer.image.tag, or the chart
     appVersion). An explicit migration tag/digest still overrides this. */}}
{{- if and (empty $migrationTag) (empty $migrationDigest) }}
{{- $migrationTag = .Values.bankTransfer.image.tag | default .Chart.AppVersion }}
{{- end }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrations" (include "bank-transfer.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ $namespace }}
  labels:
    {{- include "bank-transfer.labels" (dict "context" . "component" "migrations" "name" (get $bankTransfer "name") ) | nindent 4 }}
  annotations:
    {{- if $internalPg }}
    # Internal Postgres is provisioned during Sync — run AFTER it exists and is reachable.
    "helm.sh/hook": post-install,post-upgrade
    "argocd.argoproj.io/hook": PostSync
    {{- else }}
    # External Postgres already exists — run BEFORE the app rolls out (schema-first).
    "helm.sh/hook": pre-install,pre-upgrade
    "argocd.argoproj.io/hook": PreSync
    {{- end }}
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,HookSucceeded
    {{- with (get $migrations "annotations") }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ get $migrations "backoffLimit" | default 3 }}
  activeDeadlineSeconds: {{ get $migrations "activeDeadlineSeconds" | default 600 }}
  ttlSecondsAfterFinished: {{ get $migrations "ttlSecondsAfterFinished" | default 600 }}
  template:
    metadata:
      labels:
        {{- include "bank-transfer.labels" (dict "context" . "component" "migrations" "name" (get $bankTransfer "name") ) | nindent 8 }}
      {{- with (get $migrations "podAnnotations") }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with (get $bankTransfer "imagePullSecrets") }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (get $migrations "serviceAccountName") }}
      serviceAccountName: {{ . | quote }}
      {{- end }}
      {{- if $internalPg }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - >
              echo "Waiting for $POSTGRES_HOST:$POSTGRES_PORT...";
              ELAPSED=0;
              while ! nc -z "$POSTGRES_HOST" "$POSTGRES_PORT"; do
                if [ $ELAPSED -ge 300 ]; then echo "Timeout after 300s"; exit 1; fi;
                echo "not ready, waiting (${ELAPSED}s/300s)"; sleep 5; ELAPSED=$((ELAPSED + 5));
              done;
              echo "Postgres is ready";
          env:
            - name: POSTGRES_HOST
              value: {{ get $configmap "POSTGRES_HOST" | default (printf "%s-postgresql-primary.%s.svc.cluster.local" .Release.Name $namespace) | quote }}
            - name: POSTGRES_PORT
              value: {{ get $configmap "POSTGRES_PORT" | default "5432" | quote }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      {{- end }}
      containers:
        - name: migrations
          {{- if kindIs "string" $migrationImage }}
          image: {{ $migrationImage | quote }}
          imagePullPolicy: Always
          {{- else }}
          {{- $migrationRepository := get $migrationImage "repository" | default "ghcr.io/lerianstudio/plugin-br-bank-transfer-migrations" }}
          {{- if $migrationDigest }}
          image: "{{ $migrationRepository }}@{{ $migrationDigest }}"
          {{- else }}
          image: "{{ $migrationRepository }}:{{ $migrationTag }}"
          {{- end }}
          imagePullPolicy: {{ get $migrationImage "pullPolicy" | default "IfNotPresent" }}
          {{- end }}
          env:
            - name: MIGRATIONS_PATH
              value: {{ get $migrations "path" | default "/migrations" | quote }}
            # The migrations runner refuses sslmode=disable unless this is set;
            # mirror the app-level toggle so non-TLS Postgres targets work.
            - name: ALLOW_INSECURE_TLS
              value: {{ get $configmap "ALLOW_INSECURE_TLS" | default "true" | quote }}
            - name: POSTGRES_HOST
              value: {{ get $configmap "POSTGRES_HOST" | default (printf "%s-postgresql-primary.%s.svc.cluster.local" .Release.Name $namespace) | quote }}
            - name: POSTGRES_PORT
              value: {{ get $configmap "POSTGRES_PORT" | default "5432" | quote }}
            - name: POSTGRES_USER
              value: {{ get $configmap "POSTGRES_USER" | default "bank_transfer" | quote }}
            - name: POSTGRES_DB
              value: {{ get $configmap "POSTGRES_DB" | default "bank_transfer" | quote }}
            - name: POSTGRES_SSLMODE
              value: {{ get $configmap "POSTGRES_SSLMODE" | default "require" | quote }}
            - name: POSTGRES_CONNECT_TIMEOUT_SEC
              value: {{ get $configmap "POSTGRES_CONNECT_TIMEOUT_SEC" | default "10" | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $existingSecretName }}
                  key: POSTGRES_PASSWORD
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml (get $migrations "resources" | default $defaultMigrationResources) | nindent 12 }}
      {{- with (get $bankTransfer "nodeSelector") }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (get $bankTransfer "affinity") }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (get $bankTransfer "tolerations") }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
