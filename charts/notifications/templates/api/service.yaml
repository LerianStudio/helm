apiVersion: v1
kind: Service
metadata:
  name: {{ include "notifications.fullname" . }}
  namespace: {{ include "notifications.namespace" . }}
  labels:
    {{- include "notifications.labels" (dict "context" . "name" .Values.api.name) | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "notifications.selectorLabels" (dict "context" . "name" .Values.api.name) | nindent 4 }}
