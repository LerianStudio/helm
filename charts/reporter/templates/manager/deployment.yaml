apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plugin-manager.fullname" . }}
  labels:
    {{- include "plugin-manager.labels" (dict "context" . "name" .Values.manager.name ) | nindent 4 }}
  {{- with .Values.manager.annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }} 
spec:
  revisionHistoryLimit: {{ .Values.manager.revisionHistoryLimit | default 10 }}
  strategy:
    {{- toYaml .Values.manager.deploymentStrategy | nindent 4 }}
  replicas: {{ .Values.manager.replicaCount }}
  selector:
    matchLabels:
      {{- include "plugin-manager.selectorLabels" (dict "context" . "name" .Values.manager.name) | nindent 6 }}
  template:
    metadata:
      labels:
       {{- include "plugin-manager.labels" (dict "context" . "name" .Values.manager.name ) | nindent 8 }}
      {{- with .Values.manager.podAnnotations }}
      annotations:
        {{- range $key, $value := . }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }} 
    spec:
      {{- with .Values.manager.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}    
      {{- end }}
      serviceAccountName: {{ include "plugin-manager.fullname" . }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      securityContext:
        fsGroup: 65532
      {{- end }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox
          envFrom:
          - configMapRef:
              name: {{ include "plugin-manager.fullname" . }}
          command:
            - /bin/sh
            - -c
            - >
              for svc in "$RABBITMQ_HOST:$RABBITMQ_PORT_HOST" "$MONGO_HOST:$MONGO_PORT";
              do
                echo "Checking $svc...";
                while ! nc -z $(echo $svc | cut -d: -f1) $(echo $svc | cut -d: -f2); do
                  echo "$svc is not ready yet, waiting...";
                  sleep 5;
                done;
                echo "$svc is ready!";
              done; 
      containers:
        - name: {{ include "plugin-manager.fullname" . }}
          image: {{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag | default (include "plugin.version" .) }}
          imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.manager.service.port }}
              protocol: TCP
          envFrom:
          - secretRef:
              name: {{ if .Values.manager.useExistingSecret }}{{ .Values.manager.existingSecretName }}{{ else }}{{ include "plugin-manager.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "plugin-manager.fullname" . }}
          {{- if or (index .Values "otel-collector-lerian").enabled (and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled) }}
          env:
          {{- if (index .Values "otel-collector-lerian").enabled }}
          - name: "HOST_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "$(HOST_IP):4317"
          {{- end }}
          {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
          - name: AWS_EC2_METADATA_SERVICE_ENDPOINT
            value: "http://127.0.0.1:{{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
          - name: AWS_EC2_METADATA_SERVICE_ENDPOINT_MODE
            value: "IPv4"
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.manager.readinessProbe.path | default "/readyz" }}
              port: {{ .Values.manager.service.port }}
            initialDelaySeconds: {{ .Values.manager.readinessProbe.initialDelaySeconds | default 25 }}
            periodSeconds: {{ .Values.manager.readinessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.manager.readinessProbe.timeoutSeconds | default 3 }}
            successThreshold: {{ .Values.manager.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.manager.readinessProbe.failureThreshold | default 3 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.manager.livenessProbe.path | default "/health" }}
              port: {{ .Values.manager.service.port }}
            initialDelaySeconds: {{ .Values.manager.livenessProbe.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.manager.livenessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.manager.livenessProbe.timeoutSeconds | default 3 }}
            successThreshold: {{ .Values.manager.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.manager.livenessProbe.failureThreshold | default 3 }}
        {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
        - name: aws-signing-helper
          image: "{{ .Values.aws.rolesAnywhere.sidecar.image.repository }}:{{ .Values.aws.rolesAnywhere.sidecar.image.tag }}"
          imagePullPolicy: {{ .Values.aws.rolesAnywhere.sidecar.image.pullPolicy | default "IfNotPresent" }}
          args:
            - serve
            - --certificate
            - /certs/tls.crt
            - --private-key
            - /certs/tls.key
            - --trust-anchor-arn
            - "{{ .Values.aws.rolesAnywhere.trustAnchorArn }}"
            - --profile-arn
            - "{{ .Values.aws.rolesAnywhere.profileArn }}"
            - --role-arn
            - "{{ .Values.aws.rolesAnywhere.roleArn }}"
            - --region
            - "{{ .Values.aws.rolesAnywhere.region | default "us-east-2" }}"
            - --session-duration
            - "{{ .Values.aws.rolesAnywhere.sessionDuration | default 3600 }}"
            - --port
            - "{{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
          ports:
            - name: imds
              containerPort: {{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}
              protocol: TCP
          volumeMounts:
            - name: iam-certs
              mountPath: /certs
              readOnly: true
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.aws.rolesAnywhere.sidecar.resources | nindent 12 }}
        {{- end }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      volumes:
        - name: iam-certs
          secret:
            secretName: {{ .Values.aws.rolesAnywhere.certificateSecretName | default "reporter-iam-tls" }}
            defaultMode: 0440
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
      {{- end }}
      {{- with .Values.manager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
