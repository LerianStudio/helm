{{- if not .Values.inbound.useExistingSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inbound.fullname" . }}
  labels:
    {{- include "inbound.labels" (dict "context" . "name" .Values.inbound.name ) | nindent 4 }}
type: Opaque
data:
  # -- Default sensitive variables for the plugin-br-pix-indirect-btg

  # DB Configuration
  # DB_PASSWORD / DB_REPLICA_PASSWORD single-sourced from the postgresql subchart Secret on the
  # bundled path; emitted here only when postgresql is external/disabled.
  {{- include "plugin-br-pix-indirect-btg.dbSecretData" (dict "context" . "component" "inbound") | nindent 2 }}

  # MongoDB Configuration
  # MONGO_PASSWORD single-sourced from the mongodb subchart Secret on the bundled path.
  {{- include "plugin-br-pix-indirect-btg.mongoSecretData" (dict "context" . "component" "inbound") | nindent 2 }}

  # HMAC Internal Validation
  INTERNAL_WEBHOOK_SECRET: {{ .Values.inbound.secrets.INTERNAL_WEBHOOK_SECRET | default "" | b64enc | quote }}

{{- end }}
