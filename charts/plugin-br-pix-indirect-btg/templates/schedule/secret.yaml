apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-br-pix-indirect-btg-helm.fullname" . }}-schedule
  labels:
    {{- include "plugin-br-pix-indirect-btg-helm.labels" . | nindent 4 }}
    app.kubernetes.io/component: schedule
type: Opaque
data:
  PLUGIN_PIX_BTG_CLIENT_SECRET: {{ .Values.schedule.secrets.PLUGIN_PIX_BTG_CLIENT_SECRET | default "" | b64enc | quote }}
  # Extra Secret Vars
  {{- if .Values.schedule.extraSecretVars }}
  {{- toYaml .Values.schedule.extraSecretVars | nindent 2 }}
  {{- end }}
