apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plugin-identity.fullname" . }}
  labels:
    {{- include "plugin-identity.labels" (dict "context" . "name" .Values.identity.name ) | nindent 4 }} 
data:
  # -- Default Environment variables for the plugin-identity 
  ENV_NAME: {{ .Values.identity.configmap.ENV_NAME | default "development" | quote }}

  # APP 
  APPLICATION_NAME: {{ .Values.identity.configmap.APPLICATION_NAME | default "plugin-identity" | quote }}
  SERVER_PORT: {{ .Values.identity.configmap.SERVER_PORT | default "4001" | quote }}
  SERVER_ADDRESS: {{ .Values.identity.configmap.SERVER_ADDRESS | default ":4001" | quote }} 
  VERSION: {{ .Values.identity.image.tag | quote }}

  # AUTHORIZER
  AUTHORIZER_PORT: {{ .Values.identity.configmap.AUTHORIZER_PORT | default "8000" | quote }}
  AUTHORIZER_ADDRESS: {{ .Values.identity.configmap.AUTHORIZER_ADDRESS | default "http://plugin-access-manager-auth-backend:8000" | quote }}
  AUTHORIZER_CLIENT_ID: {{ .Values.identity.configmap.AUTHORIZER_CLIENT_ID | default "ac56c81d4d6d95c0ac12" | quote }}
  AUTHORIZER_ORGANIZATION_NAME: {{ .Values.identity.configmap.AUTHORIZER_ORGANIZATION_NAME | default "lerian" | quote }}
  AUTHORIZER_APPLICATION_NAME: {{ .Values.identity.configmap.AUTHORIZER_APPLICATION_NAME | default "app-lerian" | quote }}

  # AUTH
  PLUGIN_AUTH_ENABLED: {{ .Values.identity.configmap.AUTH_ENABLED | default "true" | quote }}
  PLUGIN_AUTH_PORT: {{ .Values.identity.configmap.AUTH_PORT | default "4000" | quote }}
  PLUGIN_AUTH_ADDRESS: {{ .Values.identity.configmap.AUTH_ADDRESS | default (printf "http://plugin-access-manager-auth.%s.svc.cluster.local:4000" .Release.Namespace) | quote }}

  # SWAGGER
  SWAGGER_TITLE: {{ .Values.identity.configmap.SWAGGER_TITLE | default "Plugin Identity API" | quote }}
  SWAGGER_DESCRIPTION: {{ .Values.identity.configmap.SWAGGER_DESCRIPTION | default "The Identity API provides a set of endpoints for managing users and client credentials." | quote }}
  SWAGGER_VERSION: {{ .Values.identity.image.tag | quote }}
  SWAGGER_HOST: {{ .Values.identity.configmap.SWAGGER_HOST | default (printf "plugin-access-manager-identity.%s.svc.cluster.local:4001" .Release.Namespace) | quote }}
  SWAGGER_BASE_PATH: {{ .Values.identity.configmap.SWAGGER_BASE_PATH | default "/" | quote }}
  SWAGGER_SCHEMES: {{ .Values.identity.configmap.SWAGGER_SCHEMES | default "http" | quote }}
  SWAGGER_LEFT_DELIMITER: {{ .Values.identity.configmap.SWAGGER_LEFT_DELIMITER | default "{{" | quote }}
  SWAGGER_RIGHT_DELIMITER: {{ .Values.identity.configmap.SWAGGER_RIGHT_DELIMITER | default "}}" | quote }}

  # LOG LEVEL
  LOG_LEVEL: {{ .Values.identity.configmap.LOG_LEVEL | default "debug" | quote }}
  LOG_OBFUSCATION_DISABLED: {{ .Values.identity.configmap.LOG_OBFUSCATION_DISABLED | default "false" | quote }}
  SECURE_LOG_FIELDS: {{ .Values.identity.configmap.SECURE_LOG_FIELDS | default "password,clientSecret" | quote }}

  # OPEN TELEMETRY
  OTEL_RESOURCE_SERVICE_NAME: {{ .Values.identity.configmap.OTEL_RESOURCE_SERVICE_NAME | default "plugin-identity" | quote }}
  OTEL_LIBRARY_NAME: {{ .Values.identity.configmap.OTEL_LIBRARY_NAME | default "github.com/LerianStudio/identity" | quote }}
  OTEL_RESOURCE_SERVICE_VERSION: {{ .Values.identity.image.tag | quote }}
  OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: {{ .Values.identity.configmap.OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT | default "dev" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT_PORT: {{ .Values.identity.configmap.OTEL_EXPORTER_OTLP_ENDPOINT_PORT | default "4317" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.identity.configmap.OTEL_EXPORTER_OTLP_ENDPOINT | default "" | quote }} 
  ENABLE_TELEMETRY: {{ .Values.identity.configmap.ENABLE_TELEMETRY | default "true" | quote }}
  # REDIS
  REDIS_HOST: {{ printf "%s:%s" (.Values.identity.configmap.REDIS_HOST | default (printf "plugin-access-manager-valkey-primary.%s.svc.cluster.local" .Release.Namespace)) (.Values.identity.configmap.REDIS_PORT | default "6379" | toString) | quote }}
  REDIS_PORT: {{ .Values.identity.configmap.REDIS_PORT | default "6379" | quote }}
  REDIS_USER: {{ .Values.identity.configmap.REDIS_USER | default "identity" | quote }}
  REDIS_SCAN_COUNT: {{ .Values.identity.configmap.REDIS_SCAN_COUNT | default "500" | quote }}
  REDIS_MASTER_NAME: {{ .Values.identity.configmap.REDIS_MASTER_NAME | default "" | quote }}
  REDIS_TLS: {{ .Values.identity.configmap.REDIS_TLS | default "false" | quote }}
  REDIS_CA_CERT: {{ .Values.identity.configmap.REDIS_CA_CERT | default "" | quote }}
  REDIS_USE_GCP_IAM: {{ .Values.identity.configmap.REDIS_USE_GCP_IAM | default "false" | quote }}
  REDIS_SERVICE_ACCOUNT: {{ .Values.identity.configmap.REDIS_SERVICE_ACCOUNT | default "" | quote }}
  GOOGLE_APPLICATION_CREDENTIALS: {{ .Values.identity.configmap.GOOGLE_APPLICATION_CREDENTIALS | default "" | quote }}
  REDIS_TOKEN_LIFETIME: {{ .Values.identity.configmap.REDIS_TOKEN_LIFETIME | default "60" | quote }}
  REDIS_TOKEN_REFRESH_DURATION: {{ .Values.identity.configmap.REDIS_TOKEN_REFRESH_DURATION | default "45" | quote }}
  REDIS_DB: {{ .Values.identity.configmap.REDIS_DB | default "0" | quote }}
  REDIS_PROTOCOL: {{ .Values.identity.configmap.REDIS_PROTOCOL | default "3" | quote }}

  # CORS
  ACCESS_CONTROL_ALLOW_ORIGIN: {{ .Values.identity.configmap.ACCESS_CONTROL_ALLOW_ORIGIN | default "" | quote }}
  ACCESS_CONTROL_ALLOW_METHODS: {{ .Values.identity.configmap.ACCESS_CONTROL_ALLOW_METHODS | default "POST, GET, OPTIONS, PUT, DELETE, PATCH" | quote }}
  ACCESS_CONTROL_ALLOW_HEADERS: {{ .Values.identity.configmap.ACCESS_CONTROL_ALLOW_HEADERS | default "Accept, Content-Type, Content-Length, Accept-Encoding, X-CSRF-Token, Authorization" | quote }}
  ACCESS_CONTROL_EXPOSE_HEADERS: {{ .Values.identity.configmap.ACCESS_CONTROL_EXPOSE_HEADERS | default "" | quote }}
  ACCESS_CONTROL_ALLOW_CREDENTIALS: {{ .Values.identity.configmap.ACCESS_CONTROL_ALLOW_CREDENTIALS | default "false" | quote }}

  #RATE LIMIT
  RATE_LIMIT_ENABLED: {{ .Values.identity.configmap.RATE_LIMIT_ENABLED | default "true" | quote }}
  RATE_LIMIT_MAX: {{ .Values.identity.configmap.RATE_LIMIT_MAX | default "100" | quote }}
  RATE_LIMIT_WINDOW_SEC: {{ .Values.identity.configmap.RATE_LIMIT_WINDOW_SEC | default "60" | quote }}
  RATE_LIMIT_REDIS_TIMEOUT_MS: {{ .Values.identity.configmap.RATE_LIMIT_REDIS_TIMEOUT_MS | default "500" | quote }}

  # MULTI-TENANCY
  MULTI_TENANT_ENABLED: {{ .Values.identity.configmap.MULTI_TENANT_ENABLED | default "false" | quote }}

  # CIRCUIT BREAKER
  CIRCUIT_BREAKER_ENABLED: {{ .Values.identity.configmap.CIRCUIT_BREAKER_ENABLED | default "true" | quote }}
  CIRCUIT_BREAKER_HEALTH_CHECK_INTERVAL_SEC: {{ .Values.identity.configmap.CIRCUIT_BREAKER_HEALTH_CHECK_INTERVAL_SEC | default "30" | quote }}
  CIRCUIT_BREAKER_HEALTH_CHECK_TIMEOUT_SEC: {{ .Values.identity.configmap.CIRCUIT_BREAKER_HEALTH_CHECK_TIMEOUT_SEC | default "10" | quote }}
  CIRCUIT_BREAKER_MAX_REQUESTS_HALF_OPEN: {{ .Values.identity.configmap.CIRCUIT_BREAKER_MAX_REQUESTS_HALF_OPEN | default "3" | quote }}
  CIRCUIT_BREAKER_INTERVAL_SEC: {{ .Values.identity.configmap.CIRCUIT_BREAKER_INTERVAL_SEC | default "60" | quote }}
  CIRCUIT_BREAKER_TIMEOUT_SEC: {{ .Values.identity.configmap.CIRCUIT_BREAKER_TIMEOUT_SEC | default "30" | quote }}
  CIRCUIT_BREAKER_CONSECUTIVE_FAILURES: {{ .Values.identity.configmap.CIRCUIT_BREAKER_CONSECUTIVE_FAILURES | default "5" | quote }}
  CIRCUIT_BREAKER_FAILURE_RATIO: {{ .Values.identity.configmap.CIRCUIT_BREAKER_FAILURE_RATIO | default "0.5" | quote }}
  CIRCUIT_BREAKER_MIN_REQUESTS_FOR_RATIO: {{ .Values.identity.configmap.CIRCUIT_BREAKER_MIN_REQUESTS_FOR_RATIO | default "10" | quote }}

  # HTTP CLIENT
  HTTP_CLIENT_TIMEOUT_SEC: {{ .Values.identity.configmap.HTTP_CLIENT_TIMEOUT_SEC | default "30" | quote }}
  HTTP_CLIENT_MAX_IDLE_CONNS: {{ .Values.identity.configmap.HTTP_CLIENT_MAX_IDLE_CONNS | default "100" | quote }}
  HTTP_CLIENT_MAX_IDLE_CONNS_PER_HOST: {{ .Values.identity.configmap.HTTP_CLIENT_MAX_IDLE_CONNS_PER_HOST | default "100" | quote }}
  HTTP_CLIENT_IDLE_CONN_TIMEOUT_SEC: {{ .Values.identity.configmap.HTTP_CLIENT_IDLE_CONN_TIMEOUT_SEC | default "90" | quote }}

  # Extra Env Vars
  {{- with .Values.identity.extraEnvVars }}
  {{- toYaml . | nindent 2 }}
  {{- end }}