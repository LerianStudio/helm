apiVersion: v2
name: plugin-br-bank-transfer
description: A Helm chart for the Brazilian Bank Transfer (TED) Plugin
type: application
home: https://github.com/LerianStudio/midaz-helm
sources:
  - https://github.com/LerianStudio/midaz-helm/tree/main/charts/plugin-br-bank-transfer
  - https://github.com/LerianStudio/plugin-br-bank-transfer
maintainers:
  - name: "Lerian Studio"
    email: "support@lerian.studio"
version: 1.0.0-beta.1
appVersion: "1.0.0"
keywords:
  - bank-transfer
  - ted
  - spb
  - bacen
  - lerian
  - ledger
  - payments
  - brazil
icon: https://avatars.githubusercontent.com/u/148895005?s=200&v=4
dependencies:
  - name: valkey
    version: "2.4.7"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: valkey.enabled
  - name: postgresql
    version: "16.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: mongodb
    version: "16.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled
  - name: rabbitmq
    version: "2.1.11"
    repository: "https://groundhog2k.github.io/helm-charts"
    condition: rabbitmq.enabled
