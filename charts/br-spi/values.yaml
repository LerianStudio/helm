# =============================================================================
# Detached migrations — ArgoCD PreSync Secret + Job that applies the 7-module
# schema to the single `brspi` database before the app boots. The
# br-sfn-spi-migrations image's entrypoint runs the full golang-migrate loop with
# the per-module x-migrations-table naming; the chart only supplies the DB
# connection and runs it.
# =============================================================================
migrations:
  enabled: true
  image:
    repository: ghcr.io/lerianstudio/br-sfn-spi-migrations
    tag: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  waitImage: busybox
  # -- Use an operator-provided Secret (must carry POSTGRES_PASSWORD) instead of
  # the chart-managed PreSync Secret.
  useExistingSecret: false
  existingSecretName: ""
  # -- Postgres connection for the migration Job. Empty fields fall back to
  # core.configmap.POSTGRES_* (all four binaries share the brspi database).
  postgres:
    host: ""
    port: ""
    user: ""
    database: ""
    sslMode: ""
    # -- Password for the PreSync Secret (empty -> core.secrets.POSTGRES_PASSWORD).
    # Ignored when migrations.useExistingSecret=true.
    password: ""
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# =============================================================================
# Bundled infra subcharts — DISABLED by default. On the target environments
# Postgres and Redis are external and pre-provisioned; wire hosts via
# <component>.configmap.POSTGRES_HOST / REDIS_HOST. Enable these only for a
# self-contained install (then passwords are single-sourced from their Secrets).
# =============================================================================
postgresql:
  enabled: false
  external: true

valkey:
  enabled: false
  external: true
