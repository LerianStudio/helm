# Configuration rebuilt based on user request:
# - Mode: daemonset (for kubeletstats)
# - Receivers: OTLP, k8scluster, kubeletstats
# - Processors: k8sattributes, transform/uuid, resource/client_id
# - Exporters: OTLP/HTTP

opentelemetry-collector:
  mode: daemonset # Changed from deployment to daemonset for kubeletstats

  # hostNetwork enables the FALLBACK pod identity path of the k8sattributes
  # processor (`pod_association: from connection` — see line ~322). The PRIMARY
  # path uses the `k8s.pod.ip` resource attribute that applications emit via
  # `OTEL_RESOURCE_ATTRIBUTES=k8s.pod.ip=$(POD_IP)`, and that works regardless
  # of hostNetwork. The connection-based fallback is what services that don't
  # yet emit `k8s.pod.ip` rely on; without hostNetwork, hostPort hairpin NAT
  # would rewrite the source IP to the node IP and the fallback would fail.
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

  # With hostNetwork: true the container binds directly to the node's network stack,
  # so hostPort is redundant. Setting hostPort: 0 removes the mapping.
  ports:
    otlp:
      hostPort: 0
    otlp-http:
      hostPort: 0

  # Contrib image is needed for k8scluster, k8sattributes, transform, and loki exporter.
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: 0.142.0

  # RBAC is required for k8sattributes, k8scluster, and kubeletstats receivers.
  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources:
          - "events"
          - "namespaces"
          - "nodes"
          - "pods"
          - "replicationcontrollers"
          - "services"
          - "resourcequotas"
        verbs: ["get", "list", "watch"]
      - apiGroups: ["apps"]
        resources:
          - "daemonsets"
          - "deployments"
          - "replicasets"
          - "statefulsets"
        verbs: ["get", "list", "watch"]
      - apiGroups: ["batch"]
        resources:
          - "jobs"
          - "cronjobs"
        verbs: ["get", "list", "watch"]
      - apiGroups: ["autoscaling"]
        resources:
          - "horizontalpodautoscalers"
        verbs: ["get", "list", "watch"]
      # Added for kubeletstats receiver
      - apiGroups: [""]
        resources:
          - "nodes/proxy"
          - "nodes/stats"
          - "nodes/metrics"
        verbs: ["get", "list", "watch"]

  # Basic resource limits for stability.
  resources:
    limits:
      cpu: 650m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  # The API key for authenticating with the central collector.
  # The 'extraEnvs' key is the correct way to define environment variables for the pod.
  extraEnvs:
    - name: OTEL_API_KEY
      valueFrom:
        secretKeyRef:
          name: otel-api-key
          key: api-key

    # K8S_NODE_NAME is used by the kubeletstats receiver to find the local kubelet.
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName    
    - name: GOMEMLIMIT
      value: "200MiB"
    - name: GOGC
      value: "80"
    - name: GOMAXPROCS
      value: "2"

  config:
    receivers:
      # Disable the default prometheus self-scraping receiver
      prometheus: null    
      # Receives traces, logs, and metrics from instrumented applications.
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

      # Collects cluster-level state information, like pod status.
      k8s_cluster:
        collection_interval: 60s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
        metrics:
          # Pod status metrics
          k8s.pod.status_reason:
            enabled: true
          # Container status metrics (NEW in 0.142.0)
          # Tracks container state: running, waiting, terminated
          k8s.container.status.state:
            enabled: true
          # Tracks reason for container state: CrashLoopBackOff, OOMKilled, ImagePullBackOff, etc.
          k8s.container.status.reason:
            enabled: true
          # Node condition metrics
          k8s.node.condition:
            enabled: true
          # HPA metrics
          k8s.hpa.current_replicas:
            enabled: true
          k8s.hpa.desired_replicas:
            enabled: true
          k8s.hpa.max_replicas:
            enabled: true
          k8s.hpa.min_replicas:
            enabled: true

      k8sobjects:
        objects:
          - name: events
            mode: watch
            namespaces: [midaz, midaz-plugins]

      # Collects pod/container performance metrics (CPU, memory) from the node's Kubelet.
      kubeletstats:
        collection_interval: 10s
        auth_type: "serviceAccount"
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        k8s_api_config:
          auth_type: serviceAccount
        metric_groups:
          - "pod"
          - "container"

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 20
      batch:
        timeout: 200ms
        send_batch_size: 512
        send_batch_max_size: 1024

      # This processor removes the payload attribute from spans to avoid storing sensitive data.
      transform/remove_sensitive_attributes:
        trace_statements:
          - context: span
            statements:
              - delete_key(attributes, "app.request.payload")

      # Bidirectional mirror between legacy HTTP attrs (`http.method`,
      # `http.status_code`) and OTel semconv stable (`http.request.method`,
      # `http.response.status_code`). Some services emit legacy (lib-commons v2),
      # others new (lib-observability); keeping both populated lets dashboards
      # built on either name keep working during the migration window.
      #
      # Method mirror skips when the new attr is "_OTHER" (lib-observability's
      # cardinality-protection sentinel for non-canonical verbs). Propagating
      # "_OTHER" to the legacy `http.method` would create a value legacy emitters
      # never produced (lib-commons v2 emitted the raw verb), so we keep the
      # legacy attr nil instead. The new attr retains "_OTHER" and the original
      # verb stays in `http.request.method_original`.
      #
      # Logs are not normalized here: lib-observability and lib-commons both
      # emit access log fields with underscore form (`http_method`,
      # `http_status_code`) via zap, not dotted attributes, so dashboards parse
      # them directly via `| json` and need no transform.
      transform/normalize_http_semconv:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - set(attributes["http.method"], attributes["http.request.method"]) where attributes["http.method"] == nil and attributes["http.request.method"] != nil and attributes["http.request.method"] != "_OTHER"
              - set(attributes["http.request.method"], attributes["http.method"]) where attributes["http.request.method"] == nil and attributes["http.method"] != nil
              - set(attributes["http.status_code"], attributes["http.response.status_code"]) where attributes["http.status_code"] == nil and attributes["http.response.status_code"] != nil
              - set(attributes["http.response.status_code"], attributes["http.status_code"]) where attributes["http.response.status_code"] == nil and attributes["http.status_code"] != nil

      transform/mask_body_sensitive_data_replace_1:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - replace_pattern(body, "\\\\", "")

      transform/mask_body_sensitive_data_replace_2:
        error_mode: ignore
        log_statements:
          - context: log
            conditions:
              - IsMatch(body, "\"(document|documentid|document_id|iddocument|id_document|documentnumber|document_number|numberdocument|number_document|senderdocument|sender_document|documentsender|document_sender|recipientdocument|recipient_document|documentrecipient|document_recipient|receiverdocument|receiver_document|documentreceiver|document_receiver|taxid|tax_id|nationalregistration|national_registration|national_registration_number|national_registration_id|nationalregistrationid|nationalregistrationnumber|nationalregistrationnumberid|national_registration_number_id|pix_taxid|pixtaxid|pix_tax_id|cpf|cnpj)\"")
            statements:
              - replace_pattern(body, "\"(document|documentid|document_id|iddocument|id_document|documentnumber|document_number|numberdocument|number_document|senderdocument|sender_document|documentsender|document_sender|recipientdocument|recipient_document|documentrecipient|document_recipient|receiverdocument|receiver_document|documentreceiver|document_receiver|taxid|tax_id|nationalregistration|national_registration|national_registration_number|national_registration_id|nationalregistrationid|nationalregistrationnumber|nationalregistrationnumberid|national_registration_number_id|pix_taxid|pixtaxid|pix_tax_id|cpf|cnpj)\":\"(\\d{6})\\d{5,}\"", "\"$$1\":\"$$2******\"")

      transform/mask_body_sensitive_data_replace_3:
        error_mode: ignore
        log_statements:
          - context: log
            conditions:
              - IsMatch(body, "\"(name|customername|customer_name|namecustomer|name_customer|sendername|sender_name|namesender|name_sender|recipientname|recipient_name|namerecipient|name_recipient|receivername|receiver_name|namereceiver|name_receiver|clientname|client_name|nameclient|name_client)\"")
            statements:
              - replace_pattern(body, "\"(name|customername|customer_name|namecustomer|name_customer|sendername|sender_name|namesender|name_sender|recipientname|recipient_name|namerecipient|name_recipient|receivername|receiver_name|namereceiver|name_receiver|clientname|client_name|nameclient|name_client)\":\"(\\S+)[^\"]*\\s+(\\S+)\"", "\"$$1\":\"$$2 ********** $$3\"")

      transform/mask_body_sensitive_data_replace_4:
        error_mode: ignore
        log_statements:
          - context: log
            conditions:
              - IsMatch(body, "\"([^\"]*(customer|sender|recipient|receiver|client|name)[^\"]*)\"")
            statements:
              - replace_pattern(body, "\"([^\"]*(?:customer|sender|recipient|receiver|client|name)[^\"]*)\":\"(\\S+)[^\"]*\\s+(\\S+)\"", "\"$$1\":\"$$2 ********** $$3\"")

      transform/mask_body_sensitive_data_replace_5:
        error_mode: ignore
        log_statements:
          - context: log
            conditions:
              - IsMatch(body, "\"(email|clientemail|clientmail|emailclient|mailclient|client_email|client_mail|email_client|mail_client|senderemail|sendermail|emailsender|mailsender|sender_email|sender_mail|email_sender|mail_sender|recipientemail|recipientmail|emailrecipient|mailrecipient|recipient_email|recipient_mail|email_recipient|mail_recipient|customeremail|customermail|emailcustomer|mailcustomer|customer_email|customer_mail|email_customer|mail_customer|dict|dictpix|dict_pix|pixdict|pix_dict|dictvalue|dict_value|valuedict|value_dict|pixkey|pix_key|keypix|key_pix|keyvalue|key_value|valuekey|value_key)\"")
            statements:
              - replace_pattern(body, "\"(email|clientemail|clientmail|emailclient|mailclient|client_email|client_mail|email_client|mail_client|senderemail|sendermail|emailsender|mailsender|sender_email|sender_mail|email_sender|mail_sender|recipientemail|recipientmail|emailrecipient|mailrecipient|recipient_email|recipient_mail|email_recipient|mail_recipient|customeremail|customermail|emailcustomer|mailcustomer|customer_email|customer_mail|email_customer|mail_customer|dict|dictpix|dict_pix|pixdict|pix_dict|dictvalue|dict_value|valuedict|value_dict|pixkey|pix_key|keypix|key_pix|keyvalue|key_value|valuekey|value_key)\":\"([^\"@]+)@[^\"]+\\.([^\"]+)\"", "\"$$1\":\"$$2@****.$$3\"")

      transform/mask_body_sensitive_data_replace_6:
        error_mode: ignore
        log_statements:
          - context: log
            conditions:
              - IsMatch(body, "\"(address|address1|address2|addressline|addressline1|addressline2|address_line1|address_line2|street|street1|streetaddress|street_address|streetname|street_name|shippingaddress|billingaddress|residentialaddress|residenceaddress)\"")
            statements:
              - replace_pattern(body, "\"(address|address1|address2|addressline|addressline1|addressline2|address_line1|address_line2|street|street1|streetaddress|street_address|streetname|street_name|shippingaddress|billingaddress|residentialaddress|residenceaddress)\":\"(\\S+)\\s+(\\S+)[^\"]*(\\d{3})\"", "\"$$1\":\"$$2 $$3******$$4\"")
              - replace_pattern(body, "\"(address|address1|address2|addressline|addressline1|addressline2|address_line1|address_line2|street|street1|streetaddress|street_address|streetname|street_name|shippingaddress|billingaddress|residentialaddress|residenceaddress)\":\"([^\"\\*0-9]+?)\\s*[^\"\\*]*(\\d{3})\"", "\"$$1\":\"$$2**************$$3\"")

      transform/mask_body_sensitive_data_replace_7:
        error_mode: ignore
        log_statements:
          - context: log
            conditions:
              - IsMatch(body, "\"([^\"]*(cell|phone|mobile|telephone|contact)[^\"]*)\"")
            statements:
              - replace_pattern(body, "\"([^\"]*(?:cell|phone|mobile|telephone|contact)[^\"]*)\":\"(\\+55\\d{3})\\d{6,}\"", "\"$$1\":\"$$2******\"")

      transform/mask_body_sensitive_data_replace_8:
        error_mode: ignore
        log_statements:
          - context: log
            conditions:
              - IsMatch(body, "\"([^\"]*(dict|pix|key|value)[^\"]*)\"")
            statements:
              - replace_pattern(body, "\"([^\"]*(?:dict|pix|key|value)[^\"]*)\":\"(\\+55\\d{3})\\d{6,}\"", "\"$$1\":\"$$2******\"")

      transform/mask_body_sensitive_data_replace_09:
        error_mode: ignore
        log_statements:
          - context: log
            conditions:
              - IsMatch(body, "\"(evp|evpid|evp_key|keyevp|pix|pixkey|pix_key|keypix|key_pix|dict|dictpix|dict_pix|pixdict|pix_dict|dictvalue|dict_value|valuedict|value_dict)\"")
            statements:
              - replace_pattern(body, "\"(evp|evpid|evp_key|keyevp|pix|pixkey|pix_key|keypix|key_pix|dict|dictpix|dict_pix|pixdict|pix_dict|dictvalue|dict_value|valuedict|value_dict)\":\"([a-f0-9]{8})-([a-f0-9]{4})-([a-f0-9]{4})-([a-f0-9]{4})-([a-f0-9]{12})\"", "\"$$1\":\"$$2-****-****-****-$$6\"")

      transform/mask_body_sensitive_data_replace_10:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - replace_pattern(body, "\"(dict|dictpix|dict_pix|pixdict|pix_dict|dictvalue|dict_value|valuedict|value_dict|pixkey|pix_key|keypix|key_pix|keyvalue|key_value|valuekey|value_key)\":\"([a-zA-Z0-9]{8})-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{4}-[a-zA-Z0-9]{12}\"", "\"$$1\":\"$$2******\"")

      # Masks sensitive data in log bodies using regex replacements.
      # Drops all node-level metrics using a regex filter.
      filter/drop_node_metrics:
        metrics:
          exclude:
            match_type: regexp
            metric_names:
              - ^k8s\.node\..*$

      # BYOC privacy filter — restricts telemetry to the 'midaz' and
      # 'midaz-plugins' namespaces. The same filter is applied across metrics,
      # logs, and traces so Lerian never receives data from the client's other
      # workloads (kube-system, app-of-the-client, etc.).
      #
      # `metrics` and `logs` sections use the filterprocessor's declarative
      # `include` form. `traces` uses OTTL syntax — the `span:` list specifies
      # what to DROP, so the condition is INVERTED (drop spans whose namespace
      # is NOT in the allowed set, or whose `k8s.namespace.name` is missing
      # entirely).
      filter/include_midaz_namespaces:
        error_mode: ignore
        metrics:
          include:
            match_type: regexp
            resource_attributes:
              - key: k8s.namespace.name
                value: '^(midaz|midaz-plugins)$'
        logs:
          include:
            match_type: regexp
            resource_attributes:
              - key: k8s.namespace.name
                value: '^(midaz|midaz-plugins)$'
        traces:
          span:
            - 'resource.attributes["k8s.namespace.name"] == nil or not IsMatch(resource.attributes["k8s.namespace.name"], "^(midaz|midaz-plugins)$")'

      # Enriches all telemetry with Kubernetes metadata (pod name, namespace, etc.).
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        # Two-tier pod identity resolution:
        # 1. Prefer the `k8s.pod.ip` resource attribute that the application
        #    emits via OTEL_RESOURCE_ATTRIBUTES=k8s.pod.ip=$(POD_IP). This works
        #    regardless of network topology (no hostNetwork required), so it
        #    covers clients whose PodSecurityPolicy forbids hostNetwork.
        # 2. Fall back to the connection source IP. Works when hostNetwork is
        #    enabled on the collector pod (so the connection IP is the real
        #    pod IP, not the node IP after hostPort hairpin NAT). Required for
        #    services that don't yet emit the k8s.pod.ip resource attribute.
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection
        extract:
          metadata:
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.namespace.name

      # Adds the client ID for multi-tenancy, as requested.
      resource/add_client_id:
        attributes:
          - key: client.id
            value: "Firmino"
            action: upsert

    connectors:
      spanmetrics:
        metrics_expiration: 5m
        histogram:
          explicit:
            buckets: [10ms, 50ms, 100ms, 200ms, 500ms, 1s, 5s, 10s]
        namespace: ""
        aggregation_temporality: CUMULATIVE
        dimensions:
          - name: k8s.namespace.name
          - name: k8s.deployment.name
          - name: k8s.pod.name
          - name: k8s.container.name
          - name: k8s.container.ready
          - name: k8s.container.uptime
          # Migration window: both legacy (`http.method`, `http.status_code`)
          # and OTel-stable (`http.request.method`, `http.response.status_code`)
          # forms are kept while services migrate via lib-observability. The
          # transform/normalize_http_semconv processor mirrors both forms on
          # every span, so series cardinality is unchanged (both values are
          # always equal, except `http.method` which stays nil when the new
          # attr is "_OTHER"). Once migration completes, remove the legacy
          # dimensions (`http.method`, `http.status_code`).
          - name: http.method
          - name: http.request.method
          - name: http.route
          - name: http.status_code
          - name: http.response.status_code
        aggregation_cardinality_limit: 50000

    exporters:
      # Disable the default debug exporter
      debug: null
      otlphttp/server:
        endpoint: "https://telemetry.lerian.io:443"
        headers:
          x-api-key: "${OTEL_API_KEY}"

    service:
      extensions:
        - health_check
      telemetry:
        logs:
          level: "info"
        metrics:
          address: "0.0.0.0:8887"
          level: "Basic"
      pipelines:
        # Accept OTLP-pushed metrics from applications. Required so apps using
        # lib-observability (which emits http.server.request.duration and
        # other OTel-native metrics directly via the OTel SDK) deliver those
        # to the central backend. Without this pipeline, OTLP metrics from
        # the application are silently dropped.
        metrics:
          receivers: [otlp]
          processors:
            - memory_limiter
            - k8sattributes
            - resource/add_client_id
            - filter/include_midaz_namespaces
            - batch
          exporters: [otlphttp/server]
        traces:
          # The order of processors is critical for correct data handling:
          # 1. memory_limiter FIRST (admission control).
          # 2. k8sattributes BEFORE batch — batch drops the connection context that
          #    `pod_association: from connection` relies on.
          # 3. Add the client ID for multi-tenancy.
          # 4. Drop spans from namespaces outside the allowed set (BYOC privacy).
          # 5. Sanitize by removing sensitive payloads.
          # 6. Normalize HTTP semconv (legacy <-> OTel-stable) so the spanmetrics
          #    connector sees both `http.status_code` and `http.response.status_code`.
          # 7. batch LAST so all enrichment/normalization runs on individual spans.
          receivers: [otlp]
          processors:
              - memory_limiter
              - k8sattributes
              - resource/add_client_id
              - filter/include_midaz_namespaces
              - transform/remove_sensitive_attributes
              - transform/normalize_http_semconv
              - batch
          exporters: [spanmetrics, otlphttp/server]

        # Pipeline for span-derived metrics, sent to central backend.
        metrics/spanmetrics:
          receivers: [spanmetrics]
          processors:
            - memory_limiter
            - k8sattributes
            - resource/add_client_id
            - batch
          exporters: [otlphttp/server]

        # Pipeline for cluster-only metrics (k8s_cluster receiver + kubeletstats).
        # OTLP is intentionally NOT in this pipeline's receivers — application
        # OTLP metrics flow exclusively through the `metrics` pipeline above.
        # Routing OTLP through both pipelines would export every datapoint twice.
        metrics/cluster:
          receivers: [k8s_cluster, kubeletstats]
          processors:
            - memory_limiter
            - k8sattributes
            - resource/add_client_id
            - filter/include_midaz_namespaces
            - filter/drop_node_metrics
            - batch
          exporters: [otlphttp/server]
        logs:
          receivers: [otlp, k8sobjects]
          processors:
            - memory_limiter
            - k8sattributes
            - resource/add_client_id
            - filter/include_midaz_namespaces
            - transform/mask_body_sensitive_data_replace_1
            - transform/mask_body_sensitive_data_replace_2
            - transform/mask_body_sensitive_data_replace_3
            - transform/mask_body_sensitive_data_replace_4
            - transform/mask_body_sensitive_data_replace_5
            - transform/mask_body_sensitive_data_replace_6
            - transform/mask_body_sensitive_data_replace_7
            - transform/mask_body_sensitive_data_replace_8
            - transform/mask_body_sensitive_data_replace_09
            - transform/mask_body_sensitive_data_replace_10
            - batch
          exporters: [otlphttp/server]