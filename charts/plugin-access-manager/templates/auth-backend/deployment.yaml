apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plugin-auth-backend.fullname" . }}
  labels:
    {{- include "plugin-auth-backend.labels" (dict "context" . "name" .Values.auth.backend.name ) | nindent 4 }} 
spec:
  revisionHistoryLimit: {{ .Values.auth.backend.revisionHistoryLimit | default 10 }}
  strategy:
    {{- toYaml .Values.auth.deploymentStrategy | nindent 4 }}
  replicas: {{ .Values.auth.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "plugin-auth-backend.selectorLabels" (dict "context" . "name" .Values.auth.backend.name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plugin-auth-backend.labels" (dict "context" . "name" .Values.auth.backend.name ) | nindent 8 }}
    spec:
      {{- with .Values.auth.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      securityContext:
        {{- toYaml .Values.auth.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox
          envFrom:
          - configMapRef:
              name: {{ include "plugin-auth.fullname" . }}
          command:
            - /bin/sh
            - -c
            - >
              for svc in "$DB_HOST:$DB_PORT" "$REDIS_HOST:$REDIS_PORT";
              do
                echo "Checking $svc...";
                while ! nc -z $(echo $svc | cut -d: -f1) $(echo $svc | cut -d: -f2); do
                  echo "$svc is not ready yet, waiting...";
                  sleep 5;
                done;
                echo "$svc is ready!";
              done;
      containers:
        - name: {{ include "plugin-auth-backend.fullname" . }}
          securityContext:
            {{- toYaml .Values.auth.securityContext | nindent 12 }}
          image: "{{ .Values.auth.backend.image.repository }}:{{ .Values.auth.backend.image.tag }}"
          imagePullPolicy: {{ .Values.auth.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          command:
            - /bin/sh
            - -c
            - |
              export dataSourceName="user=${DB_USER} password=${DB_PASSWORD} host=${DB_HOST} port=${DB_PORT} sslmode=${DB_SSLMODE} dbname=${DB_NAME}"
              exec /server --createDatabase={{- if hasKey .Values.auth.backend "createDatabase" }}{{ .Values.auth.backend.createDatabase }}{{- else }}true{{- end }}
          envFrom:
          - configMapRef:
              name: {{ include "plugin-auth-backend.fullname" . }}
          env:
          - name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: {{ include "plugin-auth.fullname" . }}
                key: DB_HOST
          - name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "plugin-auth.fullname" . }}
                key: DB_PORT
          - name: DB_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "plugin-auth.fullname" . }}
                key: DB_NAME
          - name: DB_USER
            valueFrom:
              configMapKeyRef:
                name: {{ include "plugin-auth.fullname" . }}
                key: DB_USER
          - name: DB_SSLMODE
            valueFrom:
              configMapKeyRef:
                name: {{ include "plugin-auth.fullname" . }}
                key: DB_SSLMODE
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                {{- if .Values.auth.useExistingSecret }}
                name: {{ .Values.auth.existingSecretName }}
                {{- else }}
                name: {{ include "plugin-auth.fullname" . }}
                {{- end }}
                key: DB_PASSWORD
          {{ if (index .Values "otel-collector-lerian").enabled }}
          - name: "HOST_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "$(HOST_IP):4317"
          {{ end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.auth.backend.readinessProbe.path | default "/readyz" }}
              port: 8000
            initialDelaySeconds: {{ .Values.auth.backend.readinessProbe.initialDelaySeconds | default 15 }}
            periodSeconds: {{ .Values.auth.backend.readinessProbe.periodSeconds | default 5 }}
            {{- if and .Values.auth.backend.readinessProbe (hasKey (.Values.auth.backend.readinessProbe | default dict) "timeoutSeconds") }}
            timeoutSeconds: {{ .Values.auth.backend.readinessProbe.timeoutSeconds }}
            {{- end }}
            {{- if and .Values.auth.backend.readinessProbe (hasKey (.Values.auth.backend.readinessProbe | default dict) "successThreshold") }}
            successThreshold: {{ .Values.auth.backend.readinessProbe.successThreshold }}
            {{- end }}
            {{- if and .Values.auth.backend.readinessProbe (hasKey (.Values.auth.backend.readinessProbe | default dict) "failureThreshold") }}
            failureThreshold: {{ .Values.auth.backend.readinessProbe.failureThreshold }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.auth.backend.livenessProbe.path | default "/api/health" }}
              port: 8000
            initialDelaySeconds: {{ .Values.auth.backend.livenessProbe.initialDelaySeconds | default 20 }}
            {{- if and .Values.auth.backend.livenessProbe (hasKey (.Values.auth.backend.livenessProbe | default dict) "periodSeconds") }}
            periodSeconds: {{ .Values.auth.backend.livenessProbe.periodSeconds }}
            {{- end }}
            {{- if and .Values.auth.backend.livenessProbe (hasKey (.Values.auth.backend.livenessProbe | default dict) "timeoutSeconds") }}
            timeoutSeconds: {{ .Values.auth.backend.livenessProbe.timeoutSeconds }}
            {{- end }}
            {{- if and .Values.auth.backend.livenessProbe (hasKey (.Values.auth.backend.livenessProbe | default dict) "successThreshold") }}
            successThreshold: {{ .Values.auth.backend.livenessProbe.successThreshold }}
            {{- end }}
            {{- if and .Values.auth.backend.livenessProbe (hasKey (.Values.auth.backend.livenessProbe | default dict) "failureThreshold") }}
            failureThreshold: {{ .Values.auth.backend.livenessProbe.failureThreshold }}
            {{- end }}
      {{- with .Values.auth.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.auth.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.auth.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}