{{- if and .Values.crm.enabled (not .Values.crm.useExistingSecret) }}
{{- $mongo := .Values.mongodb | default dict }}
{{- $mongoAuth := $mongo.auth | default dict }}
{{- $mongoInternal := or (and (ne (toString $mongo.enabled) "false") (not $mongo.external)) $mongoAuth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "midaz-crm.fullname" . }}
  labels:
    {{- include "midaz-crm.labels" (dict "context" . "name" .Values.crm.name ) | nindent 4 }}
type: Opaque
data:
  # -- Default sensitive variables for CRM

  # DATA SECURITY (app crypto material — operator-provided, external boundary)
  LCRYPTO_HASH_SECRET_KEY: {{ required "crm.secrets.LCRYPTO_HASH_SECRET_KEY is required" .Values.crm.secrets.LCRYPTO_HASH_SECRET_KEY | b64enc | quote }}
  LCRYPTO_ENCRYPT_SECRET_KEY: {{ required "crm.secrets.LCRYPTO_ENCRYPT_SECRET_KEY is required" .Values.crm.secrets.LCRYPTO_ENCRYPT_SECRET_KEY | b64enc | quote }}
  # MONGO Secrets
  # MONGO_PASSWORD is single-sourced from the Bitnami mongodb subchart Secret
  # (<release>-mongodb, key mongodb-root-password) and injected via secretKeyRef on
  # the CRM Deployment. It is NOT written here for the internal/default case. It is
  # only emitted when MongoDB is EXTERNAL (mongodb disabled or .external=true) without
  # an existingSecret override, and the operator supplied crm.secrets.MONGO_PASSWORD.
  {{- if and (not $mongoInternal) .Values.crm.secrets.MONGO_PASSWORD }}
  MONGO_PASSWORD: {{ .Values.crm.secrets.MONGO_PASSWORD | b64enc | quote }}
  {{- end }}

  # =============================================================================
  # STREAMING SECRETS (lib-streaming — SASL password + TLS CA, operator-provided)
  # =============================================================================
  {{- if .Values.crm.secrets.STREAMING_SASL_PASSWORD }}
  STREAMING_SASL_PASSWORD: {{ .Values.crm.secrets.STREAMING_SASL_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if .Values.crm.secrets.STREAMING_TLS_CA_CERT }}
  STREAMING_TLS_CA_CERT: {{ .Values.crm.secrets.STREAMING_TLS_CA_CERT | b64enc | quote }}
  {{- end }}
{{- end }}
