# Default values

# -- Shared env-wide config consumed by the lerian-common helpers. Set per environment
# (umbrella/GitOps). Each helper stays inert until its block is filled (address/brokers
# empty = off); a component's own extraEnvVars/configmap value overrides these.
global:
  serviceDiscovery:
    address: ""
    tls: false
    tlsSkipVerify: false
    workload: ""
    preferView: external
    internalScheme: http
    externalPort: 443
  streaming:
    brokers: ""
    tlsEnabled: false
    saslMechanism: ""
    saslUsername: ""
  multiTenant:
    url: ""
    redisHost: ""
    redisPort: "6379"
    redisTls: "false"

fees:
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []

  configmap:
    ALLOW_INSECURE_TLS: "true"
    ENV_NAME: "development"
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_ADDRESS: "http://plugin-access-manager-auth:4000"
    # -- MongoDB host. Leave empty to derive the bundled subchart Service name
    # (collapse-aware via common.names.dependency.fullname). Set only for an external MongoDB.
    MONGO_HOST: ""
    MONGO_NAME: "plugin-fees-db"
    MONGO_PORT: "27017"
    MONGO_USER: "plugin-fees"
    MONGO_PARAMETERS: ""
    CLIENT_ID: "ac56c81d4d6d95c0ac12"

  useExistingSecret: false
  existingSecretName: ""

  secrets:
    MONGO_PASSWORD: ""
    CLIENT_SECRET: ""
    LICENSE_KEY: ""
    ORGANIZATION_IDS: ""

mongodb:
  enabled: true
