{{- if and .Values.matcher.enabled (not .Values.matcher.useExistingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "matcher.fullname" . }}
  namespace: {{ include "global.namespace" . }}
type: Opaque
data:
  # PostgreSQL Secrets
  # Single-sourced from the postgresql subchart Secret (<release>-postgresql / password,
  # replication-password) when postgresql is internal or an existingSecret is set. Only emitted
  # here for external PostgreSQL without an existingSecret (operator-provided password).
  {{- $pg := .Values.postgresql | default dict }}
  {{- $pgAuth := $pg.auth | default dict }}
  {{- if and (not (and (ne (toString $pg.enabled) "false") (not $pg.external))) (not $pgAuth.existingSecret) .Values.matcher.secrets.POSTGRES_PASSWORD }}
  POSTGRES_PASSWORD: {{ .Values.matcher.secrets.POSTGRES_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if and (not (and (ne (toString $pg.enabled) "false") (not $pg.external))) (not $pgAuth.existingSecret) .Values.matcher.secrets.POSTGRES_REPLICA_PASSWORD }}
  POSTGRES_REPLICA_PASSWORD: {{ .Values.matcher.secrets.POSTGRES_REPLICA_PASSWORD | b64enc | quote }}
  {{- end }}

  # Redis/Valkey Secrets
  # Single-sourced from the valkey subchart Secret (<release>-valkey / valkey-password) when
  # valkey is internal with auth enabled or an existingSecret is set. Only emitted here for
  # external Valkey without an existingSecret (operator-provided password).
  {{- $vk := .Values.valkey | default dict }}
  {{- $vkAuth := $vk.auth | default dict }}
  {{- if and (not (and (ne (toString $vk.enabled) "false") (not $vk.external) $vkAuth.enabled)) (not $vkAuth.existingSecret) .Values.matcher.secrets.REDIS_PASSWORD }}
  REDIS_PASSWORD: {{ .Values.matcher.secrets.REDIS_PASSWORD | b64enc | quote }}
  {{- end }}

  # RabbitMQ Secrets
  RABBITMQ_PASSWORD: {{ required "matcher.secrets.RABBITMQ_PASSWORD is required" .Values.matcher.secrets.RABBITMQ_PASSWORD | b64enc | quote }}

  # Object Storage Secrets
  OBJECT_STORAGE_ACCESS_KEY_ID: {{ .Values.matcher.secrets.OBJECT_STORAGE_ACCESS_KEY_ID | default "" | b64enc | quote }}
  OBJECT_STORAGE_SECRET_ACCESS_KEY: {{ .Values.matcher.secrets.OBJECT_STORAGE_SECRET_ACCESS_KEY | default "" | b64enc | quote }}

  # Authentication Secrets
  AUTH_JWT_SECRET: {{ .Values.matcher.secrets.AUTH_JWT_SECRET | default "" | b64enc | quote }}

  # Systemplane Secrets
  # REQUIRED: AES-256-GCM master key for encrypting secret config values.
  # Generate with: openssl rand -base64 32 | tr -d '\n'
  SYSTEMPLANE_SECRET_MASTER_KEY: {{ .Values.matcher.secrets.SYSTEMPLANE_SECRET_MASTER_KEY | default "" | b64enc | quote }}

  # Idempotency Secrets (optional)
  {{- if .Values.matcher.secrets.IDEMPOTENCY_HMAC_SECRET }}
  IDEMPOTENCY_HMAC_SECRET: {{ .Values.matcher.secrets.IDEMPOTENCY_HMAC_SECRET | b64enc | quote }}
  {{- end }}

  # Multi-Tenant Secrets (optional)
  {{- if .Values.matcher.secrets.MULTI_TENANT_SERVICE_API_KEY }}
  MULTI_TENANT_SERVICE_API_KEY: {{ .Values.matcher.secrets.MULTI_TENANT_SERVICE_API_KEY | b64enc | quote }}
  {{- end }}
{{- end }}
