{{- if not .Values.auth.useExistingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-auth-backend.fullname" . }}-casdoor-redis
  labels:
    {{- include "plugin-auth-backend.labels" (dict "context" . "name" .Values.auth.backend.name ) | nindent 4 }}
type: Opaque
data:
  # -- Casdoor redis session provider connection string ("host:port,poolsize,password,dbnum").
  # Kept out of the ConfigMap because it embeds REDIS_PASSWORD.
  redisEndpoint: {{ include "plugin-auth-backend.redisEndpoint" . | b64enc | quote }}
{{- end }}
