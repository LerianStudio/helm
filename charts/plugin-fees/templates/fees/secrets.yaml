{{- if not .Values.fees.useExistingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-fees.fullname" . }}
  labels:
    {{- include "plugin-fees.labels" (dict "context" . "name" .Values.fees.name ) | nindent 4 }}
type: Opaque
stringData:
  # -- Default sensitive variables for the plugin-fees
  # MONGO_PASSWORD is single-sourced. With the bundled Bitnami mongodb subchart it lives in
  # the plugin-fees-mongodb Secret (key mongodb-root-password) and is read via secretKeyRef
  # on the deployment, so it is NOT stored here. It is only written here for an EXTERNAL
  # MongoDB where the operator supplies it inline (no mongodb.auth.existingSecret).
  # See docs/helm-chart-standard.md "Single-Source Infra Secrets".
  {{- $mongo := .Values.mongodb | default dict }}
  {{- $mongoAuth := $mongo.auth | default dict }}
  {{- if and (not (and (ne (toString $mongo.enabled) "false") (not $mongo.external))) (not $mongoAuth.existingSecret) .Values.fees.secrets.MONGO_PASSWORD }}
  MONGO_PASSWORD: {{ .Values.fees.secrets.MONGO_PASSWORD | quote }}
  {{- end }}
  CLIENT_SECRET: {{ required "fees.secrets.CLIENT_SECRET is required" .Values.fees.secrets.CLIENT_SECRET | quote }}
  # LICENSE Secrets
  LICENSE_KEY: {{ .Values.fees.secrets.LICENSE_KEY | quote }}
  ORGANIZATION_IDS: {{ .Values.fees.secrets.ORGANIZATION_IDS | quote }}
  # Multi-Tenant Secrets
  {{- with (include "lerian-common.multiTenant.secret" (dict
        "context" . "secrets" .Values.fees.secrets
        "secretName" (include "plugin-fees.fullname" .)
        "valuesPrefix" "fees.secrets." "mode" "stringData"
        "enabled" (eq (.Values.fees.configmap.MULTI_TENANT_ENABLED | default "false" | toString) "true")
        "useExistingSecret" .Values.fees.useExistingSecret)) }}
  {{- . | nindent 2 }}
  {{- end }}
  # STREAMING SECRETS (lib-streaming — SASL password + TLS CA, operator-provided)
  {{- with (include "lerian-common.streaming.secret" (dict
        "context" . "secrets" .Values.fees.secrets
        "secretName" (include "plugin-fees.fullname" .)
        "valuesPrefix" "fees.secrets." "mode" "stringData"
        "enabled" (eq (.Values.fees.configmap.STREAMING_ENABLED | default "false" | toString) "true")
        "useExistingSecret" .Values.fees.useExistingSecret
        "saslMechanism" (dig "streaming" "saslMechanism" "" (.Values.global | default dict)))) }}
  {{- . | nindent 2 }}
  {{- end }}
{{- end }}
