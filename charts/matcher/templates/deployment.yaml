{{- if .Values.matcher.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "matcher.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "matcher.labels" (dict "context" . "component" .Values.matcher.name "name" .Values.matcher.name ) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.matcher.revisionHistoryLimit | default 10 }}
  strategy:
    type: {{ .Values.matcher.deploymentUpdate.type }}
    {{- if eq .Values.matcher.deploymentUpdate.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.matcher.deploymentUpdate.maxSurge }}
      maxUnavailable: {{ .Values.matcher.deploymentUpdate.maxUnavailable }}
    {{- end }}
  {{- if not .Values.matcher.autoscaling.enabled }}
  replicas: {{ .Values.matcher.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "matcher.selectorLabels" (dict "context" . "name" .Values.matcher.name ) | nindent 6 }}
  template:
    metadata:
      {{- with .Values.matcher.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "matcher.labels" (dict "context" . "component" .Values.matcher.name "name" .Values.matcher.name ) | nindent 8 }}
    spec:
      {{- with .Values.matcher.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "matcher.serviceAccountName" . }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      securityContext:
        fsGroup: 65532
      {{- else }}
      securityContext:
        {{- toYaml .Values.matcher.podSecurityContext | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox
          envFrom:
          - configMapRef:
              name: {{ include "matcher.fullname" . }}
          command:
            - /bin/sh
            - -c
            - >
              for svc in "$POSTGRES_HOST:$POSTGRES_PORT" "$POSTGRES_REPLICA_HOST:$POSTGRES_REPLICA_PORT" "$RABBITMQ_HOST:$RABBITMQ_PORT";
              do
                HOST=$(echo $svc | cut -d: -f1);
                PORT=$(echo $svc | cut -d: -f2);
                echo "Checking $HOST:$PORT...";
                while ! nc -z "$HOST" "$PORT"; do
                  echo "$HOST:$PORT is not ready yet, waiting...";
                  sleep 5;
                done;
                echo "$HOST:$PORT is ready!";
              done;
              REDIS_SVC=$(echo "$REDIS_HOST" | cut -d: -f1);
              REDIS_PORT=$(echo "$REDIS_HOST" | cut -d: -f2);
              echo "Checking $REDIS_SVC:$REDIS_PORT...";
              while ! nc -z "$REDIS_SVC" "$REDIS_PORT"; do
                echo "$REDIS_SVC:$REDIS_PORT is not ready yet, waiting...";
                sleep 5;
              done;
              echo "$REDIS_SVC:$REDIS_PORT is ready!";
      containers:
        - name: {{ include "matcher.fullname" . }}
          securityContext:
            {{- toYaml .Values.matcher.securityContext | nindent 12 }}
          image: "{{ .Values.matcher.image.repository }}:{{ .Values.matcher.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.matcher.image.pullPolicy }}
          envFrom:
          - secretRef:
              name: {{ if .Values.matcher.useExistingSecret }}{{ .Values.matcher.existingSecretName }}{{ else }}{{ include "matcher.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "matcher.fullname" . }}
          env:
            {{- $secretName := ternary .Values.matcher.existingSecretName (include "matcher.fullname" .) .Values.matcher.useExistingSecret }}
            {{- $pg := .Values.postgresql | default dict }}
            {{- $pgAuth := $pg.auth | default dict }}
            {{- if or (and (ne (toString $pg.enabled) "false") (not $pg.external)) $pgAuth.existingSecret }}
            {{- include "matcher.infraSecretRef" (dict "context" $ "subchart" "postgresql" "key" "password" "envName" "POSTGRES_PASSWORD") | nindent 12 }}
            {{- include "matcher.infraSecretRef" (dict "context" $ "subchart" "postgresql" "key" "replication-password" "envName" "POSTGRES_REPLICA_PASSWORD") | nindent 12 }}
            {{- else }}
            {{- if .Values.matcher.secrets.POSTGRES_PASSWORD }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_PASSWORD
            {{- end }}
            {{- if .Values.matcher.secrets.POSTGRES_REPLICA_PASSWORD }}
            - name: POSTGRES_REPLICA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_REPLICA_PASSWORD
            {{- end }}
            {{- end }}
            {{- $vk := .Values.valkey | default dict }}
            {{- $vkAuth := $vk.auth | default dict }}
            {{- if or (and (ne (toString $vk.enabled) "false") (not $vk.external) $vkAuth.enabled) $vkAuth.existingSecret }}
            {{- include "matcher.infraSecretRef" (dict "context" $ "subchart" "valkey" "key" "valkey-password" "envName" "REDIS_PASSWORD") | nindent 12 }}
            {{- else if .Values.matcher.secrets.REDIS_PASSWORD }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: REDIS_PASSWORD
            {{- end }}
            {{- if eq (toString .Values.matcher.configmap.ENABLE_TELEMETRY) "true" }}
            - name: "HOST_IP"
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
              value: "http://$(HOST_IP):4317"
            {{- end }}
            {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
            - name: AWS_EC2_METADATA_SERVICE_ENDPOINT
              value: "http://127.0.0.1:{{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
            - name: AWS_EC2_METADATA_SERVICE_ENDPOINT_MODE
              value: "IPv4"
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.matcher.livenessProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.matcher.livenessProbe.initialDelaySeconds | default 15 }}
            periodSeconds: {{ .Values.matcher.livenessProbe.periodSeconds | default 20 }}
            timeoutSeconds: {{ .Values.matcher.livenessProbe.timeoutSeconds | default 5 }}
            successThreshold: {{ .Values.matcher.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.matcher.livenessProbe.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.matcher.readinessProbe.path | default "/readyz" }}
              port: http
            initialDelaySeconds: {{ .Values.matcher.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.matcher.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.matcher.readinessProbe.timeoutSeconds | default 5 }}
            successThreshold: {{ .Values.matcher.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.matcher.readinessProbe.failureThreshold | default 3 }}
          resources:
            {{- toYaml .Values.matcher.resources | nindent 12 }}
        {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
        - name: aws-signing-helper
          image: "{{ .Values.aws.rolesAnywhere.sidecar.image.repository }}:{{ .Values.aws.rolesAnywhere.sidecar.image.tag }}"
          imagePullPolicy: {{ .Values.aws.rolesAnywhere.sidecar.image.pullPolicy | default "IfNotPresent" }}
          args:
            - serve
            - --certificate
            - /certs/tls.crt
            - --private-key
            - /certs/tls.key
            - --trust-anchor-arn
            - "{{ required "aws.rolesAnywhere.trustAnchorArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.trustAnchorArn }}"
            - --profile-arn
            - "{{ required "aws.rolesAnywhere.profileArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.profileArn }}"
            - --role-arn
            - "{{ required "aws.rolesAnywhere.roleArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.roleArn }}"
            - --region
            - "{{ .Values.aws.rolesAnywhere.region | default "us-east-2" }}"
            - --session-duration
            - "{{ .Values.aws.rolesAnywhere.sessionDuration | default 3600 }}"
            - --port
            - "{{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
          ports:
            - name: imds
              containerPort: {{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}
              protocol: TCP
          volumeMounts:
            - name: iam-certs
              mountPath: /certs
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.aws.rolesAnywhere.sidecar.resources | nindent 12 }}
        {{- end }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      volumes:
        - name: iam-certs
          secret:
            secretName: {{ .Values.aws.rolesAnywhere.certificateSecretName | default "matcher-iam-tls" }}
            defaultMode: 0440
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
      {{- end }}
      {{- with .Values.matcher.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.matcher.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.matcher.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
