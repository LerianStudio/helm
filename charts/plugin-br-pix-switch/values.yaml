# =============================================================================
# OPTIONAL DEPENDENCIES (subcharts) — all disabled by default
#
# Per-component dependency usage (from source audit):
#
#   postgres   spi, spi-systemplane, dict-hub, dict-hub-vsync,
#              dict-systemplane, cob-hub, cob-systemplane (7 components)
#   mongodb    dict-hub only
#   valkey     spi (optional), dict-hub (optional), dict-hub-vsync (optional)
#   rabbitmq   dict-hub-vsync only
#
# -----------------------------------------------------------------------------
# DEFAULT CREDENTIALS WARNING
# -----------------------------------------------------------------------------
# Every credential below (user: pixswitch / password: lerian) is intended
# ONLY for the in-cluster subcharts started by `<subchart>.enabled=true`
# during local development and smoke tests. They MATCH the URL defaults
# baked into each component's configmap block (e.g.
#   spi.configmap.DATABASE_URL: postgres://pixswitch:lerian@...
# ) so a fresh `helm install --set postgresql.enabled=true ...` works
# without any per-URL override.
#
# IMPORTANT — for external databases (RDS, DocumentDB, ElastiCache,
# AmazonMQ, etc.) the operator MUST NOT rely on these defaults. Instead:
#
#   1. Set `<subchart>.enabled: false` for every external dependency.
#   2. Provide real credentials via a Kubernetes Secret created out-of-band
#      (Vault, AWS Secrets Manager + ESO, sealed-secrets, etc.) and reference
#      it from each component's configmap/secrets override:
#
#        spi:
#          useExistingSecret: true
#          existingSecretName: "pix-switch-spi-credentials"
#          configmap:
#            # only non-sensitive fields here; URLs that need passwords
#            # come from the existing Secret keys above.
#            DATABASE_URL: "postgres://<user>:$(DB_PASSWORD)@managed.example.com:5432/pix-spi?sslmode=require"
#            VALKEY_URL: "redis://default:$(VALKEY_PASSWORD)@managed.example.com:6379/0"
#
#   3. Override `global.externalPostgresDefinitions.pixswitchCredentials.useExistingSecret.name`
#      and `global.externalMongoDefinitions.pixswitchCredentials.useExistingSecret.name`
#      when running the bootstrap Jobs against external infra — never put real
#      passwords in values.yaml.
#
# Image: Bitnami moved free images to bitnamisecure / bitnamilegacy in 2025;
# the upstream subchart points at the now-removed bitnami/* tags by default.
# Override repository to bitnamisecure/* and tolerate the unsigned-image flag.
# =============================================================================

# PostgreSQL (Bitnami chart)
# Used by 7 components for DATABASE_URL / SYSTEMPLANE_POSTGRES_DSN.
# Default creds below feed the URL defaults in spi/dictHub/dictHubVsync/cobHub
# (and the systemplane variants) configmap blocks.
# =============================================================================
# SHARED INGRESSES
#
# Two ingress objects, both routed by path prefix:
#
#   appsIngress         — user-facing traffic (SPI, DICT/COB hub+proxy, optional
#                         adapter-btg-mock). Single hostname.
#   systemplaneIngress  — admin/runtime-config traffic (SPI/DICT/COB systemplanes).
#                         Separate hostname so operators can apply stricter
#                         annotations (auth, IP allowlist, WAF) than the apps
#                         ingress without coupling them.
#
# Each `routes` entry maps a path prefix to a component's Service. The chart
# silently skips paths whose target component is disabled.
#
# NO path rewriting is performed at the ingress — apps own their /<component>
# path namespace (e.g. SPI's router registers /spi/health, /spi/keys/lookup).
# =============================================================================

appsIngress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts: []
  tls: []
  # -- Path-to-component mapping. Each route renders one path rule on every
  # host in `hosts`. The chart skips routes whose `component` is disabled.
  #
  # Each route has:
  #   - `path`         (string, required): URL path prefix
  #   - `pathType`     (string, optional, default "Prefix"): K8s Ingress pathType
  #   - `component`    (string, required): values-key of the component
  #                     (camelCase, e.g. dictHub) — used to look up enabled+port
  #   - `serviceName`  (string, required): kebab-case Service name suffix
  #                     (e.g. dict-hub) — matches the rendered Service object
  routes:
    - path: /spi
      pathType: Prefix
      component: spi
      serviceName: spi
    - path: /dict-hub
      pathType: Prefix
      component: dictHub
      serviceName: dict-hub
    - path: /dict-proxy
      pathType: Prefix
      component: dictProxy
      serviceName: dict-proxy
    - path: /cob-hub
      pathType: Prefix
      component: cobHub
      serviceName: cob-hub
    - path: /cob-proxy
      pathType: Prefix
      component: cobProxy
      serviceName: cob-proxy

systemplaneIngress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts: []
  tls: []
  routes:
    - path: /spi
      pathType: Prefix
      component: spiSystemplane
      serviceName: spi-systemplane
    - path: /dict
      pathType: Prefix
      component: dictSystemplane
      serviceName: dict-systemplane
    - path: /cob
      pathType: Prefix
      component: cobSystemplane
      serviceName: cob-systemplane

# -----------------------------------------------------------------------------
# Providers Ingress — outbound-provider adapters (BTG mock, BACEN, JD, ...).
#
# Single hostname routes provider traffic by path prefix. Each route names a
# component already defined in the chart (or one a future PR adds) and the
# kebab-case Service name suffix.
#
# Today only adapter-btg-mock is shipped; BACEN and JD providers will be
# added as components in future PRs and exposed here under their own paths.
# -----------------------------------------------------------------------------
providersIngress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts: []
  tls: []
  routes:
    - path: /mock-btg
      pathType: Prefix
      component: adapterBtgMock
      serviceName: adapter-btg-mock
    # Reserved for future components — uncomment when the bacen/jd
    # adapter components ship in the chart:
    # - path: /bacen
    #   pathType: Prefix
    #   component: bacenAdapter
    #   serviceName: bacen-adapter
    # - path: /jd
    #   pathType: Prefix
    #   component: jdAdapter
    #   serviceName: jd-adapter

postgresql:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamisecure/postgresql
    tag: "latest"
  # Bitnami subchart credentials. Operator MUST override for production.
  # For external Postgres set `enabled: false` and configure DATABASE_URL
  # per component via an existing Kubernetes Secret (see header).
  auth:
    enablePostgresUser: true
    postgresPassword: "lerian"   # admin password (used by bootstrap Jobs)
    username: "pixswitch"        # MATCHES DATABASE_URL default
    password: "lerian"           # MATCHES DATABASE_URL default
    database: "postgres"

# Valkey (Bitnami chart, OCI registry)
# Used by spi, dict-hub, dict-hub-vsync for VALKEY_URL (optional — caching).
valkey:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamisecure/valkey
    tag: "latest"
  # Bitnami subchart credentials. Operator MUST override for production.
  # For external Valkey/ElastiCache set `enabled: false` and configure
  # VALKEY_URL per component via an existing Kubernetes Secret (see header).
  auth:
    enabled: true
    password: "lerian"           # MATCHES VALKEY_URL default

# MongoDB (Bitnami chart)
# Used by dict-hub only for MONGO_URL.
mongodb:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamisecure/mongodb
    tag: "latest"
  architecture: standalone
  # Bitnami subchart credentials. Operator MUST override for production.
  # For external Mongo/DocumentDB/Atlas set `enabled: false` and configure
  # dictHub.configmap.MONGO_URL via an existing Kubernetes Secret (see header).
  auth:
    enabled: true
    rootUser: "admin"
    rootPassword: "lerian"
    usernames:
      - "pixswitch"              # MATCHES MONGO_URL default
    passwords:
      - "lerian"                 # MATCHES MONGO_URL default
    databases:
      - "pix-dict"               # only dict-hub uses Mongo
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# RabbitMQ (groundhog2k chart — same as plugin-br-bank-transfer / matcher)
# Used only by dict-hub-vsync for RABBITMQ_URI.
rabbitmq:
  enabled: false
  image:
    tag: "3.13.6"
  persistence:
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile: {type: RuntimeDefault}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities: {drop: ["ALL"]}
  # groundhog2k subchart credentials. Operator MUST override for production.
  # For external RabbitMQ / AmazonMQ set `enabled: false` and configure
  # dictHubVsync.configmap.RABBITMQ_URI via an existing Kubernetes Secret.
  authentication:
    user:
      value: "pixswitch"         # MATCHES RABBITMQ_URI default
    password:
      value: "lerian"            # MATCHES RABBITMQ_URI default
    erlangCookie:
      value: ""                  # MUST be set when enabled=true
                                 # (groundhog2k chart requires it; generate
                                 #  with `openssl rand -base64 32`)
