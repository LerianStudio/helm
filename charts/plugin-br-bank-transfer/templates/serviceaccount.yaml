{{- if and .Values.bankTransfer.enabled .Values.bankTransfer.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "bank-transfer.serviceAccountName" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "bank-transfer.labels" (dict "context" . "component" .Values.bankTransfer.name "name" .Values.bankTransfer.name ) | nindent 4 }}
  {{- with .Values.bankTransfer.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
