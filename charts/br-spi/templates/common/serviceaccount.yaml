{{- if .Values.serviceAccount.create -}}
# One ServiceAccount shared by all four component Deployments — they run the same
# workload identity and need no per-component RBAC differentiation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "br-spi.serviceAccountName" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    helm.sh/chart: {{ include "br-spi.chart" . }}
    app.kubernetes.io/name: {{ include "br-spi.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
