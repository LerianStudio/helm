{{- $component := index .Values "bc-correios" -}}
{{- if $component.enabled }}
{{- if not $component.useExistingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bc-correios.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_PASSWORD: {{ required "bc-correios.secrets.POSTGRES_PASSWORD is required" $component.secrets.POSTGRES_PASSWORD | quote }}

  # RabbitMQ credentials
  RABBITMQ_PASS: {{ required "bc-correios.secrets.RABBITMQ_PASS is required" $component.secrets.RABBITMQ_PASS | quote }}
  RABBITMQ_URL: {{ required "bc-correios.secrets.RABBITMQ_URL is required" $component.secrets.RABBITMQ_URL | quote }}

  # AES-256 encryption key (32 bytes)
  ENCRYPTION_KEY: {{ required "bc-correios.secrets.ENCRYPTION_KEY is required" $component.secrets.ENCRYPTION_KEY | quote }}

  # Cache (Valkey) credentials
  CACHE_PASSWORD: {{ $component.secrets.CACHE_PASSWORD | default "" | quote }}

  # Object storage credentials
  OBJECT_STORAGE_ACCESS_KEY: {{ $component.secrets.OBJECT_STORAGE_ACCESS_KEY | default "" | quote }}
  OBJECT_STORAGE_SECRET_KEY: {{ $component.secrets.OBJECT_STORAGE_SECRET_KEY | default "" | quote }}

  # Plugin Auth M2M client secret (optional)
  {{- if $component.secrets.PLUGIN_AUTH_CLIENT_SECRET }}
  PLUGIN_AUTH_CLIENT_SECRET: {{ $component.secrets.PLUGIN_AUTH_CLIENT_SECRET | quote }}
  {{- end }}
{{- end }}
{{- end }}
