  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10
  image:
    # -- Repository for the container image
    repository: ghcr.io/lerianstudio/plugin-br-pix-indirect-btg-worker-schedule
    # -- Image pull policy
    pullPolicy: Always
    # -- Image tag used for deployment
    tag: "1.8.0"
  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []
  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""
  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Service port (distinct from reconciliation 4017 to keep both co-locatable)
    port: 4018
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  podSecurityContext: {} # fsGroup: 2000
  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Maximum number of unavailable pods (unset so minAvailable applies for the single-replica worker)
    maxUnavailable: null
    # -- Minimum number of available pods
    minAvailable: 1
    # -- Annotations for PodDisruptionBudget
    annotations: {}
  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 500m
      memory: 512Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: false
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 1
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}
  # -- Tolerations for scheduling on tainted nodes
  tolerations: []
  # -- Affinity rules for pod scheduling
  affinity: {}
  # -- ConfigMap for environment variables and configurations
  # -- All environment variables are declared in the templates/schedule/configmap.yaml
  # @default -- templates/schedule/configmap.yaml
  configmap:
    # Chart-level explicit defaults: worker active with a 15m polling loop.
    SCHEDULE_WORKER_ENABLED: "true"
    SCHEDULE_WORKER_INTERVAL: "15m"
    SCHEDULE_WORKER_BATCH_SIZE: "50"
    SCHEDULE_WORKER_STALE_THRESHOLD: "5m"
    SCHEDULE_WORKER_SWEEP_EVERY_N_CYCLES: "10"
