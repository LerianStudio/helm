{{- if .Values.bankTransfer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bank-transfer.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "bank-transfer.labels" (dict "context" . "component" .Values.bankTransfer.name "name" .Values.bankTransfer.name ) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.bankTransfer.revisionHistoryLimit | default 10 }}
  strategy:
    type: {{ .Values.bankTransfer.deploymentUpdate.type }}
    {{- if eq .Values.bankTransfer.deploymentUpdate.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.bankTransfer.deploymentUpdate.maxSurge }}
      maxUnavailable: {{ .Values.bankTransfer.deploymentUpdate.maxUnavailable }}
    {{- end }}
  {{- if not .Values.bankTransfer.autoscaling.enabled }}
  replicas: {{ .Values.bankTransfer.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "bank-transfer.selectorLabels" (dict "context" . "name" .Values.bankTransfer.name ) | nindent 6 }}
  template:
    metadata:
      {{- with .Values.bankTransfer.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "bank-transfer.labels" (dict "context" . "component" .Values.bankTransfer.name "name" .Values.bankTransfer.name ) | nindent 8 }}
    spec:
      {{- with .Values.bankTransfer.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "bank-transfer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.bankTransfer.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37
          envFrom:
          - configMapRef:
              name: {{ include "bank-transfer.fullname" . }}
          command:
            - /bin/sh
            - -c
            - |
              MAX_ATTEMPTS=60
              SLEEP_SECONDS=5
              # Total timeout: 60 * 5 = 300 seconds (5 minutes)

              wait_for_service() {
                local HOST="$1"
                local PORT="$2"
                local ATTEMPTS=0
                echo "Checking $HOST:$PORT..."
                while ! nc -z "$HOST" "$PORT"; do
                  ATTEMPTS=$((ATTEMPTS + 1))
                  if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                    echo "Timeout waiting for $HOST:$PORT after $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds"
                    exit 1
                  fi
                  echo "$HOST:$PORT is not ready yet, waiting... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                  sleep $SLEEP_SECONDS
                done
                echo "$HOST:$PORT is ready!"
              }

              # Wait for PostgreSQL
              wait_for_service "$POSTGRES_HOST" "$POSTGRES_PORT"

              # Wait for Redis/Valkey
              REDIS_SVC=$(echo "$REDIS_HOST" | cut -d: -f1)
              REDIS_PORT_NUM=$(echo "$REDIS_HOST" | cut -d: -f2)
              wait_for_service "$REDIS_SVC" "$REDIS_PORT_NUM"

              echo "All dependencies are ready!"
      containers:
        - name: {{ include "bank-transfer.fullname" . }}
          securityContext:
            {{- toYaml .Values.bankTransfer.securityContext | nindent 12 }}
          image: "{{ .Values.bankTransfer.image.repository }}:{{ .Values.bankTransfer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.bankTransfer.image.pullPolicy }}
          envFrom:
          - secretRef:
              name: {{ if .Values.bankTransfer.useExistingSecret }}{{ required "bankTransfer.existingSecretName is required when bankTransfer.useExistingSecret is true" .Values.bankTransfer.existingSecretName }}{{ else }}{{ include "bank-transfer.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "bank-transfer.fullname" . }}
          {{- if eq (toString .Values.bankTransfer.configmap.ENABLE_TELEMETRY) "true" }}
          env:
          - name: "HOST_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "$(HOST_IP):4317"
          {{- end }}
          ports:
            - name: http
              containerPort: 4027
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.bankTransfer.resources | nindent 12 }}
      {{- with .Values.bankTransfer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bankTransfer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bankTransfer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bankTransfer.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
