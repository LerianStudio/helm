# =============================================================================
# Plugin BR Pix Switch — Multi-Component Helm Values
#
# This chart deploys all 10 components of the plugin-br-pix-switch app:
#
#   spi/api                  Single Person Interface (PIX SPI)
#   spi/systemplane/api      Runtime config plane for SPI
#   adapter-btg-mock/api     BTG provider mock (dev/staging only)
#   dict/hub/api             DICT hub (key directory operations)
#   dict/hub/vsync           DICT verification sync worker
#   dict/proxy/api           DICT proxy to BCB
#   dict/systemplane/api     Runtime config plane for DICT
#   cob/hub/api              COB hub (BR Code / charge operations)
#   cob/proxy/api            COB proxy to BCB
#   cob/systemplane/api      Runtime config plane for COB
#
# Each component is independently enabled/disabled and configured.
# All components share the same Docker image (parameterized by APP_NAME +
# COMPONENT_NAME build args), so image.tag is shared by default but can be
# overridden per component.
#
# Pattern adapted from helm/charts/plugin-access-manager and helm/charts/midaz.
# =============================================================================

# Override the chart name in resource names
nameOverride: ""
fullnameOverride: ""

# Override the namespace where resources are created. Defaults to
# .Release.Namespace (the -n flag passed to helm install).
namespaceOverride: ""

# =============================================================================
# GLOBAL DEFAULTS — applied to all components unless overridden in their block
# =============================================================================
global:
  # -- Image pull secrets propagated to every component
  imagePullSecrets: []
  # -- Default image config (each component can override)
  image:
    repository: ghcr.io/lerianstudio/plugin-br-pix-switch
    pullPolicy: IfNotPresent
    # tag: defaults to .Chart.AppVersion when empty

  # -- External PostgreSQL bootstrap. When enabled, a pre-install/pre-upgrade
  # Job runs for each database in `databases`, creating the role + database +
  # grants if they don't exist. Idempotent.
  externalPostgresDefinitions:
    enabled: false
    # -- Databases to create (one Job per database). pix-switch needs 3.
    databases:
      - pix-spi
      - pix-dict
      - pix-cob
    connection:
      host: ""
      port: "5432"
    # -- Postgres admin credentials (used to create role+databases)
    postgresAdminLogin:
      useExistingSecret:
        name: ""   # if set, reads DB_USER_ADMIN/DB_ADMIN_PASSWORD keys
      username: "postgres"
      password: ""   # required when useExistingSecret.name is empty
    # -- Application credentials for the role created by the bootstrap Job
    pixswitchCredentials:
      useExistingSecret:
        name: ""   # if set, reads DB_PASSWORD_PIXSWITCH key
      username: "pixswitch"
      password: ""

  # -- External MongoDB bootstrap. Creates the pixswitch user with readWrite
  # roles on pix-dict and pix-cob databases (used by dict-hub and cob-hub).
  externalMongoDefinitions:
    enabled: false
    connection:
      host: ""
      port: "27017"
    mongoAdminLogin:
      useExistingSecret:
        name: ""   # if set, reads MONGO_ROOT_USER/MONGO_ROOT_PASSWORD keys
      username: "root"
      password: ""
    pixswitchCredentials:
      useExistingSecret:
        name: ""   # if set, reads MONGO_APP_USER/MONGO_APP_PASSWORD keys
      username: "pixswitch"
      password: ""
      # -- Roles granted to the pixswitch user
      roles:
        - role: readWrite
          db: pix-dict
        - role: readWrite
          db: pix-cob

# =============================================================================
# COMPONENTS
# Each component renders its own Deployment, Service, ConfigMap, Secret, HPA,
# PDB, and (when ingress.enabled=true) Ingress.
# =============================================================================

# -----------------------------------------------------------------------------
# spi/api — PIX SPI service
# -----------------------------------------------------------------------------
spi:
  enabled: true
  name: "spi"
  description: "PIX SPI (Single Person Interface)"
  replicaCount: 1
  revisionHistoryLimit: 10

  image:
    # Inherits global.image.repository / pullPolicy when not set
    repository: ""
    pullPolicy: ""
    tag: ""

  imagePullSecrets: []

  podAnnotations: {}
  podSecurityContext: {}
  securityContext:
    runAsGroup: 1000
    runAsUser: 1000
    runAsNonRoot: true
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true

  pdb:
    enabled: true
    minAvailable: 0
    maxUnavailable: 1

  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  service:
    type: ClusterIP
    port: 4101

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  readinessProbe: {}
  livenessProbe: {}

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  configmap:
    APPLICATION_NAME: "pix-spi"
    SERVER_ADDRESS: ":4101"
    LOG_LEVEL: "info"
    ENV_NAME: "development"
    DEPLOYMENT_MODE: "local"
    REQUEST_TIMEOUT_SEC: "30"
    TELEMETRY_ENABLED: "true"
    OTEL_RESOURCE_SERVICE_NAME: "pix-spi"
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/plugin-br-pix-switch"
    OTEL_RESOURCE_SERVICE_VERSION: ""
    OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: "development"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_URL: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"
    LICENSE_ORGANIZATION_IDS: "global"
    # Postgres (full DSN — pix apps use DATABASE_URL, not DB_HOST/DB_PORT/...)
    DATABASE_URL: ""
    SYSTEMPLANE_POSTGRES_DSN: ""
    # Single-tenant identity
    ORGANIZATION_ID: ""
    ISPB: ""
    # Sibling services
    ADAPTER_BASE_URL: "http://plugin-br-pix-switch-adapter-btg-mock:4103"
    DICT_BASE_URL: "http://plugin-br-pix-switch-dict-hub:4104"
    COB_BASE_URL: "http://plugin-br-pix-switch-cob-hub:4108"
    # Upstream integrations
    CRM_BASE_URL: ""
    CRM_CLIENT_ID: ""
    CRM_ORGANIZATION_ID: ""
    DICT_CLIENT_ID: ""
    COB_CLIENT_ID: ""
    MIDAZ_BASE_URL: ""
    MIDAZ_CLIENT_ID: ""
    MIDAZ_LEDGER_ID: ""
    MIDAZ_ORGANIZATION_ID: ""
    # Cache
    VALKEY_URL: ""
    # Multi-tenant
    MULTI_TENANT_ENABLED: "false"
    MULTI_TENANT_URL: ""

  secrets:
    LICENSE_KEY: ""
    DICT_CLIENT_SECRET: ""
    COB_CLIENT_SECRET: ""
    CRM_CLIENT_SECRET: ""
    MIDAZ_CLIENT_SECRET: ""
    MULTI_TENANT_API_KEY: ""

  useExistingSecret: false
  existingSecretName: ""

  extraEnvVars: {}

