apiVersion: v2
name: lerian-common-helm
description: >-
  Lerian shared Helm library. Factors the logic duplicated across the product
  charts into render-equivalent helpers consumed via `include`: env contracts
  (service discovery, streaming, multi-tenant), in-cluster host derivation, and
  (progressively) naming/labels, securityContext, probes and workload
  boilerplate. Library chart — renders nothing on its own. Adopting it is a
  refactor, not a breaking change: every helper reproduces the existing rendered
  output.
type: library
version: 1.0.0
appVersion: "1.0.0"
annotations:
  lerian.studio/chart-type: library
home: https://github.com/LerianStudio/helm
icon: https://avatars.githubusercontent.com/u/148895005?s=200&v=4
maintainers:
  - name: "Lerian Studio"
    email: "support@lerian.studio"
keywords:
  - lerian
  - library
  - common
  - service-discovery
