# Default values
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

pixSwitch:
  replicaCount: 1
  name: "plugin-br-pix-switch"
  description: "Plugin BR Pix Switch for Midaz"
  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10
  image:
    # -- Repository for the container image
    repository: ghcr.io/lerianstudio/plugin-br-pix-switch
    # -- Image pull policy
    pullPolicy: Always
    # -- Image tag used for deployment
    tag: "1.8.0-beta.2"
  # -- Secrets for pulling images from a private registry
  imagePullSecrets: {}
  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""
  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Additional ingress annotations
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []
  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- HTTP service port
    port: 4000
    # -- gRPC service port
    grpcPort: 7001
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  podSecurityContext: {}
  # fsGroup: 2000

  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Minimum number of available pods
    minAvailable: 0
    # -- Annotations for PodDisruptionBudget
    annotations: {}
  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 200m
      memory: 256Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 3
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}
  # -- Tolerations for scheduling on tainted nodes
  tolerations: {}
  # -- Affinity rules for pod scheduling
  affinity: {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: midaz.io/owner
  #         operator: In
  #         values:
  #         - midaz
  # podAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #   - labelSelector:
  #       matchExpressions: []
  #     topologyKey: kubernetes.io/hostname

  # -- ConfigMap for environment variables and configurations
  # -- All environment variables are declared in the templates/configmap.yaml
  # @default -- templates/configmap.yaml
  configmap:
    # Application
    ENV_NAME: "development"
    VERSION: "1.8.0-beta.2"
    SERVER_PORT: "4000"
    LOG_LEVEL: "info"

    # gRPC / Protobuf
    PROTO_PORT: "7001"

    # Auth
    PLUGIN_AUTH_ENABLED: "false"
    PLUGIN_AUTH_ADDRESS: ""

    # License
    ORGANIZATION_IDS: "global"

    # PostgreSQL Primary
    DB_HOST: ""
    DB_USER: "pixswitch"
    DB_NAME: "pixswitch"
    DB_PORT: "5432"
    DB_SSL_MODE: "disable"

    # PostgreSQL Replica
    DB_REPLICA_HOST: ""
    DB_REPLICA_USER: "pixswitch"
    DB_REPLICA_NAME: "pixswitch"
    DB_REPLICA_PORT: "5432"
    DB_REPLICA_SSL_MODE: "disable"

    # Valkey (Redis-compatible)
    VALKEY_HOST: ""
    VALKEY_PORT: "6379"
    VALKEY_USER: "pixswitch"

    # Swagger
    SWAGGER_TITLE: "Plugin BR Pix Switch"
    SWAGGER_DESCRIPTION: "Plugin BR Pix Switch API"
    SWAGGER_HOST: ""
    SWAGGER_BASE_PATH: "/"
    SWAGGER_SCHEMES: "http"
    SWAGGER_LEFT_DELIMITER: "{{"
    SWAGGER_RIGHT_DELIMITER: "}}"

    # OpenTelemetry
    OTEL_RESOURCE_SERVICE_NAME: "plugin-br-pix-switch"
    OTEL_LIBRARY_NAME: "github.com/LerianStudio/plugin-br-pix-switch"
    OTEL_RESOURCE_SERVICE_VERSION: "1.8.0-beta.2"
    OTEL_RESOURCE_DEPLOYMENT_ENVIRONMENT: "development"
    OTEL_EXPORTER_OTLP_ENDPOINT_PORT: "4317"
    OTEL_EXPORTER_OTLP_ENDPOINT: "midaz-otel-lgtm:4317"
    ENABLE_TELEMETRY: "true"
  # -- Extra environment variables
  extraEnvVars: {}
  # -- Secrets for storing sensitive data
  # -- All secrets are declared in the templates/secrets.yaml
  # @default -- templates/secrets.yaml
  secrets:
    # License Configuration
    LICENSE_KEY: ""
    # Database Configuration
    DB_PASSWORD: ""
    DB_REPLICA_PASSWORD: ""
    # Valkey Configuration
    VALKEY_PASSWORD: ""
  useExistingSecrets: false
  existingSecretName: ""

postgresql:
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamisecure/postgresql
    tag: "latest"
  enabled: true
  external: false
  auth:
    enabled: true
    enablePostgresUser: false
    username: "pixswitch"
    password: "lerian"
    database: "pixswitch"
    persistence:
      size: 8Gi
    resourcesPreset: large
    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      wal_keep_size = 512MB
      max_replication_slots = 20
    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "30"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"

valkey:
  enabled: true
  global:
    security:
      allowInsecureImages: true
  image:
    repository: bitnamisecure/valkey
    tag: "latest"
  architecture: standalone
  auth:
    enabled: false

otel-collector-lerian:
  enabled: true
