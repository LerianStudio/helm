apiVersion: v2
name: flowker-helm
description: A Helm chart for Flowker - Workflow orchestration platform for
  financial validation
type: application
annotations:
  lerian.studio/chart-type: multi-component
home: https://github.com/LerianStudio/flowker
sources:
  - https://github.com/LerianStudio/flowker
maintainers:
  - name: "Lerian Studio"
    email: "support@lerian.studio"
version: 3.1.1
appVersion: "1.2.0-beta.82"
keywords:
  - flowker
  - workflow
  - orchestration
  - financial-validation
  - lerian
icon: https://avatars.githubusercontent.com/u/148895005?s=200&v=4
dependencies:
  - name: mongodb
    version: "16.4.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled
  - name: valkey
    version: "0.7.4"
    repository: "https://valkey.io/valkey-helm"
    condition: valkey.enabled
