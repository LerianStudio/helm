{{- if and .Values.dictProxy.enabled (not .Values.dictProxy.useExistingSecret) }}
{{- $component := "dict-proxy" }}
{{- $values := .Values.dictProxy }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-br-pix-switch.componentFullname" (dict "context" $ "component" $component) }}
  labels:
    {{- include "plugin-br-pix-switch.labels" (dict "context" $ "component" $component) | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := $values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
