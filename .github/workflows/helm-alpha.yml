name: Helm Alpha Release

# Thin caller. The logic lives in the reusable helm-alpha-release.yml of
# github-actions-shared-workflows. Publishes a disposable alpha release of a
# chart to the isolated package ghcr.io/lerianstudio/alpha/<chart> (TTL ~3 days
# via helm-alpha-cleanup.yml). Authenticates with the built-in GITHUB_TOKEN.
#
# Run it via "Run workflow" selecting YOUR working branch — the checkout uses
# that ref, so charts that only exist on the branch also work.

on:
  workflow_dispatch:
    inputs:
      chart:
        description: "Chart (dir under charts/) — may be a new chart on your branch"
        required: true
        type: string
      dry_run:
        description: "Package and validate, but do not publish"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  alpha:
    permissions:
      contents: read # checkout the chart (in the reusable)
      packages: write # push the alpha chart to GHCR
    # Testing: @develop. Once stable: @vX.Y.Z.
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/helm-alpha-release.yml@develop
    with:
      chart: ${{ inputs.chart }}
      dry_run: ${{ inputs.dry_run }}
