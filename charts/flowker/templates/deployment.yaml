{{- if .Values.flowker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flowker.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "flowker.labels" (dict "context" . "component" .Values.flowker.name "name" .Values.flowker.name) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.flowker.revisionHistoryLimit | default 10 }}
  strategy:
    type: {{ .Values.flowker.deploymentUpdate.type }}
    {{- if eq .Values.flowker.deploymentUpdate.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.flowker.deploymentUpdate.maxSurge }}
      maxUnavailable: {{ .Values.flowker.deploymentUpdate.maxUnavailable }}
    {{- end }}
  {{- if not .Values.flowker.autoscaling.enabled }}
  replicas: {{ .Values.flowker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "flowker.selectorLabels" (dict "context" . "name" .Values.flowker.name) | nindent 6 }}
  template:
    metadata:
      {{- with .Values.flowker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "flowker.labels" (dict "context" . "component" .Values.flowker.name "name" .Values.flowker.name) | nindent 8 }}
    spec:
      {{- with .Values.flowker.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flowker.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.flowker.podSecurityContext | nindent 8 }}
      initContainers:
        {{- include "flowker.waitForMongoInit" (dict "context" $) | nindent 8 }}
      containers:
        - name: {{ include "flowker.fullname" . }}
          securityContext:
            {{- toYaml .Values.flowker.securityContext | nindent 12 }}
          image: "{{ .Values.flowker.image.repository }}:{{ .Values.flowker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.flowker.image.pullPolicy }}
          envFrom:
          - secretRef:
              name: {{ if .Values.flowker.useExistingSecret }}{{ .Values.flowker.existingSecretName }}{{ else }}{{ include "flowker.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "flowker.fullname" . }}
          env:
          {{- $secretName := ternary .Values.flowker.existingSecretName (include "flowker.fullname" .) .Values.flowker.useExistingSecret }}
          {{- include "flowker.mongoEnv" (dict "context" $ "secretName" $secretName) | nindent 10 }}
          {{- include "flowker.otelHostEnv" (dict "context" $) | nindent 10 }}
          ports:
            - name: http
              containerPort: {{ .Values.flowker.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.flowker.livenessProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.flowker.livenessProbe.initialDelaySeconds | default 15 }}
            periodSeconds: {{ .Values.flowker.livenessProbe.periodSeconds | default 20 }}
            timeoutSeconds: {{ .Values.flowker.livenessProbe.timeoutSeconds | default 5 }}
            successThreshold: {{ .Values.flowker.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.flowker.livenessProbe.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.flowker.readinessProbe.path | default "/readyz" }}
              port: http
            initialDelaySeconds: {{ .Values.flowker.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.flowker.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.flowker.readinessProbe.timeoutSeconds | default 5 }}
            successThreshold: {{ .Values.flowker.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.flowker.readinessProbe.failureThreshold | default 3 }}
          resources:
            {{- toYaml .Values.flowker.resources | nindent 12 }}
      {{- with .Values.flowker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.flowker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.flowker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
