{{- if .Values.bankTransfer.enabled }}
{{- if not .Values.bankTransfer.useExistingSecret }}
{{- $multiTenantEnabled := eq (toString (.Values.bankTransfer.configmap.MULTI_TENANT_ENABLED | default "false")) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bank-transfer.fullname" . }}
  namespace: {{ include "global.namespace" . }}
type: Opaque
stringData:
  # Infra passwords (PostgreSQL / Valkey / MongoDB) are single-sourced from the bundled Bitnami
  # subchart Secrets and read via secretKeyRef on the deployment; see
  # docs/helm-chart-standard.md "Single-Source Infra Secrets". They are written here only for an
  # EXTERNAL infra component without an <subchart>.auth.existingSecret.
  {{- $pg := .Values.postgresql | default dict }}
  {{- $pgAuth := $pg.auth | default dict }}
  {{- if and (not (and (ne (toString $pg.enabled) "false") (not $pg.external))) (not $pgAuth.existingSecret) .Values.bankTransfer.secrets.POSTGRES_PASSWORD }}
  POSTGRES_PASSWORD: {{ .Values.bankTransfer.secrets.POSTGRES_PASSWORD | quote }}
  {{- if .Values.bankTransfer.secrets.POSTGRES_REPLICA_PASSWORD }}
  POSTGRES_REPLICA_PASSWORD: {{ .Values.bankTransfer.secrets.POSTGRES_REPLICA_PASSWORD | quote }}
  {{- end }}
  {{- end }}

  # Redis/Valkey Password (external-only; bundled valkey is read from its subchart Secret)
  {{- $vk := .Values.valkey | default dict }}
  {{- $vkAuth := $vk.auth | default dict }}
  {{- if and (not (and (ne (toString $vk.enabled) "false") (not $vk.external) $vkAuth.enabled)) (not $vkAuth.existingSecret) .Values.bankTransfer.secrets.REDIS_PASSWORD }}
  REDIS_PASSWORD: {{ .Values.bankTransfer.secrets.REDIS_PASSWORD | quote }}
  {{- end }}

  # Multi-Tenant Secrets
  {{- if .Values.bankTransfer.secrets.MULTI_TENANT_REDIS_PASSWORD }}
  MULTI_TENANT_REDIS_PASSWORD: {{ .Values.bankTransfer.secrets.MULTI_TENANT_REDIS_PASSWORD | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.MULTI_TENANT_SERVICE_API_KEY }}
  MULTI_TENANT_SERVICE_API_KEY: {{ .Values.bankTransfer.secrets.MULTI_TENANT_SERVICE_API_KEY | quote }}
  {{- end }}
  
  # MongoDB: single-sourced. MONGO_PASSWORD is read from the bundled mongodb subchart Secret
  # (<release>-mongodb, key mongodb-passwords) and MONGO_URI is assembled on the deployment via
  # $(MONGO_PASSWORD) expansion (the app is URI-only) — see the bank-transfer.mongoEnv helper and
  # docs/helm-chart-standard.md. MONGO_PASSWORD is written here only for an EXTERNAL MongoDB
  # without mongodb.auth.existingSecret (the deployment then reads it from this Secret and builds
  # the URI the same way). An explicit bankTransfer.secrets.MONGO_URI override still wins.
  {{- $mongo := .Values.mongodb | default dict }}
  {{- $mongoAuth := $mongo.auth | default dict }}
  {{- if and (not (and (ne (toString $mongo.enabled) "false") (not $mongo.external))) (not $mongoAuth.existingSecret) .Values.bankTransfer.secrets.MONGO_PASSWORD }}
  MONGO_PASSWORD: {{ .Values.bankTransfer.secrets.MONGO_PASSWORD | quote }}
  {{- $namespace := include "global.namespace" . }}
  {{- if not $multiTenantEnabled }}
  # MongoDB Password and URI — single-tenant only.
  # MT mode resolves per-tenant Mongo via tenant-manager.
  {{- if .Values.bankTransfer.secrets.MONGO_URI }}
  MONGO_URI: {{ .Values.bankTransfer.secrets.MONGO_URI | quote }}
  {{- else }}
  MONGO_URI: {{ printf "mongodb://bank_transfer:%s@%s-mongodb.%s.svc.cluster.local:27017/?authSource=admin" (.Values.bankTransfer.secrets.MONGO_PASSWORD | urlquery) .Release.Name $namespace | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.MONGO_TLS_CA_CERT }}
  MONGO_TLS_CA_CERT: {{ .Values.bankTransfer.secrets.MONGO_TLS_CA_CERT | quote }}
  {{- end }}
  {{- end }}

  # License Key
  {{- if .Values.bankTransfer.secrets.LICENSE_KEY }}
  LICENSE_KEY: {{ .Values.bankTransfer.secrets.LICENSE_KEY | quote }}
  {{- end }}

  # CRM Outbound M2M Credentials (optional - when CRM_AUTH_ENABLED=true)
  {{- if .Values.bankTransfer.secrets.CRM_CLIENT_ID }}
  CRM_CLIENT_ID: {{ .Values.bankTransfer.secrets.CRM_CLIENT_ID | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.CRM_CLIENT_SECRET }}
  CRM_CLIENT_SECRET: {{ .Values.bankTransfer.secrets.CRM_CLIENT_SECRET | quote }}
  {{- end }}

  # Fees Outbound M2M Credentials (optional - when FEES_AUTH_ENABLED=true)
  {{- if .Values.bankTransfer.secrets.FEES_CLIENT_ID }}
  FEES_CLIENT_ID: {{ .Values.bankTransfer.secrets.FEES_CLIENT_ID | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.FEES_CLIENT_SECRET }}
  FEES_CLIENT_SECRET: {{ .Values.bankTransfer.secrets.FEES_CLIENT_SECRET | quote }}
  {{- end }}

  # JD SPB Credentials
  {{- if .Values.bankTransfer.secrets.JD_USER_CODE }}
  JD_USER_CODE: {{ .Values.bankTransfer.secrets.JD_USER_CODE | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.JD_PASSWORD }}
  JD_PASSWORD: {{ .Values.bankTransfer.secrets.JD_PASSWORD | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.JD_PRIVATE_KEY_PEM }}
  JD_PRIVATE_KEY_PEM: {{ .Values.bankTransfer.secrets.JD_PRIVATE_KEY_PEM | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.JD_PUBLIC_KEY_PEM }}
  JD_PUBLIC_KEY_PEM: {{ .Values.bankTransfer.secrets.JD_PUBLIC_KEY_PEM | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.JD_PRIVATE_KEY_KEYINFO }}
  JD_PRIVATE_KEY_KEYINFO: {{ .Values.bankTransfer.secrets.JD_PRIVATE_KEY_KEYINFO | quote }}
  {{- end }}

  # Encryption Keys
  # The application expects hex-encoded 32-byte AES-256 keys (64 hex characters).
  # Values.bankTransfer.secrets should provide hex-encoded keys directly.
  JD_INCOMING_RAW_XML_ENCRYPTION_KEY: {{ required "bankTransfer.secrets.JD_INCOMING_RAW_XML_ENCRYPTION_KEY is required" .Values.bankTransfer.secrets.JD_INCOMING_RAW_XML_ENCRYPTION_KEY | quote }}
  RECIPIENT_DETAILS_ENCRYPTION_KEY: {{ required "bankTransfer.secrets.RECIPIENT_DETAILS_ENCRYPTION_KEY is required" .Values.bankTransfer.secrets.RECIPIENT_DETAILS_ENCRYPTION_KEY | quote }}

  # Midaz M2M Credentials (optional)
  {{- if .Values.bankTransfer.secrets.MIDAZ_CLIENT_ID }}
  MIDAZ_CLIENT_ID: {{ .Values.bankTransfer.secrets.MIDAZ_CLIENT_ID | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.MIDAZ_CLIENT_SECRET }}
  MIDAZ_CLIENT_SECRET: {{ .Values.bankTransfer.secrets.MIDAZ_CLIENT_SECRET | quote }}
  {{- end }}

  # RabbitMQ Credentials (optional - when RABBITMQ_ENABLED=true)
  {{- if .Values.bankTransfer.secrets.RABBITMQ_PASSWORD }}
  RABBITMQ_PASSWORD: {{ .Values.bankTransfer.secrets.RABBITMQ_PASSWORD | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.RABBITMQ_EVENT_SIGNING_SECRET }}
  RABBITMQ_EVENT_SIGNING_SECRET: {{ .Values.bankTransfer.secrets.RABBITMQ_EVENT_SIGNING_SECRET | quote }}
  {{- end }}

  # Webhook Secrets (optional - when WEBHOOK_ENABLED=true)
  {{- if .Values.bankTransfer.secrets.WEBHOOK_SIGNING_SECRET }}
  WEBHOOK_SIGNING_SECRET: {{ .Values.bankTransfer.secrets.WEBHOOK_SIGNING_SECRET | quote }}
  {{- end }}
  {{- if .Values.bankTransfer.secrets.WEBHOOK_BROKER_EVENT_SIGNING_SECRET }}
  WEBHOOK_BROKER_EVENT_SIGNING_SECRET: {{ .Values.bankTransfer.secrets.WEBHOOK_BROKER_EVENT_SIGNING_SECRET | quote }}
  {{- end }}

{{- end }}
{{- end }}
{{- end }}
