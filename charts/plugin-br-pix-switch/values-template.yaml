# Production values template for plugin-br-pix-switch (chart 2.0.0-beta.1+)
#
# Override only the fields you need to change from values.yaml defaults.
# All 10 components are enabled by default except adapter-btg-mock; disable
# any component by setting its `enabled: false`.

# Global image override (applies to every component unless overridden per-component)
global:
  image:
    repository: ghcr.io/lerianstudio/plugin-br-pix-switch
    tag: ""   # required: set to the released tag (e.g. "1.0.0-beta.51")
    pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-credential

# ------------------------------------------------------------
# spi/api — PIX SPI (single-tenant identity REQUIRED)
# ------------------------------------------------------------
spi:
  enabled: true
  configmap:
    DEPLOYMENT_MODE: "saas"            # or "byoc" / "local"
    ENV_NAME: "production"
    PLUGIN_AUTH_ENABLED: "true"
    PLUGIN_AUTH_URL: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"
    LICENSE_ORGANIZATION_IDS: "global"
    ORGANIZATION_ID: "<your-org-id>"
    ISPB: "<8-digit-ispb>"
    ADAPTER_BASE_URL: "http://plugin-br-pix-switch-adapter-btg-mock:4103"
    DICT_BASE_URL: "http://plugin-br-pix-switch-dict-hub:4104"
    COB_BASE_URL: "http://plugin-br-pix-switch-cob-hub:4108"
    MIDAZ_BASE_URL: "http://midaz-onboarding.midaz.svc.cluster.local:3000"
    MIDAZ_LEDGER_ID: ""
    MIDAZ_ORGANIZATION_ID: ""
    MIDAZ_CLIENT_ID: ""
    DICT_CLIENT_ID: ""
    COB_CLIENT_ID: ""
    CRM_BASE_URL: ""
    CRM_CLIENT_ID: ""
    CRM_ORGANIZATION_ID: ""
  secrets:
    DATABASE_URL: "postgres://pixswitch:<password>@postgres-host:5432/pix-spi?sslmode=require"
    SYSTEMPLANE_POSTGRES_DSN: "postgres://pixswitch:<password>@postgres-host:5432/pix-spi?sslmode=require"
    VALKEY_URL: "redis://default:<password>@valkey-host:6379/0"
    LICENSE_KEY: ""                   # use Vault / external-secret reference
    DICT_CLIENT_SECRET: ""
    COB_CLIENT_SECRET: ""
    CRM_CLIENT_SECRET: ""
    MIDAZ_CLIENT_SECRET: ""

# ------------------------------------------------------------
# spi/systemplane/api
# ------------------------------------------------------------
spiSystemplane:
  enabled: true
  configmap: {}
  secrets:
    DATABASE_URL: "postgres://pixswitch:<password>@postgres-host:5432/pix-spi?sslmode=require"
    SYSTEMPLANE_POSTGRES_DSN: "postgres://pixswitch:<password>@postgres-host:5432/pix-spi?sslmode=require"
    LICENSE_KEY: ""
    SYSTEMPLANE_SECRET_MASTER_KEY: ""

# ------------------------------------------------------------
# adapter-btg-mock (disabled in production!)
# ------------------------------------------------------------
adapterBtgMock:
  enabled: false

# ------------------------------------------------------------
# dict/hub/api — DICT hub
# ------------------------------------------------------------
dictHub:
  enabled: true
  configmap:
    DEPLOYMENT_MODE: "saas"
    PLUGIN_AUTH_ENABLED: "true"
    PLUGIN_AUTH_URL: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"
    LICENSE_ORGANIZATION_IDS: "global"
    ORGANIZATION_ID: "<your-org-id>"
    ISPB: "<8-digit-ispb>"
    ADAPTER_BASE_URL: "http://plugin-br-pix-switch-adapter-btg-mock:4103"
    KEY_CACHE_TTL_SEC: "60"
    MONGO_DB_NAME: "pix-dict"
  secrets:
    DATABASE_URL: "postgres://pixswitch:<password>@postgres-host:5432/pix-dict?sslmode=require"
    SYSTEMPLANE_POSTGRES_DSN: "postgres://pixswitch:<password>@postgres-host:5432/pix-dict?sslmode=require"
    MONGO_URL: "mongodb://user:<password>@mongo-host:27017/?authSource=admin"
    VALKEY_URL: "redis://default:<password>@valkey-host:6379/0"
    LICENSE_KEY: ""
    CRM_CLIENT_SECRET: ""

# ------------------------------------------------------------
# dict/hub/vsync — singleton background worker
# ------------------------------------------------------------
dictHubVsync:
  enabled: true
  configmap:
    VSYNC_ENABLED: "true"
  secrets:
    DATABASE_URL: "postgres://pixswitch:<password>@postgres-host:5432/pix-dict?sslmode=require"
    VALKEY_URL: "redis://default:<password>@valkey-host:6379/0"
    # TLS-only: amqps:// on 5671. lib-commons v5.7.0 validates the broker cert
    # against the system trust store (a private CA needs an app-code change).
    RABBITMQ_URI: "amqps://pixswitch:<password>@rabbitmq-host:5671/"
    LICENSE_KEY: ""

# ------------------------------------------------------------
# dict/proxy/api
# ------------------------------------------------------------
dictProxy:
  enabled: true
  configmap:
    DEPLOYMENT_MODE: "saas"
  secrets:
    LICENSE_KEY: ""

# ------------------------------------------------------------
# dict/systemplane/api
# ------------------------------------------------------------
dictSystemplane:
  enabled: true
  configmap: {}
  secrets:
    DATABASE_URL: "postgres://pixswitch:<password>@postgres-host:5432/pix-dict?sslmode=require"
    SYSTEMPLANE_POSTGRES_DSN: "postgres://pixswitch:<password>@postgres-host:5432/pix-dict?sslmode=require"
    LICENSE_KEY: ""
    SYSTEMPLANE_SECRET_MASTER_KEY: ""

# ------------------------------------------------------------
# cob/hub/api — COB hub
# ------------------------------------------------------------
cobHub:
  enabled: true
  configmap:
    DEPLOYMENT_MODE: "saas"
    PLUGIN_AUTH_ENABLED: "true"
    PLUGIN_AUTH_URL: "http://plugin-access-manager-auth.midaz-plugins.svc.cluster.local:4000"
    LICENSE_ORGANIZATION_IDS: "global"
    ORGANIZATION_ID: "<your-org-id>"
  secrets:
    DATABASE_URL: "postgres://pixswitch:<password>@postgres-host:5432/pix-cob?sslmode=require"
    SYSTEMPLANE_POSTGRES_DSN: "postgres://pixswitch:<password>@postgres-host:5432/pix-cob?sslmode=require"
    LICENSE_KEY: ""

# ------------------------------------------------------------
# cob/proxy/api
# ------------------------------------------------------------
cobProxy:
  enabled: true
  configmap:
    DEPLOYMENT_MODE: "saas"
  secrets:
    LICENSE_KEY: ""

# ------------------------------------------------------------
# cob/systemplane/api
# ------------------------------------------------------------
cobSystemplane:
  enabled: true
  configmap: {}
  secrets:
    DATABASE_URL: "postgres://pixswitch:<password>@postgres-host:5432/pix-cob?sslmode=require"
    SYSTEMPLANE_POSTGRES_DSN: "postgres://pixswitch:<password>@postgres-host:5432/pix-cob?sslmode=require"
    LICENSE_KEY: ""
    SYSTEMPLANE_SECRET_MASTER_KEY: ""

# ------------------------------------------------------------
# Disable in-cluster subcharts (use external infra in production)
# ------------------------------------------------------------
postgresql:
  enabled: false
valkey:
  enabled: false
rabbitmq:
  enabled: false
mongodb:
  enabled: false
otel-collector-lerian:
  enabled: false
