# Template values for the br-spi (SPI / Pix rail) chart.
# Copy this file and fill in the values for your environment. Postgres and Redis
# are external on the target environments — point every component at the shared
# `brspi` database and set STREAMING_BROKERS for the producers (core + spi).

imagePullSecrets:
  - name: ghcr-credential

core:
  image:
    tag: ""  # optional — defaults to Chart.appVersion
  configmap:
    ENV_NAME: "development"
    POSTGRES_HOST: ""            # REQUIRED — shared brspi Postgres host
    POSTGRES_USER: "brspi"
    POSTGRES_DB: "brspi"
    STREAMING_BROKERS: ""        # REQUIRED when STREAMING_ENABLED=true (fails closed otherwise)
    STREAMING_CLOUDEVENTS_SOURCE: "studio.lerian.core"
  secrets:
    POSTGRES_PASSWORD: ""        # REQUIRED for external Postgres (or use useExistingSecret)

spi:
  configmap:
    ENV_NAME: "development"
    POSTGRES_HOST: ""            # REQUIRED — same host as core
    STREAMING_BROKERS: ""        # REQUIRED — same brokers as core
    STREAMING_CLOUDEVENTS_SOURCE: "studio.lerian.spi"
    BACEN_SPI_ENDPOINT: ""       # dev: http:// / mock accepted; set the real endpoint for homolog/prod
  secrets:
    POSTGRES_PASSWORD: ""

brcode:
  configmap:
    ENV_NAME: "development"
    POSTGRES_HOST: ""            # REQUIRED
  secrets:
    POSTGRES_PASSWORD: ""

dict:
  configmap:
    ENV_NAME: "development"
    POSTGRES_HOST: ""            # REQUIRED
    REDIS_HOST: ""               # REQUIRED for dict — Redis host:port
  secrets:
    POSTGRES_PASSWORD: ""
    REDIS_PASSWORD: ""           # set if the external Redis requires auth

migrations:
  enabled: true
  postgres:
    host: ""                     # defaults to core.configmap.POSTGRES_HOST
    password: ""                 # defaults to core.secrets.POSTGRES_PASSWORD

# External infra (default). Enable only for a self-contained install.
postgresql:
  enabled: false
  external: true

valkey:
  enabled: false
  external: true
