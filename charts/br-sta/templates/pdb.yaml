{{- if .Values.app.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "br-sta.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "br-sta.labels" (dict "context" .) | nindent 4 }}
  {{- with .Values.app.pdb.annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.app.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.app.pdb.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.app.pdb.minAvailable | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "br-sta.selectorLabels" (dict "context" .) | nindent 6 }}
{{- end }}
