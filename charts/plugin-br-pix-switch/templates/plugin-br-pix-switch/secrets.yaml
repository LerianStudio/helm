apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-br-pix-switch.fullname" . }}
  labels:
    {{- include "plugin-br-pix-switch.labels" (dict "context" . "name" .Values.pixSwitch.name ) | nindent 4 }}
type: Opaque
data:
  # -- Default sensitive variables for the plugin-br-pix-switch
  # License Configuration
  LICENSE_KEY: {{ .Values.pixSwitch.secrets.LICENSE_KEY | default "" | b64enc | quote }}

  # Database Configuration
  DB_PASSWORD: {{ .Values.pixSwitch.secrets.DB_PASSWORD | default "lerian" | b64enc | quote }}
  DB_REPLICA_PASSWORD: {{ .Values.pixSwitch.secrets.DB_REPLICA_PASSWORD | default "lerian" | b64enc | quote }}

  # Valkey Configuration
  VALKEY_PASSWORD: {{ .Values.pixSwitch.secrets.VALKEY_PASSWORD | default "lerian" | b64enc | quote }}
