apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plugin-fees.fullname" . }}
  labels:
    {{- include "plugin-fees.labels" (dict "context" . "name" .Values.fees.name ) | nindent 4 }} 
data:
  # -- Default Environment variables for the plugin-fees
  ALLOW_INSECURE_TLS: {{ .Values.fees.configmap.ALLOW_INSECURE_TLS | default "true" | quote }}
  ENV_NAME: {{ .Values.fees.configmap.ENV_NAME | default "development" | quote }}
  APPLICATION_NAME: {{ .Values.fees.configmap.APPLICATION_NAME | default "plugin-fees" | quote }}
  DEPLOYMENT_MODE: {{ .Values.fees.configmap.DEPLOYMENT_MODE | default "local" | quote }}

  # APP
  SERVER_PORT: {{ .Values.fees.configmap.SERVER_PORT | default "4002" | quote }}
  SERVER_ADDRESS: {{ .Values.fees.configmap.SERVER_ADDRESS | default ":4002" | quote }}
  VERSION: {{ .Values.fees.image.tag | default .Chart.AppVersion | quote }}

  # READYZ
  READYZ_DEPENDENCY_TIMEOUT_SECONDS: {{ .Values.fees.configmap.READYZ_DEPENDENCY_TIMEOUT_SECONDS | default "1" | quote }}
  READYZ_LICENSE_TIMEOUT_SECONDS: {{ .Values.fees.configmap.READYZ_LICENSE_TIMEOUT_SECONDS | default "5" | quote }}
  READYZ_DRAIN_GRACE_SECONDS: {{ .Values.fees.configmap.READYZ_DRAIN_GRACE_SECONDS | default "10" | quote }}

  # Mongo DB
  MONGO_URI: {{ .Values.fees.configmap.MONGO_URI | default "mongodb" | quote }}
  MONGO_HOST: {{ .Values.fees.configmap.MONGO_HOST | default (include "plugin-fees.mongoHost" .) | quote }}
  MONGO_PORT: {{ .Values.fees.configmap.MONGO_PORT | default "27017" | quote }}
  MONGO_NAME: {{ .Values.fees.configmap.MONGO_NAME | default "plugin-fees-db" | quote }}
  MONGO_USER: {{ .Values.fees.configmap.MONGO_USER | default "plugin-fees" | quote }}
  MONGO_MAX_POOL_SIZE: {{ .Values.fees.configmap.MONGO_MAX_POOL_SIZE | default "1000" | quote }}
  MONGO_PARAMETERS: {{ .Values.fees.configmap.MONGO_PARAMETERS | default "" | quote }}
  MONGO_TLS_CA_CERT: {{ .Values.fees.configmap.MONGO_TLS_CA_CERT | default "" | quote }}
  MONGO_MIN_POOL_SIZE: {{ .Values.fees.configmap.MONGO_MIN_POOL_SIZE | default "10" | quote }}
  MONGO_MAX_CONN_IDLE_TIME_SECONDS: {{ .Values.fees.configmap.MONGO_MAX_CONN_IDLE_TIME_SECONDS | default "300" | quote }}

  # NETWORK
  TRUSTED_PROXIES: {{ .Values.fees.configmap.TRUSTED_PROXIES | default "" | quote }}
  
  # SWAGGER
  SWAGGER_TITLE: {{ .Values.fees.configmap.SWAGGER_TITLE | default "Plugin Fees" | quote }}
  SWAGGER_DESCRIPTION: {{ .Values.fees.configmap.SWAGGER_DESCRIPTION | default "Documentation for the plugins fees" | quote }}
  SWAGGER_VERSION: {{ .Values.fees.image.tag | default .Chart.AppVersion | quote }}
  SWAGGER_HOST: {{ .Values.fees.configmap.SWAGGER_HOST | default ":4002" | quote }}
  SWAGGER_BASE_PATH: {{ .Values.fees.configmap.SWAGGER_BASE_PATH | default "/" | quote }}
  SWAGGER_SCHEMES: {{ .Values.fees.configmap.SWAGGER_SCHEMES | default "http" | quote }}
  SWAGGER_LEFT_DELIMITER: {{ .Values.fees.configmap.SWAGGER_LEFT_DELIMITER | default "{{" | quote }}
  SWAGGER_RIGHT_DELIMITER: {{ .Values.fees.configmap.SWAGGER_RIGHT_DELIMITER | default "}}" | quote }}

  # LOG LEVEL
  LOG_LEVEL: {{ .Values.fees.configmap.LOG_LEVEL | default "debug" | quote }}

  # OPEN TELEMETRY
  {{- include "lerian-common.otel.env" (dict
        "name" .Values.fees.name
        "imageTag" .Values.fees.image.tag
        "appVersion" .Chart.AppVersion
        "configmap" .Values.fees.configmap
      ) | nindent 2 }}

  # AUTH
  PLUGIN_AUTH_ADDRESS: {{ .Values.fees.configmap.PLUGIN_AUTH_ADDRESS | default "plugin-auth" | quote }}
  PLUGIN_AUTH_ENABLED: {{ .Values.fees.configmap.PLUGIN_AUTH_ENABLED | default "false" | quote }}

  # MIDAZ COMMUNICATION
  CLIENT_ID: {{ .Values.fees.configmap.CLIENT_ID | default "ac56c81d4d6d95c0ac12" | quote }}
  MIDAZ_ONBOARDING_URL: {{ .Values.fees.configmap.MIDAZ_ONBOARDING_URL | default "http://midaz-onboarding.midaz.svc.cluster.local:3000/v1/" | quote }}
  MIDAZ_TRANSACTION_URL: {{ .Values.fees.configmap.MIDAZ_TRANSACTION_URL | default "http://midaz-transaction.midaz.svc.cluster.local:3002/v1/" | quote }}

  # CORS & RATE LIMIT
  CORS_ALLOW_ORIGINS: {{ .Values.fees.configmap.CORS_ALLOW_ORIGINS | default "http://localhost:3000" | quote }}
  RATE_LIMIT_MAX: {{ .Values.fees.configmap.RATE_LIMIT_MAX | default "100" | quote }}
  RATE_LIMIT_WINDOW_SECONDS: {{ .Values.fees.configmap.RATE_LIMIT_WINDOW_SECONDS | default "60" | quote }}
  RATE_LIMIT_ENABLED: {{ .Values.fees.configmap.RATE_LIMIT_ENABLED | default "true" | quote }}

  # CURRENCY
  DEFAULT_CURRENCY: {{ .Values.fees.configmap.DEFAULT_CURRENCY | default "BRL" | quote }}

  # CACHE
  PACKAGE_CACHE_ENABLED: {{ .Values.fees.configmap.PACKAGE_CACHE_ENABLED | default "true" | quote }}
  PACKAGE_CACHE_TTL_SECONDS: {{ .Values.fees.configmap.PACKAGE_CACHE_TTL_SECONDS | default "180" | quote }}
  BILLING_PACKAGE_CACHE_ENABLED: {{ .Values.fees.configmap.BILLING_PACKAGE_CACHE_ENABLED | default "true" | quote }}
  BILLING_PACKAGE_CACHE_TTL_SECONDS: {{ .Values.fees.configmap.BILLING_PACKAGE_CACHE_TTL_SECONDS | default "180" | quote }}
  ACCOUNT_CACHE_ENABLED: {{ .Values.fees.configmap.ACCOUNT_CACHE_ENABLED | default "true" | quote }}
  ACCOUNT_CACHE_TTL_SECONDS: {{ .Values.fees.configmap.ACCOUNT_CACHE_TTL_SECONDS | default "300" | quote }}

  # M2M (Machine-to-Machine)
  M2M_TARGET_SERVICE: {{ .Values.fees.configmap.M2M_TARGET_SERVICE | default "" | quote }}
  M2M_CREDENTIAL_CACHE_TTL_SEC: {{ .Values.fees.configmap.M2M_CREDENTIAL_CACHE_TTL_SEC | default "30" | quote }}

  # AWS
  AWS_REGION: {{ .Values.fees.configmap.AWS_REGION | default "" | quote }}

  # MULTI TENANT — enable is per-component (.Values.fees.multiTenant.enabled); the
  # env-wide config (url/redis/...) comes from global.multiTenant via the helper.
  {{- $mtEnabled := eq (dig "multiTenant" "enabled" false .Values.fees | toString) "true" }}
  MULTI_TENANT_ENABLED: {{ $mtEnabled | quote }}
  {{- with (include "lerian-common.multiTenant.env" (dict
        "context" $
        "configmap" .Values.fees.configmap
        "enabled" $mtEnabled
        "requiredUrl" true "requiredRedisHost" true
        "emitRedis" true "emitPool" true "emitCache" true
        "emitEnvironment" true "emitAllowInsecure" true
      )) }}{{ . | nindent 2 }}{{- end }}

  # SERVICE DISCOVERY (lib-service-discovery) — enable is per-component
  # (.Values.fees.serviceDiscovery.enabled); env-wide server config from
  # global.serviceDiscovery; identity derived from name/port/namespace. Emitted
  # before extraEnvVars so an operator can still override any SD_* key.
  {{- $sdEnabled := eq (dig "serviceDiscovery" "enabled" false .Values.fees | toString) "true" }}
  SD_ENABLED: {{ $sdEnabled | quote }}
  {{- with (include "lerian-common.serviceDiscovery.env" (dict
        "context" $
        "enabled" $sdEnabled
        "name" (include "plugin-fees.fullname" .)
        "port" .Values.fees.service.port
        "namespace" (include "global.namespace" $)
        "ingressHost" (include "lerian-common.firstIngressHost" (dict "ingress" .Values.fees.ingress))
      )) }}{{ . | nindent 2 }}{{- end }}

  # STREAMING (lib-streaming) — enable + identity are per-component
  # (.Values.fees.streaming.{enabled,clientId,cloudeventsSource}); the env-wide
  # broker/TLS/SASL config comes from global.streaming via the helper. `name` is the
  # identity fallback.
  {{- $streamEnabled := eq (dig "streaming" "enabled" false .Values.fees | toString) "true" }}
  STREAMING_ENABLED: {{ $streamEnabled | quote }}
  {{- with (include "lerian-common.streaming.env" (dict
        "context" $
        "enabled" $streamEnabled
        "name" .Values.fees.name
        "clientId" (dig "streaming" "clientId" "" .Values.fees)
        "cloudeventsSource" (dig "streaming" "cloudeventsSource" "" .Values.fees)
      )) }}{{ . | nindent 2 }}{{- end }}

  # Extra Env Vars
  {{- with .Values.fees.extraEnvVars }}
  {{- toYaml . | nindent 2 }}
  {{- end }}