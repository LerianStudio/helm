# Default values
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  # -- Bootstrap job for external MongoDB: creates users and grants privileges
  externalMongoDefinitions:
    # -- Enable or disable the MongoDB bootstrap job
    enabled: false
    # -- MongoDB connection settings
    connection:
      # -- MongoDB host
      host: "plugin-br-pix-indirect-btg-mongodb"
      # -- MongoDB port
      port: "27017"
    # -- Admin credentials for MongoDB (rootUser from bitnami subchart)
    mongoAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing MONGO_ROOT_USER and MONGO_ROOT_PASSWORD keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "pix_btg"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: ""
    # -- Credentials for pix_btg user created by the job
    pixBtgCredentials:
      useExistingSecret:
        # -- Name of existing secret containing MONGO_APP_USER and MONGO_APP_PASSWORD keys
        name: ""
      # -- App username (ignored if useExistingSecret.name is set)
      username: "pix_btg"
      # -- Password for pix_btg user (ignored if useExistingSecret.name is set)
      password: ""
      # -- List of roles to grant to the user. Each item is a {role, db} pair.
      roles:
        - role: "readWrite"
          db: "plugin-br-pix-indirect-btg-db"
pix:
  # -- Readiness probe configuration. All fields override chart defaults.
  readinessProbe:
    path: /health
  # -- Liveness probe configuration. All fields override chart defaults.
  livenessProbe: {}
  replicaCount: 1
  name: "plugin-br-pix-indirect-btg"
  description: "Plugin pix for Midaz"
  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10
  image:
    # -- Repository for the container image
    repository: ghcr.io/lerianstudio/plugin-br-pix-indirect-btg
    # -- Image pull policy
    pullPolicy: Always
    # -- Image tag used for deployment
    tag: "1.8.0"
  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []
  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""
  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: "nginx"
    # -- Additional ingress annotations
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []
  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Service port
    port: 4014
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  podSecurityContext: {} # fsGroup: 2000
  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Minimum number of available pods
    minAvailable: 0
    # -- Annotations for PodDisruptionBudget
    annotations: {}
  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 200m
      memory: 256Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 3
    # -- Maximum number of replicas
    maxReplicas: 9
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 70
  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}
  # -- Tolerations for scheduling on tainted nodes
  tolerations: []
  # -- Affinity rules for pod scheduling
  affinity: {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: midaz.io/owner
  #         operator: In
  #         values:
  #         - midaz
  # podAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #   - labelSelector:
  #       matchExpressions: []
  #     topologyKey: kubernetes.io/hostname

  # -- ConfigMap for environment variables and configurations
  # -- All environment variables are declared in the templates/configmap.yaml
  # @default -- templates/configmap.yaml
  configmap:
    ALLOW_INSECURE_TLS: "true"
    # Deployment Mode
    DEPLOYMENT_MODE: "local"
    # Database Configuration
    # Infra hosts are derived collapse-aware in templates/*/configmap.yaml from the bundled
    # subchart Service names when left empty. Set explicitly only for external infra.
    DB_HOST: ""
    DB_USER: "pix_btg"
    DB_NAME: "pix_btg"
    DB_REPLICA_HOST: ""
    DB_REPLICA_USER: "pix_btg"
    DB_REPLICA_NAME: "pix_btg"
    # MongoDB Configuration
    MONGO_HOST: ""
    MONGO_NAME: "plugin-br-pix-indirect-btg-db"
    MONGO_USER: "pix_btg"
    MONGO_TLS: "false"
    # Redis Configuration
    REDIS_HOST: ""
    # External Services
    BTG_BASE_URL: ""
    # Midaz Configuration
    MIDAZ_ORGANIZATION_ID: ""
    MIDAZ_LEDGER_ID: ""
    # PIX Configuration
    PIX_ISPB: ""
    # License
    ORGANIZATION_IDS: global
    # Fee Configuration
    CASHIN_FEE_CALCULATION_TYPE: "segment"
    # Entry Write Block Window
    ENTRY_WRITE_BLOCK_START: ""
    ENTRY_WRITE_BLOCK_END: ""
    # HMAC Internal Validation
    INTERNAL_WEBHOOK_VALIDATION_ENABLED: "true"
    INTERNAL_WEBHOOK_TIMESTAMP_TOLERANCE: "300"
    # mTLS BTG Configuration
    MTLS_ENABLED: "false"
    MTLS_CERTIFICATE_TTL: "24h"
    BTG_CERTIFICATE_URL: ""
    MTLS_HTTP_TIMEOUT: "10s"
    # BTG Webhook Validation
    BTG_WEBHOOK_VALIDATION_ENABLED: "true"
    # Schedule Business Rules
    SCHEDULE_MAX_FUTURE_DAYS: "180"
    SCHEDULE_MIN_FUTURE_SECONDS: "60"
    SCHEDULE_DEFAULT_EXECUTE_HOUR_BRT: "6"
    SCHEDULE_MAX_ATTEMPTS: "2"
  # -- Secrets for storing sensitive data
  # -- All secrets are declared in the templates/secrets.yaml
  # @default -- templates/secrets.yaml
  secrets:
    DB_PASSWORD: ""
    DB_REPLICA_PASSWORD: ""
    REPLICATION_PASSWORD: ""
    MONGO_PASSWORD: ""
    REDIS_PASSWORD: ""
    PLUGIN_CRM_CLIENT_ID: ""
    PLUGIN_CRM_CLIENT_SECRET: ""
    BTG_CLIENT_ID: ""
    BTG_CLIENT_SECRET: ""
    LICENSE_KEY: ""
    MIDAZ_CLIENT_ID: ""
    MIDAZ_CLIENT_SECRET: ""
    FEE_CLIENT_ID: ""
    FEE_CLIENT_SECRET: ""
    INTERNAL_WEBHOOK_SECRET: ""
    BTG_WEBHOOK_SECRET: ""
  # -- Extra environment variables
  extraEnvVars: {}
  useExistingSecrets: false
  existingSecretName: ""
