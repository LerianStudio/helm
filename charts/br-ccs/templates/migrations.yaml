{{- $brCcs := .Values.brCcs | default dict }}
{{- $migrations := get $brCcs "migrations" | default dict }}
{{- $configmap := get $brCcs "configmap" | default dict }}
{{- $postgresql := .Values.postgresql | default dict }}
{{- $migrationImage := get $migrations "image" | default dict }}
{{- $defaultMigrationResources := dict "requests" (dict "cpu" "50m" "memory" "64Mi") "limits" (dict "cpu" "250m" "memory" "256Mi") }}
{{- $migrationsEnabled := and (eq (lower (toString (get $brCcs "enabled" | default false))) "true") (eq (lower (toString (get $migrations "enabled" | default false))) "true") }}
{{- if $migrationsEnabled }}
{{- /* Internal (chart-managed) Postgres support. When postgresql.enabled=true and not
     external, the database is provisioned during the Sync phase (bitnami), so the
     migration runs as a POST hook (after the DB exists) with a wait-for-Postgres
     initContainer. External/pre-existing Postgres keeps the PRE hook (DB already exists). */}}
{{- $internalPg := and (eq (lower (toString (get $postgresql "enabled" | default false))) "true") (not (eq (lower (toString (get $postgresql "external" | default false))) "true")) }}
{{- $appUseExisting := eq (lower (toString (get $brCcs "useExistingSecret" | default false))) "true" }}
{{- $migUseExisting := eq (lower (toString (get $migrations "useExistingSecret" | default false))) "true" }}
{{- $existingSecretName := "" }}
{{- if $migUseExisting }}
{{- $existingSecretName = required "brCcs.migrations.existingSecretName is required when brCcs.migrations.useExistingSecret=true" (get $migrations "existingSecretName") }}
{{- else if $appUseExisting }}
{{- $existingSecretName = required "brCcs.existingSecretName is required when brCcs.useExistingSecret=true" (get $brCcs "existingSecretName") }}
{{- else if $internalPg }}
{{- $existingSecretName = include "br-ccs.fullname" . }}
{{- else }}
{{- $existingSecretName = printf "%s-migrations" (include "br-ccs.fullname" .) | trunc 63 | trimSuffix "-" }}
{{- end }}
{{- $namespace := include "global.namespace" . }}
{{- $migrationTag := get $migrationImage "tag" | default "" }}
{{- $migrationDigest := get $migrationImage "digest" | default "" }}
{{- if and (empty $migrationTag) (empty $migrationDigest) }}
{{- $migrationTag = .Values.brCcs.image.tag | default .Chart.AppVersion }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrations" (include "br-ccs.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ $namespace }}
  labels:
    {{- include "br-ccs.labels" (dict "context" . "component" "migrations" "name" (get $brCcs "name") ) | nindent 4 }}
  annotations:
    {{- if $internalPg }}
    # Internal Postgres is provisioned during Sync — run AFTER it exists and is reachable.
    "helm.sh/hook": post-install,post-upgrade
    "argocd.argoproj.io/hook": PostSync
    {{- else }}
    # External Postgres already exists — run BEFORE the app rolls out (schema-first).
    "helm.sh/hook": pre-install,pre-upgrade
    "argocd.argoproj.io/hook": PreSync
    {{- end }}
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,HookSucceeded
    {{- with (get $migrations "annotations") }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ get $migrations "backoffLimit" | default 3 }}
  activeDeadlineSeconds: {{ get $migrations "activeDeadlineSeconds" | default 600 }}
  ttlSecondsAfterFinished: {{ get $migrations "ttlSecondsAfterFinished" | default 600 }}
  template:
    metadata:
      labels:
        {{- include "br-ccs.labels" (dict "context" . "component" "migrations" "name" (get $brCcs "name") ) | nindent 8 }}
      {{- with (get $migrations "podAnnotations") }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with (get $brCcs "imagePullSecrets") }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (get $migrations "serviceAccountName") }}
      serviceAccountName: {{ . | quote }}
      {{- end }}
      {{- if $internalPg }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - >
              echo "Waiting for $POSTGRES_HOST:$POSTGRES_PORT...";
              ELAPSED=0;
              while ! nc -z "$POSTGRES_HOST" "$POSTGRES_PORT"; do
                if [ $ELAPSED -ge 300 ]; then echo "Timeout after 300s"; exit 1; fi;
                echo "not ready, waiting (${ELAPSED}s/300s)"; sleep 5; ELAPSED=$((ELAPSED + 5));
              done;
              echo "Postgres is ready";
          env:
            - name: POSTGRES_HOST
              value: {{ get $configmap "POSTGRES_HOST" | default (printf "%s-postgresql-primary.%s.svc.cluster.local" .Release.Name $namespace) | quote }}
            - name: POSTGRES_PORT
              value: {{ get $configmap "POSTGRES_PORT" | default "5432" | quote }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      {{- end }}
      containers:
        - name: migrations
          {{- $migrationRepository := get $migrationImage "repository" | default "ghcr.io/lerianstudio/br-ccs-migrations" }}
          {{- if $migrationDigest }}
          image: "{{ $migrationRepository }}@{{ $migrationDigest }}"
          {{- else }}
          image: "{{ $migrationRepository }}:{{ $migrationTag }}"
          {{- end }}
          imagePullPolicy: {{ get $migrationImage "pullPolicy" | default "IfNotPresent" }}
          env:
            - name: MIGRATIONS_PATH
              value: {{ get $migrations "path" | default "/migrations" | quote }}
            - name: POSTGRES_HOST
              value: {{ get $configmap "POSTGRES_HOST" | default (printf "%s-postgresql-primary.%s.svc.cluster.local" .Release.Name $namespace) | quote }}
            - name: POSTGRES_PORT
              value: {{ get $configmap "POSTGRES_PORT" | default "5432" | quote }}
            - name: POSTGRES_USER
              value: {{ get $configmap "POSTGRES_USER" | default "br-ccs" | quote }}
            - name: POSTGRES_NAME
              value: {{ get $configmap "POSTGRES_NAME" | default "br-ccs" | quote }}
            - name: POSTGRES_SSLMODE
              value: {{ get $configmap "POSTGRES_SSLMODE" | default "require" | quote }}
            - name: POSTGRES_CONNECT_TIMEOUT_SEC
              value: {{ get $configmap "POSTGRES_CONNECT_TIMEOUT_SEC" | default "10" | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $existingSecretName }}
                  key: POSTGRES_PASSWORD
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml (get $migrations "resources" | default $defaultMigrationResources) | nindent 12 }}
      {{- with (get $brCcs "nodeSelector") }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (get $brCcs "affinity") }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (get $brCcs "tolerations") }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
