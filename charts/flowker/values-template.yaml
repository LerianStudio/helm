# Template values for flowker deployment
# Copy this file and customize for your environment

namespaceOverride: "flowker"

flowker:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/lerianstudio/flowker
    pullPolicy: IfNotPresent
    # Empty inherits the chart default (>= 1.2.0-beta.82, required for worker + xsd).
    tag: ""

  imagePullSecrets: []

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  configmap:
    ALLOW_INSECURE_TLS: "true"
    SERVER_ADDRESS: ":4021"
    LOG_LEVEL: "info"
    API_KEY_ENABLED: "false"
    CORS_ALLOWED_ORIGINS: "*"
    MONGO_DB_NAME: "flowker"
    MONGO_MAX_POOL_SIZE: "20"
    ENABLE_TELEMETRY: "false"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""

  secrets:
    # REQUIRED: full mongodb:// URI with password embedded.
    MONGO_URI: ""
    API_KEY: ""
    # REQUIRED when MULTI_TENANT_ENABLED=false.
    AUDIT_DB_PASSWORD: ""

  useExistingSecret: false
  existingSecretName: ""

  # WorkOS Tenant Manager token mint (all-or-none; requires WORKOS_TM_* config + secret).
  workosTmEnabled: false

  # In-pod XSD validator sidecar (default on; disable if XML validation is unused).
  xsdValidator:
    enabled: true

# Scheduler worker Deployment (runs the /worker binary from the flowker image).
worker:
  enabled: true

# In-cluster Redis for the scheduler queue. Enable for a bundled valkey, or leave
# off and point flowker.configmap.SCHEDULER_REDIS_HOST at an external Redis.
valkey:
  enabled: false

# AWS auth. On EKS use IRSA via flowker.serviceAccount.annotations; on non-EKS
# clusters enable IAM Roles Anywhere and supply the ARNs + certificate secret.
aws:
  rolesAnywhere:
    enabled: false
    trustAnchorArn: ""
    profileArn: ""
    roleArn: ""
    certificateSecretName: "flowker-iam-tls"

mongodb:
  enabled: true
  external: false
  auth:
    enabled: true
    rootUser: flowker
    rootPassword: ""
  persistence:
    size: 8Gi
