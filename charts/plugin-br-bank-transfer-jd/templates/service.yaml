{{- if .Values.bankTransfer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bank-transfer.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "bank-transfer.labels" (dict "context" . "component" .Values.bankTransfer.name "name" .Values.bankTransfer.name ) | nindent 4 }}
  {{- with .Values.bankTransfer.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.bankTransfer.service.type }}
  ports:
    - port: {{ .Values.bankTransfer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bank-transfer.selectorLabels" (dict "context" . "name" .Values.bankTransfer.name) | nindent 4 }}
{{- end }}
