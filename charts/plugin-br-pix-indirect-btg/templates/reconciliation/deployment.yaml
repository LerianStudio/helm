apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reconciliation.fullname" . }}
  labels:
    {{- include "reconciliation.labels" (dict "context" . "name" .Values.reconciliation.name ) | nindent 4 }} 
spec:
  revisionHistoryLimit: {{ .Values.reconciliation.revisionHistoryLimit | default 10 }}
  strategy:
    {{- toYaml .Values.reconciliation.deploymentStrategy | nindent 4 }}
  replicas: {{ .Values.reconciliation.replicaCount }}
  selector:
    matchLabels:
      {{- include "reconciliation.selectorLabels" (dict "context" . "name" .Values.reconciliation.name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "reconciliation.labels" (dict "context" . "name" .Values.reconciliation.name ) | nindent 8 }}
    spec:
    {{- with .Values.reconciliation.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      securityContext:
        {{- toYaml .Values.reconciliation.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "reconciliation.fullname" . }}
          securityContext:
            {{- toYaml .Values.reconciliation.securityContext | nindent 12 }}
          image: {{ .Values.reconciliation.image.repository }}:{{ .Values.reconciliation.image.tag | default (include "plugin.version" .) }}
          imagePullPolicy: {{ .Values.reconciliation.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.reconciliation.service.port }}
              protocol: TCP
          envFrom:
          - secretRef:
              name: {{ if .Values.reconciliation.useExistingSecrets }}{{ .Values.reconciliation.existingSecretName }}{{ else }}{{ include "reconciliation.fullname" . }}{{ end }}
          - configMapRef:
              name: {{ include "reconciliation.fullname" . }}
          {{- include "plugin-br-pix-indirect-btg.dbPasswordRequired" (dict "context" . "component" "reconciliation") }}
          {{- $infraEnv := include "plugin-br-pix-indirect-btg.infraEnv" (dict "context" . "component" "reconciliation" "secretName" (include "reconciliation.fullname" .)) }}
          {{- $otelEnabled := (index .Values "otel-collector-lerian").enabled }}
          {{- if or (trim $infraEnv) $otelEnabled }}
          env:
          {{- with $infraEnv }}{{ . | nindent 10 }}{{- end }}
          {{- if $otelEnabled }}
          - name: "HOST_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "$(HOST_IP):4317"
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.reconciliation.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.reconciliation.readinessProbe.path | default "/readyz" }}
              port: {{ .Values.reconciliation.service.port }}
            initialDelaySeconds: {{ .Values.reconciliation.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.reconciliation.readinessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.reconciliation.readinessProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.reconciliation.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.reconciliation.readinessProbe.failureThreshold | default 3 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.reconciliation.livenessProbe.path | default "/health" }}
              port: {{ .Values.reconciliation.service.port }}
            initialDelaySeconds: {{ .Values.reconciliation.livenessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.reconciliation.livenessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.reconciliation.livenessProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.reconciliation.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.reconciliation.livenessProbe.failureThreshold | default 3 }}
      {{- with .Values.reconciliation.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.reconciliation.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.reconciliation.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}