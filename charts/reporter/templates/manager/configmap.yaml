apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plugin-manager.fullname" . }}
  labels:
    {{- include "plugin-manager.labels" (dict "context" . "name" .Values.manager.name ) | nindent 4 }}
  {{- with .Values.manager.configmap.annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }} 
data:
  # Common shared values
  {{- range $key, $value := .Values.common.configmap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  # Service specific values
  {{- range $key, $value := .Values.manager.configmap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  # Rate Limiting - Three-tier system with Redis backend
  # Set RATE_LIMIT_ENABLED=false to disable (requires ALLOW_RATELIMIT_DISABLED in strict tier)
  # ALLOW_RATELIMIT_DISABLED: Set a detailed reason message explaining why rate limiting is disabled (e.g., "Service processes batch jobs only, no user-facing API endpoints")
  # ALLOW_RATELIMIT_FAIL_OPEN: Set a detailed reason message to allow fail-open mode in production
  # Always set VERSION and OTEL_RESOURCE_SERVICE_VERSION from image tag
  VERSION: {{ .Values.manager.image.tag | quote }}
  OTEL_RESOURCE_SERVICE_VERSION: {{ .Values.manager.image.tag | quote }}
  # Extra Env Vars
  {{- with .Values.manager.extraEnvVars }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
