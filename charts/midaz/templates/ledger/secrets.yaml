{{- if and .Values.ledger.enabled (not .Values.ledger.useExistingSecret) }}
{{- $pg := .Values.postgresql | default dict }}
{{- $pgAuth := $pg.auth | default dict }}
{{- $pgInternal := or (and (ne (toString $pg.enabled) "false") (not $pg.external)) $pgAuth.existingSecret }}
{{- $mongo := .Values.mongodb | default dict }}
{{- $mongoAuth := $mongo.auth | default dict }}
{{- $mongoInternal := or (and (ne (toString $mongo.enabled) "false") (not $mongo.external)) $mongoAuth.existingSecret }}
{{- $vk := .Values.valkey | default dict }}
{{- $vkAuth := $vk.auth | default dict }}
{{- $vkInternal := or (and (ne (toString $vk.enabled) "false") (not $vk.external) $vkAuth.enabled) $vkAuth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "midaz-ledger.fullname" . }}
type: Opaque
data:
  # =============================================================================
  # INFRA SECRETS (single-sourced from Bitnami subchart Secrets)
  # -----------------------------------------------------------------------------
  # PostgreSQL (DB_*), MongoDB (MONGO_*), and Valkey (REDIS_PASSWORD) passwords are
  # single-sourced from the Bitnami subchart Secrets (<release>-postgresql /
  # -mongodb / -valkey) and injected via secretKeyRef on the ledger Deployment.
  # They are NOT written here for the internal/default case. Each is only emitted
  # below when the matching backend is EXTERNAL (subchart disabled or .external=true)
  # without an existingSecret override, and the operator supplied the value.
  # See docs/helm-chart-standard.md "Single-Source Infra Secrets".
  # =============================================================================
  {{- if and (not $pgInternal) .Values.ledger.secrets.DB_ONBOARDING_PASSWORD }}
  DB_ONBOARDING_PASSWORD: {{ .Values.ledger.secrets.DB_ONBOARDING_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if and (not $pgInternal) .Values.ledger.secrets.DB_ONBOARDING_REPLICA_PASSWORD }}
  DB_ONBOARDING_REPLICA_PASSWORD: {{ .Values.ledger.secrets.DB_ONBOARDING_REPLICA_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if and (not $mongoInternal) .Values.ledger.secrets.MONGO_ONBOARDING_PASSWORD }}
  MONGO_ONBOARDING_PASSWORD: {{ .Values.ledger.secrets.MONGO_ONBOARDING_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if and (not $pgInternal) .Values.ledger.secrets.DB_TRANSACTION_PASSWORD }}
  DB_TRANSACTION_PASSWORD: {{ .Values.ledger.secrets.DB_TRANSACTION_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if and (not $pgInternal) .Values.ledger.secrets.DB_TRANSACTION_REPLICA_PASSWORD }}
  DB_TRANSACTION_REPLICA_PASSWORD: {{ .Values.ledger.secrets.DB_TRANSACTION_REPLICA_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if and (not $mongoInternal) .Values.ledger.secrets.MONGO_TRANSACTION_PASSWORD }}
  MONGO_TRANSACTION_PASSWORD: {{ .Values.ledger.secrets.MONGO_TRANSACTION_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if and (not $vkInternal) .Values.ledger.secrets.REDIS_PASSWORD }}
  REDIS_PASSWORD: {{ .Values.ledger.secrets.REDIS_PASSWORD | b64enc | quote }}
  {{- end }}

  # =============================================================================
  # SHARED SECRETS (RabbitMQ — operator-provided, see README "Known limitation")
  # =============================================================================
  RABBITMQ_DEFAULT_PASS: {{ required "ledger.secrets.RABBITMQ_DEFAULT_PASS is required" .Values.ledger.secrets.RABBITMQ_DEFAULT_PASS | b64enc | quote }}
  RABBITMQ_CONSUMER_PASS: {{ required "ledger.secrets.RABBITMQ_CONSUMER_PASS is required" .Values.ledger.secrets.RABBITMQ_CONSUMER_PASS | b64enc | quote }}

  # =============================================================================
  # MULTI-TENANT SECRETS
  # =============================================================================
  {{- if eq (.Values.ledger.configmap.MULTI_TENANT_ENABLED | default "false" | toString) "true" }}
  MULTI_TENANT_SERVICE_API_KEY: {{ required "ledger.secrets.MULTI_TENANT_SERVICE_API_KEY is required when MULTI_TENANT_ENABLED=true" .Values.ledger.secrets.MULTI_TENANT_SERVICE_API_KEY | b64enc | quote }}
  {{- if .Values.ledger.secrets.MULTI_TENANT_REDIS_PASSWORD }}
  MULTI_TENANT_REDIS_PASSWORD: {{ .Values.ledger.secrets.MULTI_TENANT_REDIS_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- end }}

  # =============================================================================
  # DATA SECURITY + CRM/FEES SECRETS (collapsed into ledger — midaz v4 monorepo)
  # LCRYPTO_* is app crypto material; MONGO_CRM/FEES_PASSWORD authenticate the
  # collapsed CRM/Fees Mongo connections. All operator-provided; only emitted
  # when set so existing deployments are unaffected.
  # =============================================================================
  {{- if .Values.ledger.secrets.LCRYPTO_HASH_SECRET_KEY }}
  LCRYPTO_HASH_SECRET_KEY: {{ .Values.ledger.secrets.LCRYPTO_HASH_SECRET_KEY | b64enc | quote }}
  {{- end }}
  {{- if .Values.ledger.secrets.LCRYPTO_ENCRYPT_SECRET_KEY }}
  LCRYPTO_ENCRYPT_SECRET_KEY: {{ .Values.ledger.secrets.LCRYPTO_ENCRYPT_SECRET_KEY | b64enc | quote }}
  {{- end }}
  {{- if .Values.ledger.secrets.MONGO_CRM_PASSWORD }}
  MONGO_CRM_PASSWORD: {{ .Values.ledger.secrets.MONGO_CRM_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if .Values.ledger.secrets.MONGO_FEES_PASSWORD }}
  MONGO_FEES_PASSWORD: {{ .Values.ledger.secrets.MONGO_FEES_PASSWORD | b64enc | quote }}
  {{- end }}

  # =============================================================================
  # STREAMING SECRETS (lib-streaming — SASL password + TLS CA, operator-provided)
  # =============================================================================
  {{- if .Values.ledger.secrets.STREAMING_SASL_PASSWORD }}
  STREAMING_SASL_PASSWORD: {{ .Values.ledger.secrets.STREAMING_SASL_PASSWORD | b64enc | quote }}
  {{- end }}
  {{- if .Values.ledger.secrets.STREAMING_TLS_CA_CERT }}
  STREAMING_TLS_CA_CERT: {{ .Values.ledger.secrets.STREAMING_TLS_CA_CERT | b64enc | quote }}
  {{- end }}
{{- end }}
