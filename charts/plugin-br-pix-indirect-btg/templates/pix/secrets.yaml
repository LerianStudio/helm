{{- if not .Values.pix.useExistingSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-br-pix-indirect-btg.fullname" . }}
  labels:
    {{- include "plugin-br-pix-indirect-btg.labels" (dict "context" . "name" .Values.pix.name ) | nindent 4 }}
type: Opaque
data:
  # -- Default sensitive variables for the plugin-br-pix-indirect-btg

  # DB Configuration
  # DB_PASSWORD / DB_REPLICA_PASSWORD are single-sourced from the postgresql subchart Secret on the
  # bundled path (read via secretKeyRef on the deployment); emitted here only when postgresql is
  # external/disabled. See docs/helm-chart-standard.md "Single-Source Infra Secrets".
  {{- include "plugin-br-pix-indirect-btg.dbSecretData" (dict "context" . "component" "pix") | nindent 2 }}
  REPLICATION_PASSWORD: {{ .Values.pix.secrets.REPLICATION_PASSWORD | default "" | b64enc | quote }}

  # MongoDB Configuration
  # MONGO_PASSWORD is single-sourced from the mongodb subchart Secret on the bundled path; emitted
  # here only when mongodb is external/disabled.
  {{- include "plugin-br-pix-indirect-btg.mongoSecretData" (dict "context" . "component" "pix") | nindent 2 }}

  # Redis Configuration
  REDIS_PASSWORD: {{ .Values.pix.secrets.REDIS_PASSWORD | default "" | b64enc | quote }}

  # CRM Configuration
  PLUGIN_CRM_CLIENT_ID: {{ .Values.pix.secrets.PLUGIN_CRM_CLIENT_ID | default "" | b64enc | quote }}
  PLUGIN_CRM_CLIENT_SECRET: {{ .Values.pix.secrets.PLUGIN_CRM_CLIENT_SECRET | default "" | b64enc | quote }}

  # BTG Configuration
  BTG_CLIENT_ID: {{ .Values.pix.secrets.BTG_CLIENT_ID | default "" | b64enc | quote }}
  BTG_CLIENT_SECRET: {{ .Values.pix.secrets.BTG_CLIENT_SECRET | default "" | b64enc | quote }}

  # LICENSE
  LICENSE_KEY: {{ .Values.pix.secrets.LICENSE_KEY | default "" | b64enc | quote }}

  # MIDAZ
  MIDAZ_CLIENT_ID: {{ .Values.pix.secrets.MIDAZ_CLIENT_ID | default "" | b64enc | quote }}
  MIDAZ_CLIENT_SECRET: {{ .Values.pix.secrets.MIDAZ_CLIENT_SECRET | default "" | b64enc | quote }}

  # FEE
  FEE_CLIENT_ID: {{ .Values.pix.secrets.FEE_CLIENT_ID | default "" | b64enc | quote }}
  FEE_CLIENT_SECRET: {{ .Values.pix.secrets.FEE_CLIENT_SECRET | default "" | b64enc | quote }}

  # HMAC Internal Validation
  INTERNAL_WEBHOOK_SECRET: {{ .Values.pix.secrets.INTERNAL_WEBHOOK_SECRET | default "" | b64enc | quote }}

  # BTG Webhook Validation
  BTG_WEBHOOK_SECRET: {{ .Values.pix.secrets.BTG_WEBHOOK_SECRET | default "" | b64enc | quote }}

{{- end }}
