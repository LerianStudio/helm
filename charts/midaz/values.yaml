
# Default values for midaz components.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
nameOverride: "midaz"
fullnameOverride: ""
namespaceOverride: "midaz"
global:
  # -- Bootstrap job for external RabbitMQ: creates users, vhosts, and permissions
  externalRabbitmqDefinitions:
    # -- Enable or disable the RabbitMQ bootstrap job
    enabled: false
    # -- RabbitMQ connection settings
    connection:
      # -- RabbitMQ protocol (http or https)
      protocol: "http"
      # -- RabbitMQ host (management API endpoint)
      host: "midaz-rabbitmq"
      # -- RabbitMQ HTTP management port
      port: "15672"
      # -- RabbitMQ AMQP port (for connectivity check)
      portAmqp: "5672"
    # -- Admin credentials for RabbitMQ management API
    rabbitmqAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing RABBITMQ_ADMIN_USER and RABBITMQ_ADMIN_PASS keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "midaz"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: ""
    # -- Credentials for application users created by the job
    appCredentials:
      useExistingSecret:
        # -- Name of existing secret containing RABBITMQ_DEFAULT_PASS and RABBITMQ_CONSUMER_PASS keys
        name: ""
      # -- Password for transaction user (ignored if useExistingSecret.name is set)
      transactionPassword: ""
      # -- Password for consumer user (ignored if useExistingSecret.name is set)
      consumerPassword: ""
  # -- Bootstrap job for external PostgreSQL: creates databases, roles, and grants privileges
  externalPostgresDefinitions:
    # -- Enable or disable the PostgreSQL bootstrap job
    enabled: false
    # -- PostgreSQL connection settings
    connection:
      # -- PostgreSQL host
      host: "midaz-postgresql-primary"
      # -- PostgreSQL port
      port: "5432"
    # -- Admin credentials for PostgreSQL
    postgresAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing DB_USER_ADMIN and DB_ADMIN_PASSWORD keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "postgres"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: ""
    # -- Credentials for midaz role created by the job
    midazCredentials:
      useExistingSecret:
        # -- Name of existing secret containing DB_PASSWORD_MIDAZ key
        name: ""
      # -- Password for midaz role (ignored if useExistingSecret.name is set)
      password: ""
  # -- Bootstrap job for external MongoDB: creates users and grants privileges
  externalMongoDefinitions:
    # -- Enable or disable the MongoDB bootstrap job
    enabled: false
    # -- MongoDB connection settings
    connection:
      # -- MongoDB host
      host: "midaz-mongodb"
      # -- MongoDB port
      port: "27017"
    # -- Admin credentials for MongoDB (rootUser from bitnami subchart)
    mongoAdminLogin:
      useExistingSecret:
        # -- Name of existing secret containing MONGO_ROOT_USER and MONGO_ROOT_PASSWORD keys
        name: ""
      # -- Admin username (ignored if useExistingSecret.name is set)
      username: "midaz"
      # -- Admin password (ignored if useExistingSecret.name is set)
      password: ""
    # -- Credentials for midaz user created by the job
    midazCredentials:
      useExistingSecret:
        # -- Name of existing secret containing MONGO_APP_USER and MONGO_APP_PASSWORD keys
        name: ""
      # -- App username (ignored if useExistingSecret.name is set)
      username: "midaz"
      # -- Password for midaz user (ignored if useExistingSecret.name is set)
      password: ""
      # -- List of roles to grant to the user. Each item is a {role, db} pair.
      roles:
        - role: "readWrite"
          db: "onboarding"
        - role: "readWrite"
          db: "transaction"
        - role: "readWrite"
          db: "crm"
ledger:
  # -- Readiness probe configuration. All fields override chart defaults.
  readinessProbe: {}
  # -- Liveness probe configuration. All fields override chart defaults.
  livenessProbe: {}
  # -- Service name
  name: ledger
  # -- Enable or disable the ledger service (unified onboarding + transaction)
  # -- When enabled, onboarding and transaction services will not be deployed unless migration.allowAllServices is true
  # -- NOTE: migration.allowAllServices is not in the public values.yaml - set it in your override values for internal testing
  enabled: true
  # -- Number of replicas for the ledger service
  replicaCount: 2
  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10
  image:
    # -- Repository for the ledger service container image
    repository: lerianstudio/midaz-ledger
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag used for deployment
    tag: "3.7.8"
  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []
  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""
  # -- Pod annotations for additional metadata
  podAnnotations: {}
  podSecurityContext: {}
  # fsGroup: 2000

  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  # -- PodDisruptionBudget configuration
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Minimum number of available pods
    minAvailable: 1
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Annotations for the PodDisruptionBudget
    annotations: {}
  # -- Deployment update strategy
  deploymentUpdate:
    # -- Type of deployment strategy
    type: RollingUpdate
    # -- Maximum number of pods that can be created over the desired number of pods
    maxSurge: 100%
    # -- Maximum number of pods that can be unavailable during the update
    maxUnavailable: 0
  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Port for the HTTP API (all APIs on single port)
    port: 3002
    annotations: {}
  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Additional ingress annotations
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for ingress
    tls: []
    #  - secretName: chart-example-tls
    #  hosts:
    #      - chart-example.local
  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 2000m
      memory: 512Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 1500m
      memory: 256Mi
  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 2
    # -- Maximum number of replicas
    maxReplicas: 9
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}
  # -- Tolerations for scheduling on tainted nodes
  tolerations: {}
  # -- Affinity rules for pod scheduling
  affinity: {}
  # -- Node affinity rules
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: midaz.io/owner
  #         operator: In
  #         values:
  #         - midaz

  # ===========================================================================
  # PRODUCTIZED CONFIG — clean, grouped params for the knobs clients tune most.
  # Backward-compatible: the raw `configmap.<KEY>` below still works and OVERRIDES
  # these (precedence: configmap.<KEY> > these params > default). Defaults here
  # match the legacy template defaults, so existing installs render unchanged.
  # (auth & telemetry are the cross-product contracts global.auth / global.observability.)
  # ===========================================================================
  # --- App -------------------------------------------------------------------
  env: "production"                    # → ENV_NAME
  logLevel: "debug"                    # → LOG_LEVEL (legacy default; set "info" for production)
  allowInsecureTls: "true"             # → ALLOW_INSECURE_TLS (set "false" for strict TLS in prod)

  # --- Accounting ------------------------------------------------------------
  accounting:
    accountTypeValidation: ""          # → ACCOUNT_TYPE_VALIDATION ("<organizationId>:<ledgerId>")
    transactionRouteValidation: ""     # → TRANSACTION_ROUTE_VALIDATION

  # --- Rate limiting (three-tier, Redis-backed) ------------------------------
  rateLimit:
    enabled: true                      # → RATE_LIMIT_ENABLED
    max: "500"                         # → RATE_LIMIT_MAX
    windowSec: "60"                    # → RATE_LIMIT_WINDOW_SEC
    aggressiveMax: "100"               # → AGGRESSIVE_RATE_LIMIT_MAX
    aggressiveWindowSec: "60"          # → AGGRESSIVE_RATE_LIMIT_WINDOW_SEC
    relaxedMax: "1000"                 # → RELAXED_RATE_LIMIT_MAX
    relaxedWindowSec: "60"             # → RELAXED_RATE_LIMIT_WINDOW_SEC
    redisTimeoutMs: "500"              # → RATE_LIMIT_REDIS_TIMEOUT_MS
    allowDisabled: ""                  # → ALLOW_RATELIMIT_DISABLED (reason required when disabled in strict tier)
    allowFailOpen: ""                  # → ALLOW_RATELIMIT_FAIL_OPEN (reason to allow fail-open in prod)

  # --- Audit -----------------------------------------------------------------
  audit:
    enabled: false                     # → AUDIT_LOG_ENABLED

  # --- Bulk recorder ---------------------------------------------------------
  bulkRecorder:
    enabled: true                      # → BULK_RECORDER_ENABLED
    size: "0"                          # → BULK_RECORDER_SIZE
    flushTimeoutMs: "100"              # → BULK_RECORDER_FLUSH_TIMEOUT_MS
    maxRowsPerInsert: "1000"           # → BULK_RECORDER_MAX_ROWS_PER_INSERT

  # --- Balance sync worker ---------------------------------------------------
  balanceSync:
    enabled: false                     # → BALANCE_SYNC_WORKER_ENABLED
    maxWorkers: "5"                    # → BALANCE_SYNC_MAX_WORKERS
    batchSize: "50"                    # → BALANCE_SYNC_BATCH_SIZE
    flushTimeoutMs: "500"              # → BALANCE_SYNC_FLUSH_TIMEOUT_MS
    pollIntervalMs: "50"               # → BALANCE_SYNC_POLL_INTERVAL_MS

  # --- Pagination ------------------------------------------------------------
  pagination:
    maxLimit: "100"                    # → MAX_PAGINATION_LIMIT
    maxMonthRange: "3"                 # → MAX_PAGINATION_MONTH_DATE_RANGE

  # --- Datastores (per module) -----------------------------------------------
  # db identity + connection pool. Host/user/port/ssl/params come from the
  # global.datastores mask (shared) or ledger.datastores (dedicated).
  database:                            # PostgreSQL, per module
    onboarding:
      name: "onboarding"               # → DB_ONBOARDING_NAME
      replicaName: "onboarding"        # → DB_ONBOARDING_REPLICA_NAME
      maxOpenConns: "3000"             # → DB_ONBOARDING_MAX_OPEN_CONNS
      maxIdleConns: "3000"             # → DB_ONBOARDING_MAX_IDLE_CONNS
    transaction:
      name: "transaction"             # → DB_TRANSACTION_NAME
      replicaName: "transaction"       # → DB_TRANSACTION_REPLICA_NAME
      maxOpenConns: "3000"             # → DB_TRANSACTION_MAX_OPEN_CONNS
      maxIdleConns: "3000"             # → DB_TRANSACTION_MAX_IDLE_CONNS
  mongo:                               # MongoDB, per module
    onboarding:
      uri: "mongodb"                   # → MONGO_ONBOARDING_URI
      name: "onboarding"               # → MONGO_ONBOARDING_NAME
      maxPoolSize: "1000"              # → MONGO_ONBOARDING_MAX_POOL_SIZE
    transaction:
      uri: "mongodb"                   # → MONGO_TRANSACTION_URI
      name: "transaction"              # → MONGO_TRANSACTION_NAME
      maxPoolSize: "1000"              # → MONGO_TRANSACTION_MAX_POOL_SIZE

  # --- Redis / Valkey (client tuning) ----------------------------------------
  # Connection host → global.datastores.redis; password → ledger.secrets.REDIS_PASSWORD.
  redis:
    masterName: ""                     # → REDIS_MASTER_NAME (sentinel)
    tls: "false"                       # → REDIS_TLS
    caCert: ""                         # → REDIS_CA_CERT
    useGcpIam: "false"                 # → REDIS_USE_GCP_IAM
    serviceAccount: ""                 # → REDIS_SERVICE_ACCOUNT
    googleAppCredentials: ""           # → GOOGLE_APPLICATION_CREDENTIALS
    tokenLifetime: "60"                # → REDIS_TOKEN_LIFETIME
    tokenRefreshDuration: "45"         # → REDIS_TOKEN_REFRESH_DURATION
    db: "0"                            # → REDIS_DB
    protocol: "3"                      # → REDIS_PROTOCOL
    poolSize: "10"                     # → REDIS_POOL_SIZE
    minIdleConns: "0"                  # → REDIS_MIN_IDLE_CONNS
    readTimeout: "3"                   # → REDIS_READ_TIMEOUT
    writeTimeout: "3"                  # → REDIS_WRITE_TIMEOUT
    dialTimeout: "5"                   # → REDIS_DIAL_TIMEOUT
    poolTimeout: "2"                   # → REDIS_POOL_TIMEOUT
    maxRetries: "3"                    # → REDIS_MAX_RETRIES
    minRetryBackoff: "8"               # → REDIS_MIN_RETRY_BACKOFF
    maxRetryBackoff: "1"               # → REDIS_MAX_RETRY_BACKOFF

  # --- Broker (RabbitMQ) -----------------------------------------------------
  # Host → global.datastores.broker; password → ledger.secrets.
  broker:
    uri: "amqp"                        # → RABBITMQ_URI
    portHost: "5672"                   # → RABBITMQ_PORT_HOST
    portAmqp: "15672"                  # → RABBITMQ_PORT_AMQP
    defaultUser: "transaction"         # → RABBITMQ_DEFAULT_USER
    consumerUser: "consumer"           # → RABBITMQ_CONSUMER_USER
    transactionAsync: "false"          # → RABBITMQ_TRANSACTION_ASYNC
    workers: "5"                       # → RABBITMQ_NUMBERS_OF_WORKERS
    prefetch: "10"                     # → RABBITMQ_NUMBERS_OF_PREFETCH
    # routing (queue/exchange/key names)
    balanceCreateQueue: "transaction.balance_create.queue"                         # → RABBITMQ_BALANCE_CREATE_QUEUE
    balanceOperationExchange: "transaction.transaction_balance_operation.exchange" # → RABBITMQ_TRANSACTION_BALANCE_OPERATION_EXCHANGE
    balanceOperationKey: "transaction.transaction_balance_operation.key"           # → RABBITMQ_TRANSACTION_BALANCE_OPERATION_KEY
    balanceOperationQueue: "transaction.transaction_balance_operation.queue"       # → RABBITMQ_TRANSACTION_BALANCE_OPERATION_QUEUE
    # events + audit routing
    transactionEventsEnabled: "false"                                             # → RABBITMQ_TRANSACTION_EVENTS_ENABLED
    transactionEventsExchange: "transaction.transaction_events.exchange"          # → RABBITMQ_TRANSACTION_EVENTS_EXCHANGE
    overdraftEventsEnabled: "false"                                               # → RABBITMQ_OVERDRAFT_EVENTS_ENABLED
    overdraftEventsExchange: "transaction.overdraft_events.exchange"              # → RABBITMQ_OVERDRAFT_EVENTS_EXCHANGE
    auditExchange: "audit.append_log.exchange"                                    # → RABBITMQ_AUDIT_EXCHANGE
    auditKey: "audit.append_log.key"                                              # → RABBITMQ_AUDIT_KEY

  # --- Feature toggles (env-wide config in global.*, inert until set) ---------
  multiTenant:
    enabled: false                     # → MULTI_TENANT_ENABLED. Env-wide MT config
                                       # (url / redis / circuit-breaker) from global.multiTenant;
                                       # per-key override via ledger.configmap.MULTI_TENANT_*;
                                       # secrets → ledger.secrets.MULTI_TENANT_{SERVICE_API_KEY,REDIS_PASSWORD}
  serviceDiscovery:
    enabled: false                     # → SD_ENABLED. Server config from global.serviceDiscovery.
  streaming:
    enabled: false                     # → STREAMING_ENABLED. Broker/SASL/TLS from global.streaming.
    # clientId: ""                     # → STREAMING_CLIENT_ID (per-app identity)
    # cloudeventsSource: ""            # → STREAMING_CLOUDEVENTS_SOURCE

  # --- v4 collapsed modules (ledger image v4 serves crm + fees inline) --------
  # Empty host by default → inert on v3 images; set them when running the v4 ledger.
  # Passwords → ledger.secrets.{MONGO_CRM_PASSWORD, MONGO_FEES_PASSWORD}.
  crm:                                 # CRM module (Mongo)
    uri: "mongodb"                     # → MONGO_CRM_URI
    host: ""                           # → MONGO_CRM_HOST
    name: ""                           # → MONGO_CRM_NAME
    user: ""                           # → MONGO_CRM_USER
    port: "27017"                      # → MONGO_CRM_PORT
    maxPoolSize: "20"                  # → MONGO_CRM_MAX_POOL_SIZE
    parameters: ""                     # → MONGO_CRM_PARAMETERS
  kms:
    vendor: "none"                     # → KMS_VENDOR (crm envelope encryption; none|vault|...)
  fees:                                # Fees module (Mongo)
    uri: "mongodb"                     # → MONGO_FEES_URI
    host: ""                           # → MONGO_FEES_HOST
    name: ""                           # → MONGO_FEES_NAME
    user: ""                           # → MONGO_FEES_USER
    port: "27017"                      # → MONGO_FEES_PORT
    maxPoolSize: "100"                 # → MONGO_FEES_MAX_POOL_SIZE
    parameters: ""                     # → MONGO_FEES_PARAMETERS
  tracer:                              # Tracer client seam (empty baseUrl = disabled)
    baseUrl: ""                        # → TRACER_BASE_URL
    transport: "rest"                  # → TRACER_TRANSPORT
    tlsMode: ""                        # → TRACER_TLS_MODE

  # -- ConfigMap for environment variables and configurations (raw/legacy format;
  #    still fully supported and takes precedence over the productized params above).
  # @default -- templates/ledger/configmap.yaml
  configmap: {}
    # -- Raw env override (advanced escape hatch). EMPTY by default — everything a
    #    client tunes is a clean param above, and connection host/user/port/ssl/params
    #    come from the global.datastores mask. Any key you set here WINS over the
    #    productized params + mask (full backward-compatibility) — e.g.
    #    ENABLE_TELEMETRY, PLUGIN_AUTH_HOST, DB_ONBOARDING_HOST, REDIS_HOST,
    #    RABBITMQ_HOST, MONGO_ONBOARDING_PARAMETERS, ALLOW_RATELIMIT_DISABLED,
    #    SERVER_PORT, SWAGGER_*, REDIS_* tuning, RABBITMQ_CIRCUIT_BREAKER_*, ...
  # -- Existing secrets name
  useExistingSecret: false
  existingSecretName: ""
  # -- Extra environment variables
  extraEnvVars: []
  # -- Secrets for storing sensitive data. Three modes:
  #   1. bundled       → passwords single-source from the Bitnami subchart Secrets (leave "").
  #   2. managed + ESO → useExistingSecret: true + existingSecretName (External Secrets / Vault);
  #                      this whole block is skipped — set nothing here.
  #   3. managed inline → set the per-key password below (EXTERNAL backend, no existingSecret).
  # @default -- templates/ledger/secrets.yaml
  secrets:
    # -- Onboarding module passwords.
    # DB_ONBOARDING_PASSWORD / DB_ONBOARDING_REPLICA_PASSWORD are single-sourced from
    # the Bitnami postgresql subchart Secret (keys `password` / `replication-password`)
    # and MONGO_ONBOARDING_PASSWORD from the mongodb subchart Secret
    # (key `mongodb-root-password`). Only set these for an EXTERNAL backend
    # (subchart disabled / .external=true) without an existingSecret override.
    DB_ONBOARDING_PASSWORD: ""
    DB_ONBOARDING_REPLICA_PASSWORD: ""
    MONGO_ONBOARDING_PASSWORD: ""
    # -- Transaction module passwords (same single-source rule as onboarding;
    # both DB_* authenticate as role `midaz`, both MONGO_* as the mongo root user).
    DB_TRANSACTION_PASSWORD: ""
    DB_TRANSACTION_REPLICA_PASSWORD: ""
    MONGO_TRANSACTION_PASSWORD: ""
    # -- Shared passwords.
    # REDIS_PASSWORD is single-sourced from the Bitnami valkey subchart Secret
    # (key `valkey-password`); only set it for an EXTERNAL Valkey/Redis without an
    # existingSecret override. RABBITMQ_* remain operator-provided (see README
    # "Known limitation" — RabbitMQ is not yet single-sourced).
    REDIS_PASSWORD: ""
    RABBITMQ_DEFAULT_PASS: ""
    RABBITMQ_CONSUMER_PASS: ""
    # -- Streaming (lib-streaming) SASL/TLS material. Operator-provided; only set
    # when the streaming backend uses SASL auth and/or a private TLS CA. When set,
    # they are rendered into the ledger Secret (never the ConfigMap).
    STREAMING_SASL_PASSWORD: ""
    STREAMING_TLS_CA_CERT: ""
    # -- v4 collapsed modules (ledger image v4). Operator-provided; emitted only when set.
    # LCRYPTO_* = crm crypto material; MONGO_CRM/FEES_PASSWORD authenticate the collapsed
    # CRM/Fees Mongo connections (ledger.crm.* / ledger.fees.*).
    LCRYPTO_HASH_SECRET_KEY: ""
    LCRYPTO_ENCRYPT_SECRET_KEY: ""
    MONGO_CRM_PASSWORD: ""
    MONGO_FEES_PASSWORD: ""
  serviceAccount:
    # -- Specifies whether a ServiceAccount should be created
    create: true
    # -- Annotations for the ServiceAccount
    annotations: {}
    # -- Name of the service account
    # @default -- `midaz-ledger.fullname`
    name: ""
crm:
  # -- Readiness probe configuration. All fields override chart defaults.
  readinessProbe: {}
  # -- Liveness probe configuration. All fields override chart defaults.
  livenessProbe: {}
  # -- Service name
  name: crm
  # -- Enable or disable the CRM service
  enabled: false
  # -- Number of replicas for the CRM service
  replicaCount: 1
  # -- Number of old ReplicaSets to retain for deployment rollback
  revisionHistoryLimit: 10
  image:
    # -- Repository for the CRM service container image
    repository: lerianstudio/midaz-crm
    # -- Image pull policy
    pullPolicy: Always
    # -- Image tag used for deployment
    tag: "3.7.8"
  # -- Secrets for pulling images from a private registry
  imagePullSecrets: []
  # -- Overrides the default generated name by Helm
  nameOverride: ""
  # -- Overrides the full name generated by Helm
  fullnameOverride: ""
  # -- Pod annotations for additional metadata
  podAnnotations: {}
  podSecurityContext: {}
  # fsGroup: 2000

  securityContext:
    # -- Defines the group ID for the user running the process inside the container
    runAsGroup: 1000
    # -- Defines the user ID for the process running inside the container
    runAsUser: 1000
    # -- Ensures the process does not run as root
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    # -- Defines the root filesystem as read-only
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
  # -- PodDisruptionBudget configuration
  pdb:
    # -- Enable or disable PodDisruptionBudget
    enabled: true
    # -- Minimum number of available pods
    minAvailable: 0
    # -- Maximum number of unavailable pods
    maxUnavailable: 1
    # -- Annotations for the PodDisruptionBudget
    annotations: {}
  # -- Deployment update strategy
  deploymentUpdate:
    # -- Type of deployment strategy
    type: RollingUpdate
    # -- Maximum number of pods that can be created over the desired number of pods
    maxSurge: 1
    # -- Maximum number of pods that can be unavailable during the update
    maxUnavailable: 1
  service:
    # -- Kubernetes service type
    type: ClusterIP
    # -- Service port
    port: 4003
  ingress:
    # -- Enable or disable ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Additional ingress annotations
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for ingress
    tls: []
    #  - secretName: chart-example-tls
    #  hosts:
    #      - chart-example.local
  resources:
    # -- CPU and memory limits for pods
    limits:
      cpu: 200m
      memory: 256Mi
    # -- Minimum CPU and memory requests
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    # -- Enable or disable horizontal pod autoscaling
    enabled: true
    # -- Minimum number of replicas
    minReplicas: 1
    # -- Maximum number of replicas
    maxReplicas: 3
    # -- Target CPU utilization percentage for autoscaling
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  # -- Node selector for scheduling pods on specific nodes
  nodeSelector: {}
  # -- Tolerations for scheduling on tainted nodes
  tolerations: {}
  # -- Affinity rules for pod scheduling
  affinity: {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: midaz.io/owner
  #         operator: In
  #         values:
  #         - midaz

  # -- Productized config (raw configmap.<KEY> still overrides = backward-compat).

  # --- App -------------------------------------------------------------------
  env: "development"                   # → ENV_NAME
  logLevel: "debug"                    # → LOG_LEVEL
  allowInsecureTls: "true"             # → ALLOW_INSECURE_TLS (set "false" for strict TLS in prod)

  # --- Datastore (MongoDB) ---------------------------------------------------
  mongo:                               # host/user/port/params → global.datastores.mongo
    uri: "mongodb"                     # → MONGO_URI
    name: "crm"                        # → MONGO_NAME
    maxPoolSize: "1000"                # → MONGO_MAX_POOL_SIZE

  # --- Feature toggles (env-wide config in global.*, inert until set) ---------
  multiTenant:
    enabled: false                     # → MULTI_TENANT_ENABLED
  serviceDiscovery:
    enabled: false                     # → SD_ENABLED (config from global.serviceDiscovery)
  streaming:
    enabled: false                     # → STREAMING_ENABLED (config from global.streaming)

  # -- ConfigMap for environment variables and configurations
  # @default -- templates/crm/configmap.yaml
  configmap: {}
    # -- Raw env override (advanced escape hatch). EMPTY by default — everything a
    #    client tunes is a clean param above, connection comes from global.datastores.
    #    Any key set here WINS over the params + mask — e.g. PLUGIN_AUTH_ADDRESS,
    #    MONGO_HOST, MONGO_PARAMETERS, SERVER_PORT, SWAGGER_*, APPLICATION_NAME, ...
  # -- Extra environment variables
  extraEnvVars: {}
  # -- Secrets for storing sensitive data
  # @default -- templates/crm/secrets.yaml
  secrets:
    # -- App crypto material (operator-provided, external boundary).
    LCRYPTO_HASH_SECRET_KEY: ""
    LCRYPTO_ENCRYPT_SECRET_KEY: ""
    # -- MONGO_PASSWORD is single-sourced from the Bitnami mongodb subchart Secret
    # (key `mongodb-root-password`); only set it for an EXTERNAL MongoDB
    # (subchart disabled / .external=true) without an existingSecret override.
    MONGO_PASSWORD: ""
    # -- Streaming (lib-streaming) SASL/TLS material. Operator-provided; only set
    # when the streaming backend uses SASL auth and/or a private TLS CA. When set,
    # they are rendered into the CRM Secret (never the ConfigMap).
    STREAMING_SASL_PASSWORD: ""
    STREAMING_TLS_CA_CERT: ""
  # -- Existing secrets name
  useExistingSecret: false
  existingSecretName: ""
grafana:
  # OpenTelemetry (OTel) dependency for observability.
  # This component is responsible for collecting and exporting telemetry data
  # such as traces and metrics, enhancing the monitoring of the application.
  # For more details, refer to the documentation:
  # https://docs.lerian.studio/docs/observability-in-midaz#midaz-observability-stack
  enabled: false
  name: grafana
  # -- Configure the ingress for Access Grafana Dashboard
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: chart-example-tls
    #  hosts:
    #      - chart-example.local
# =============================================================================
# INFRA / DATASTORES — postgresql · mongodb · valkey · rabbitmq
# =============================================================================
# Each datastore runs in one of TWO modes:
#
#   BUNDLED  (default) — the chart deploys the datastore as a subchart. Tune the
#            COMMON knobs marked below: enabled, storage size, resources, replicas,
#            image. Passwords single-source from the subchart Secret (leave
#            ledger.secrets.* empty). Best for dev / small / self-contained installs.
#
#   MANAGED / EXTERNAL — use a managed service (AWS RDS/Aurora · DocumentDB ·
#            ElastiCache · Amazon MQ) or any host you run yourself. Recipe:
#              1. turn the subchart OFF:   <datastore>.enabled: false
#                 (or keep it deployed but consumed externally: .external: true)
#              2. point the app at the host via the connection mask (shared across
#                 products):  global.datastores.<type>.{host,replicaHost,user,port,ssl,params}
#                 — or per-product: midaz.<component>.datastores.<type>.*
#              3. supply the password:  ledger.secrets.<KEY>
#                 or ledger.existingSecretName (+ useExistingSecret: true)
#              4. (optional) auto-create role/db on the managed host at deploy time:
#                 externalPostgresDefinitions / externalMongoDefinitions /
#                 externalRabbitmqDefinitions (see values above). Skip if you
#                 provision users/dbs via Terraform / the provider console.
#
# Backward-compatible: every subchart key below is the raw upstream value and still
# works verbatim. The COMMON markers just flag what most clients actually tune.
# =============================================================================
valkey:
  # Valkey is used to handle scenarios where real-time performance and fast data retrieval are essential.
  # This component is responsible for providing an in-memory data store.
  # MANAGED (ElastiCache/Redis): enabled:false + global.datastores.redis.host + ledger.secrets.REDIS_PASSWORD
  enabled: true             # -- COMMON: bundled on/off (false → use managed Redis)
  external: false           # -- COMMON: true → deployed but consumed as external (secrets from app side)
  global:
    security:
      allowInsecureImages: true
  image:                      # -- COMMON: override for arm64 / air-gapped registries
    repository: bitnamisecure/valkey
    tag: "latest"
  architecture: standalone
  auth:
    enabled: true
    password: ""              # -- bundled password (leave "" → auto-generated in the subchart Secret)
    username: midaz
  primary:
    kind: Deployment
    resourcesPreset: "medium" # -- COMMON: resource sizing (nano|micro|small|medium|large|xlarge)
    persistence:
      enabled: false          # -- COMMON: true + size for a durable cache (default: in-memory only)
    extraFlags:
      - "--maxmemory 640mb" # Controls the memory usage limit to prevent OOM (never leave this unset).
      - "--maxmemory-policy allkeys-lru" # Eviction policy when memory limit is reached (LRU works well for caching). Smart eviction strategy for rotating cache.
      - "--hz 100" # Improves responsiveness of internal events and increases the frequency of internal tasks such as memory cleanup, key expiration checks, etc.
      - "--maxclients 10000" # Supports a large number of simultaneous connections
postgresql:
  # PostgreSQL is the backbone of Midaz for managing structured data that demands transactional reliability and consistency.
  # This component is responsible for providing a robust relational database.
  # https://docs.lerian.studio/docs/midaz-components#why-postgresql
  # MANAGED (RDS/Aurora): enabled:false + global.datastores.postgres.{host,replicaHost,user,port,ssl}
  #   + ledger.secrets.DB_*_PASSWORD (or ledger.existingSecretName). Auto-create the
  #   `midaz` role/db on RDS at deploy: externalPostgresDefinitions (see values above).
  enabled: true             # -- COMMON: bundled on/off (false → use managed PostgreSQL)
  external: false           # -- COMMON: true → deployed but consumed as external
  global:
    security:
      allowInsecureImages: true
  image:                    # -- COMMON: override for arm64 / air-gapped registries
    repository: bitnamisecure/postgresql
    tag: "latest"
  architecture: replication # -- COMMON: replication (primary+replica) | standalone
  replication:
    numSynchronousReplicas: 1
  auth:
    enabled: true
    enablePostgresUser: true
    postgresPassword: ""
    username: "midaz"
    password: ""
    database: "onboarding"
    replicationUsername: "replicator"
    replicationPassword: ""
  primary:
    extraVolumes:
      - name: init-script
        configMap:
          name: midaz-init-sql
          items:
            - key: init.sql
              path: init.sql
    extraVolumeMounts:
      - name: init-script
        mountPath: /docker-entrypoint-initdb.d/init.sql
        subPath: init.sql
    persistence:
      size: 8Gi               # -- COMMON: primary disk size
    resourcesPreset: large    # -- COMMON: resource sizing (nano|micro|small|medium|large|xlarge)
    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      wal_keep_size = 512MB
      max_replication_slots = 20
    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "30"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"
  readReplicas:
    name: replication
    replicaCount: 1           # -- COMMON: number of read replicas
    persistence:
      size: 8Gi               # -- COMMON: replica disk size
    resourcesPreset: large    # -- COMMON: replica resource sizing
    extendedConfiguration: |
      shared_buffers = 2GB
      max_wal_senders = 20
      max_replication_slots = 20
      wal_keep_size = 512MB
    extraEnvVars:
      - name: POSTGRESQL_WAL_LEVEL
        value: "logical"
      - name: POSTGRESQL_HOST_STANDBY
        value: "on"
      - name: POSTGRESQL_MAX_CONNECTIONS
        value: "500"
      - name: POSTGRESQL_TCP_KEEPALIVES_IDLE
        value: "40"
      - name: POSTGRESQL_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - name: POSTGRESQL_TCP_KEEPALIVES_COUNT
        value: "5"
mongodb:
  # MongoDB’s flexibility and scalability make it the perfect choice for managing evolving and less structured data.
  # MANAGED (DocumentDB): enabled:false + global.datastores.mongo.{host,user,port,params}
  #   + ledger.secrets.MONGO_*_PASSWORD (or ledger.existingSecretName). Auto-create the
  #   app user on the managed host at deploy: externalMongoDefinitions (see values above).
  enabled: true             # -- COMMON: bundled on/off (false → use managed MongoDB/DocumentDB)
  external: false           # -- COMMON: true → deployed but consumed as external
  global:
    security:
      allowInsecureImages: true
  image:                    # -- COMMON: override for arm64 / air-gapped registries
    repository: bitnamisecure/mongodb
    tag: "latest"
  auth:
    enabled: true
    rootUser: midaz
    rootPassword: ""        # -- bundled password (leave "" → auto-generated in the subchart Secret)
  resourcesPreset: "medium" # -- COMMON: resource sizing (nano|micro|small|medium|large|xlarge)
  persistence:
    size: 8Gi               # -- COMMON: disk size
rabbitmq:
  # MANAGED (Amazon MQ / external broker): enabled:false + global.datastores.broker.host
  #   + ledger.secrets.{RABBITMQ_DEFAULT_PASS,RABBITMQ_CONSUMER_PASS}. Declare vhost/users/
  #   queues on the managed broker at deploy: externalRabbitmqDefinitions (see values above).
  # NOTE: groundhog2k chart (multi-arch), NOT Bitnami — schema differs from the datastores above.
  enabled: true             # -- COMMON: bundled on/off (false → use managed broker)
  external: false           # -- COMMON: true → deployed but consumed as external
  image:                    # -- COMMON: image tag
    tag: "3.13.6"
  persistence:
    size: 8Gi               # -- COMMON: disk size
  resources:                # -- COMMON: requests/limits (groundhog2k uses explicit resources, not presets)
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podSecurityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"
    seccompProfile: {type: RuntimeDefault}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities: {drop: ["ALL"]}
  authentication:
    user:
      value: "midaz"
    password:
      value: ""
    erlangCookie:
      value: ""
  extraSecrets:
    - name: "midaz-rabbitmq-load-definition"
      mountPath: /etc/rabbitmq/definitions
  customConfig: |
    management.load_definitions = /etc/rabbitmq/definitions/load_definition.json
# -- OTEL exporter configuration for midaz services.
# When enabled, HOST_IP, POD_IP, OTEL_EXPORTER_OTLP_ENDPOINT and OTEL_RESOURCE_ATTRIBUTES
# are injected into the `ledger` and `crm` deployments only. Port is fixed at 4317.
# If you need a different collector endpoint, leave enabled=false and configure
# OTEL env vars directly in the application configmap (ledger.configmap / crm.configmap).
otel-collector-lerian:
  # -- Inject OTEL env vars into the midaz ledger and crm deployments
  enabled: true
