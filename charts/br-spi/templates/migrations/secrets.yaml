{{- if and .Values.migrations.enabled (not .Values.migrations.useExistingSecret) }}
# Dedicated PreSync Secret carrying only the Postgres password for the migration
# Job. PreSync hooks run BEFORE the main sync wave, so on a first install the
# component app Secrets do not exist yet. This hook Secret (weight -2) is created
# before the migration Job (weight -1). hook-delete-policy is BeforeHookCreation
# ONLY (not HookSucceeded) so it survives the whole PreSync phase for the Job to
# read; it is replaced at the next sync. When migrations.useExistingSecret=true
# this Secret is NOT minted and the Job reads POSTGRES_PASSWORD from the
# operator-provided existing Secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "br-spi-migrations.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "br-spi-migrations.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-weight: "-2"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.migrations.postgres.password | default .Values.core.secrets.POSTGRES_PASSWORD | quote }}
{{- end }}
