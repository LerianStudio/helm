apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plugin-fees.fullname" . }}
  labels:
    {{- include "plugin-fees.labels" (dict "context" . "name" .Values.fees.name ) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.fees.revisionHistoryLimit | default 10 }}
  strategy:
    {{- toYaml .Values.fees.deploymentStrategy | nindent 4 }}
  replicas: {{ .Values.fees.replicaCount }}
  selector:
    matchLabels:
      {{- include "plugin-fees.selectorLabels" (dict "context" . "name" .Values.fees.name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plugin-fees.labels" (dict "context" . "name" .Values.fees.name ) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/fees/configmap.yaml") . | sha256sum }}
        {{- if not .Values.fees.useExistingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/fees/secrets.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.fees.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      securityContext:
        fsGroup: 65532
      {{- else }}
      securityContext:
        {{- toYaml .Values.fees.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "plugin-fees.fullname" . }}
          image: "{{ .Values.fees.image.repository }}:{{ .Values.fees.image.tag | default (include "plugin.version" .) }}"
          imagePullPolicy: {{ .Values.fees.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.fees.service.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ if .Values.fees.useExistingSecret }}{{ .Values.fees.existingSecretName }}{{ else }}{{ include "plugin-fees.fullname" . }}{{ end }}
            - configMapRef:
                name: {{ include "plugin-fees.fullname" . }}
          {{- if or (index .Values "otel-collector-lerian").enabled (and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled) }}
          env:
          {{- if (index .Values "otel-collector-lerian").enabled }}
          - name: "HOST_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "$(HOST_IP):4317"
          {{- end }}
          {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
          - name: AWS_EC2_METADATA_SERVICE_ENDPOINT
            value: "http://127.0.0.1:{{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
          - name: AWS_EC2_METADATA_SERVICE_ENDPOINT_MODE
            value: "IPv4"
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.fees.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.fees.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.fees.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
        {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
        - name: aws-signing-helper
          image: "{{ .Values.aws.rolesAnywhere.sidecar.image.repository }}:{{ .Values.aws.rolesAnywhere.sidecar.image.tag }}"
          imagePullPolicy: {{ .Values.aws.rolesAnywhere.sidecar.image.pullPolicy | default "IfNotPresent" }}
          args:
            - serve
            - --certificate
            - /certs/tls.crt
            - --private-key
            - /certs/tls.key
            - --trust-anchor-arn
            - "{{ required "aws.rolesAnywhere.trustAnchorArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.trustAnchorArn }}"
            - --profile-arn
            - "{{ required "aws.rolesAnywhere.profileArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.profileArn }}"
            - --role-arn
            - "{{ required "aws.rolesAnywhere.roleArn is required when rolesAnywhere is enabled" .Values.aws.rolesAnywhere.roleArn }}"
            - --region
            - "{{ .Values.aws.rolesAnywhere.region | default "us-east-2" }}"
            - --session-duration
            - "{{ .Values.aws.rolesAnywhere.sessionDuration | default 3600 }}"
            - --port
            - "{{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}"
          ports:
            - name: imds
              containerPort: {{ .Values.aws.rolesAnywhere.sidecar.port | default 9911 }}
              protocol: TCP
          volumeMounts:
            - name: iam-certs
              mountPath: /certs
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.aws.rolesAnywhere.sidecar.resources | nindent 12 }}
        {{- end }}
      {{- if and .Values.aws .Values.aws.rolesAnywhere .Values.aws.rolesAnywhere.enabled }}
      volumes:
        - name: iam-certs
          secret:
            secretName: {{ .Values.aws.rolesAnywhere.certificateSecretName | default "plugin-fees-iam-tls" }}
            defaultMode: 0440
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
      {{- end }}
      {{- with .Values.fees.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fees.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fees.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}