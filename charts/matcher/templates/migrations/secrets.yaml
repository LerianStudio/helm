{{- if and .Values.migrations.enabled (not .Values.matcher.useExistingSecret) }}
# Dedicated PreSync Secret carrying the Postgres password for the migration Job.
# PreSync hooks run BEFORE the main sync wave, so on a first install the chart's
# own app Secret does not exist yet. This hook Secret (weight -2) is created
# before the migration Job (weight -1). hook-delete-policy is BeforeHookCreation
# only (NOT HookSucceeded) so it survives the whole PreSync phase for the Job to
# read; it is cleaned up at the next sync. Same password as the app Secret, so no
# new exposure. When matcher.useExistingSecret=true this Secret is NOT minted and
# the Job reads POSTGRES_PASSWORD from the operator-provided existing Secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "matcher-migrations.fullname" . }}
  namespace: {{ include "global.namespace" . }}
  labels:
    {{- include "matcher-migrations.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-weight: "-2"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.migrations.postgres.password | default .Values.matcher.secrets.POSTGRES_PASSWORD | quote }}
{{- end }}
