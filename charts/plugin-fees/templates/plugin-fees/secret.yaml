apiVersion: v1
kind: Secret
metadata:
  name: {{ include "plugin-fees-helm.fullname" . }}-plugin-fees
  labels:
    {{- include "plugin-fees-helm.labels" . | nindent 4 }}
    app.kubernetes.io/component: plugin-fees
type: Opaque
data:
  MULTI_TENANT_REDIS_PASSWORD: {{ .Values.fees.secrets.MULTI_TENANT_REDIS_PASSWORD | default "" | b64enc | quote }}
  MULTI_TENANT_SERVICE_API_KEY: {{ .Values.fees.secrets.MULTI_TENANT_SERVICE_API_KEY | default "" | b64enc | quote }}
  # Extra Secret Vars
  {{- if .Values.fees.extraSecretVars }}
  {{- toYaml .Values.fees.extraSecretVars | nindent 2 }}
  {{- end }}
